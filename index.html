<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOMStat Project Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F3;color:#1a1a1a;font-size:14px}
.app{max-width:1150px;margin:0 auto;padding:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.logo{font-size:15px;font-weight:600}.logo span{color:#185FA5}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5;font-weight:500}
.nav{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.nav button{padding:7px 14px;font-size:13px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;color:#666;cursor:pointer}
.nav button.active{background:#E6F1FB;color:#185FA5;border-color:#b5d4f4}
.nav button:hover{background:#f5f5f5}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1rem}
.metric{background:#f5f5f5;border-radius:8px;padding:1rem}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600}
.mv-blue{color:#185FA5}.mv-amber{color:#854F0B}.mv-red{color:#A32D2D}.mv-green{color:#3B6D11}.mv-purple{color:#3C3489}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#666;border-bottom:1px solid #e5e5e5;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge.pct{background:#E6F1FB;color:#185FA5}.badge.hr{background:#EAF3DE;color:#3B6D11}.badge.ctsi{background:#FAEEDA;color:#854F0B}
.badge.active{background:#EAF3DE;color:#3B6D11}.badge.pending{background:#FAEEDA;color:#854F0B}
.badge.upcoming{background:#E6F1FB;color:#185FA5}.badge.winding{background:#FAECE7;color:#993C1D}
.badge.lead{background:#EEEDFE;color:#3C3489;font-size:10px;padding:1px 6px}
.badge.processed{background:#EAF3DE;color:#3B6D11}
.badge.new-proj{background:#E6F1FB;color:#185FA5}
.badge.active-proj{background:#EAF3DE;color:#3B6D11}
.badge.complete-proj{background:#F1EFE8;color:#5F5E5A}
.staff-row-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;background:#f5f5f5;border:1px solid #e5e5e5;margin-bottom:4px}
.staff-row-item.is-lead{background:#EEEDFE;border-color:#AFA9EC}
.staff-name{font-size:12px;font-weight:500;flex:1}
.pct-note{font-size:11px;color:#534AB7;background:#EEEDFE;padding:2px 7px;border-radius:4px}
.add-staff-row{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:#555;font-weight:500}
input,select,textarea{font-size:13px;padding:7px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
.btn{padding:8px 18px;font-size:13px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#1a1a1a}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0c447c}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.danger{color:#A32D2D;border-color:#A32D2D}
.btn.success{background:#3B6D11;color:#fff;border-color:#3B6D11}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-row select,.filter-row input{width:auto;font-size:12px;padding:5px 8px}
.timeline-bar{height:8px;border-radius:4px;background:#e5e5e5;position:relative;width:100px}
.timeline-fill{height:8px;border-radius:4px;position:absolute;left:0;top:0}
.budget-bar{height:10px;border-radius:5px;background:#e5e5e5;position:relative;width:120px;margin-top:3px}
.budget-fill{height:10px;border-radius:5px;position:absolute;left:0;top:0;transition:width .3s}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;border-left:3px solid transparent}
.alert.warning{background:#FAEEDA;color:#854F0B;border-left-color:#EF9F27}
.alert.info{background:#E6F1FB;color:#185FA5;border-left-color:#378ADD}
.alert.success{background:#EAF3DE;color:#3B6D11;border-left-color:#639922}
.alert.danger{background:#FCEBEB;color:#A32D2D;border-left-color:#E24B4A}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:1.5rem;width:680px;max-width:96vw;margin-bottom:30px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.initials{width:26px;height:26px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#185FA5;flex-shrink:0}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#666}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#639922;flex-shrink:0}
.sync-dot.syncing{background:#EF9F27}.sync-dot.error{background:#E24B4A}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e5e5e5;border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite}
.empty{text-align:center;padding:2.5rem;color:#888;font-size:13px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F5F5F3;padding:1rem}
.login-card{background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:2rem;width:440px;max-width:100%}
.login-logo{font-size:20px;font-weight:600;margin-bottom:4px}.login-logo span{color:#185FA5}
.login-sub{font-size:13px;color:#888;margin-bottom:1.5rem}
.login-tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:#f5f5f5;padding:4px;border-radius:10px}
.login-tab{flex:1;padding:8px;font-size:13px;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666;font-weight:500}
.login-tab.active{background:#fff;color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.hours-entry-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;align-items:center;padding:8px;border-radius:8px;background:#f9f9f9;border:1px solid #eee;margin-bottom:6px}
.week-pill{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5;font-weight:500}
.budget-status{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.bs-ok{background:#EAF3DE;color:#3B6D11}
.bs-warn{background:#FAEEDA;color:#854F0B}
.bs-over{background:#FCEBEB;color:#A32D2D}
.tab-group{display:flex;gap:0;margin-bottom:1rem;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.tab-btn{flex:1;padding:8px 12px;font-size:12px;border:none;background:#f5f5f5;color:#666;cursor:pointer;font-weight:500}
.tab-btn.active{background:#185FA5;color:#fff}
.quarter-btn{padding:5px 14px;font-size:12px;border:1px solid #e5e5e5;border-radius:20px;background:#fff;color:#666;cursor:pointer}
.quarter-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
@media(max-width:600px){.metrics{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}.form-group.full{grid-column:1}.form-grid.three{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modalContent"></div>
</div>
<script>
const API='https://script.google.com/macros/s/AKfycbxefump8R-oJ0ldUVq8Uw30sJiPphXxV8d7UXFPvcmR4UxVaJE7tyPrfi18iXPVURDK/exec';
const STAFF_LIST=["Angelique Rubio","Angshuman Saha","Arseniy Vasilyev","Chris Castle","Claudia Perez","Daniela Markovic","Dennis Ruenger","Eric Demer","Estefania Sanchez Salas","Holly Wilhalme","Jenny Brook","Jinhui Liu","Josh Lee","Keren Chen","Lillian Chen","Lucia Chen","Mei Leng","Paige Smith","Rebecca Chung","Rong Guo","Sitaram Vangala","Tahmineh Romero","Tristan Grogan","Tristan Tibbe","Victoria Adebambo","Yash Motwani"];
const RATES={"Angelique Rubio":66.08,"Arseniy Vasilyev":66.08,"Chris Castle":66.08,"Claudia Perez":66.08,"Eric Demer":66.08,"Estefania Sanchez Salas":66.08,"Jinhui Liu":66.08,"Josh Lee":66.08,"Paige Smith":66.08,"Rebecca Chung":66.08,"Victoria Adebambo":66.08,"Yash Motwani":66.08,"Lucia Chen":71.62,"Keren Chen":72.87,"Lillian Chen":72.87,"Tristan Tibbe":72.87,"Dennis Ruenger":76.2,"Tahmineh Romero":82.63,"Mei Leng":92.32,"Daniela Markovic":92.72,"Holly Wilhalme":105.42,"Rong Guo":105.42,"Angshuman Saha":108.04,"Tristan Grogan":122.12,"Sitaram Vangala":122.69,"Jenny Brook":149.85};
const SERVICE_TYPES=["Consulting","Data Analysis","Data Management","Database Development","Grant Application","Manuscript","Protocol","Study Design","Other"];
const DEPARTMENTS=["Cardiology","Emergency Medicine","Endocrinology","Gastroenterology","General Internal Medicine","Geriatrics","Hematology / Oncology","Hepatology","Infectious Disease","Nephrology","Neurology","Obstetrics & Gynecology","Ophthalmology","Orthopedic Surgery","Pediatrics","Primary Care","Psychiatry","Pulmonology / Critical Care","Radiology","Rheumatology","Surgery","UCLA Health System","CTSI","Other"];
const PROJECT_STATUSES=["New Project","Active Project","Project Complete"];
const PASSCODES={"staff":"staff123","fund":"fund456","admin":"admin789"};

let projects=[], hoursData=[];
let session={role:'public',name:null};
let currentPage='intake';
let intakeTeam=[], nextProjId=1, nextHoursId=1;

const ROLE_PAGES={
  public:['intake','mystatus'],
  staff:['dashboard','myprojects','loghours','myhours','intake'],
  fund:['dashboard','allprojects','billing','fund'],
  admin:['dashboard','allprojects','loghours','billing','fund','staffview','budgets','intake']
};
const PAGE_LABELS={
  dashboard:'Dashboard',myprojects:'My Projects',allprojects:'All Projects',
  loghours:'Log Hours',myhours:'My Hours',intake:'Submit Project',
  fund:'Fund Manager Queue',staffview:'Staff Overview',billing:'Hours & Billing',
  mystatus:'My Submissions',budgets:'Budget Management'
};

// ── Utilities ──────────────────────────────────────────────────────────────
function set(id,html){const e=document.getElementById(id);if(e)e.innerHTML=html;}
function get(id){return document.getElementById(id);}
function val(id){const e=get(id);return e?e.value:'';}
function setSyncStatus(state,msg){
  const dot=get('syncDot'),txt=get('syncStatus');
  if(!dot||!txt)return;
  dot.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  txt.textContent=msg;
}
function openModal(html){set('modalContent',html);get('modalOverlay').classList.add('open');}
function closeModal(){get('modalOverlay').classList.remove('open');}
function closeModalOnOverlay(e){if(e.target===get('modalOverlay'))closeModal();}
function parseTeam(raw){if(!raw||raw==='')return[];try{return JSON.parse(raw);}catch(e){return[];}}
function initials(name){const p=(name||'').trim().split(' ');return((p[0]||'?')[0]+(p[p.length-1]||'?')[0]).toUpperCase();}
function getlead(p){return(p.team||[]).find(m=>m.lead)||(p.team||[])[0]||{name:p.lead||'—'};}
function fmtDate(d){if(!d)return'—';try{const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}}
function fmtMoney(n){return(n===null||n===undefined||n==='')?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtHrs(n){return(n===null||n===undefined||n==='')?'—':Number(n).toFixed(1);}
function daysLeft(end){return Math.ceil((new Date(end)-new Date())/86400000);}
function progressPct(s,e){const n=new Date(),st=new Date(s),en=new Date(e);if(n<st)return 0;if(n>en)return 100;return Math.round((n-st)/(en-st)*100);}
function typeLabel(t){return{pct:'% Effort',hr:'Hourly Recharge',ctsi:'CTSI'}[t]||t}
function typeClass(t){return{pct:'pct',hr:'hr',ctsi:'ctsi'}[t]||''}
function statusClass(s){return{active:'active',pending:'pending',upcoming:'upcoming',winding:'winding'}[s]||''}
function statusLabel(s){return{active:'Active',pending:'Pending',upcoming:'Upcoming',winding:'Winding Down'}[s]||s}
function projStatusClass(s){return{'New Project':'new-proj','Active Project':'active-proj','Project Complete':'complete-proj'}[s]||''}

// ── Quarter helpers ────────────────────────────────────────────────────────
function getQuarter(dateStr){
  if(!dateStr)return null;
  const m=new Date(dateStr).getMonth()+1;
  return m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
}
function getYear(dateStr){if(!dateStr)return null;return new Date(dateStr).getFullYear();}
function getFridayWeeks(n){
  const weeks=[];
  let d=new Date();
  d.setHours(0,0,0,0);
  const day=d.getDay();
  const diff=day<=5?5-day:5-day+7;
  d.setDate(d.getDate()+diff);
  for(let i=0;i<n;i++){
    const copy=new Date(d);
    weeks.push(copy.toISOString().split('T')[0]);
    d.setDate(d.getDate()-7);
  }
  return weeks;
}
function currentQuarter(){return getQuarter(new Date().toISOString());}
function currentYear(){return new Date().getFullYear();}

// ── Row converters ─────────────────────────────────────────────────────────
function rowToProject(r){
  return{
    id:String(r.id||''),pi:r.pi||'',project:r.project||'',type:r.type||'hr',
    department:r.department||'',grant:r.grant||'',start:r.start||'',end:r.end||'',
    totalValue:(r.totalValue!==''&&r.totalValue!=null)?Number(r.totalValue):null,
    fundsReceived:(r.fundsReceived!==''&&r.fundsReceived!=null)?Number(r.fundsReceived):null,
    budgetTarget:(r.budgetTarget!==''&&r.budgetTarget!=null)?Number(r.budgetTarget):null,
    status:r.status||'active',fundManagerStatus:r.fundManagerStatus||'pending',
    projectStatus:r.projectStatus||'Active Project',
    notes:r.notes||'',submittedBy:r.submittedBy||'',submittedDate:r.submittedDate||'',
    lead:r.lead||'',team:parseTeam(r.team)
  };
}
function projectToRow(p){
  return{
    id:p.id,pi:p.pi,project:p.project,type:p.type,department:p.department||'',
    grant:p.grant||'',start:p.start,end:p.end,
    totalValue:p.totalValue!=null?p.totalValue:'',
    fundsReceived:p.fundsReceived!=null?p.fundsReceived:'',
    budgetTarget:p.budgetTarget!=null?p.budgetTarget:'',
    status:p.status,fundManagerStatus:p.fundManagerStatus,
    projectStatus:p.projectStatus||'Active Project',
    notes:p.notes||'',submittedBy:p.submittedBy,submittedDate:p.submittedDate,
    lead:p.lead||((p.team||[]).find(m=>m.lead)||{name:''}).name,
    team:JSON.stringify(p.team||[])
  };
}
function rowToHours(r){
  return{
    id:String(r.id||''),projectId:String(r.projectId||''),staffName:r.staffName||'',
    weekEnding:r.weekEnding||'',serviceType:r.serviceType||'',hours:Number(r.hours)||0,
    billingAmount:Number(r.billingAmount)||0,pctEffort:Number(r.pctEffort)||0,
    projectStatus:r.projectStatus||'Active Project',notes:r.notes||'',
    submittedDate:r.submittedDate||'',quarter:r.quarter||'',year:Number(r.year)||0
  };
}
function hoursToRow(h){return{...h};}

// ── API calls ──────────────────────────────────────────────────────────────
async function loadData(manual){
  setSyncStatus('syncing',manual?'Refreshing...':'Connecting...');
  try{
    const res=await fetch(API+'?t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(Array.isArray(data)){
      projects=data.map(rowToProject).filter(p=>p.id&&p.project);
      nextProjId=projects.length?Math.max(...projects.map(p=>Number(p.id)||0))+1:1;
    }else projects=[];
    // Load hours from second sheet
    try{
      const hres=await fetch(API+'?sheet=hours&t='+Date.now());
      if(hres.ok){
        const hdata=await hres.json();
        if(Array.isArray(hdata)){
          hoursData=hdata.map(rowToHours).filter(h=>h.id&&h.projectId);
          nextHoursId=hoursData.length?Math.max(...hoursData.map(h=>Number(h.id)||0))+1:1;
        }
      }
    }catch(e){hoursData=[];}
    setSyncStatus('ok',(manual?'Refreshed — ':'Connected — ')+projects.length+' projects');
    setTimeout(()=>setSyncStatus('ok','Live — Google Sheets'),3000);
  }catch(e){
    setSyncStatus('error','Connection failed');
    projects=[];hoursData=[];
  }
  renderNav();renderPage(currentPage);
}

async function saveRecord(action,record,sheet){
  setSyncStatus('syncing','Saving...');
  try{
    await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action,record,sheet:sheet||'Sheet1'})});
    setSyncStatus('ok','Saved');
    setTimeout(()=>setSyncStatus('ok','Live — Google Sheets'),2000);
    return true;
  }catch(e){setSyncStatus('error','Save failed');return false;}
}

// ── Login / session ────────────────────────────────────────────────────────
function showLogin(){
  set('root',`
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo"><span>DOM</span>Stat Project Tracker</div>
        <div class="login-sub">Department of Medicine Statistics — UCLA</div>
        <div class="login-tabs">
          <button class="login-tab active" id="tab-public" onclick="switchLoginTab('public')">Submit a project</button>
          <button class="login-tab" id="tab-staff" onclick="switchLoginTab('staff')">Staff / Admin</button>
        </div>
        <div id="loginPublicPanel">
          <p style="font-size:13px;color:#555;margin-bottom:1.25rem;line-height:1.6">Submit a new project collaboration with DOMStat. You will be able to track your submission status after submitting.</p>
          <button class="btn primary" style="width:100%" onclick="enterAsPublic()">Continue to intake form</button>
        </div>
        <div id="loginStaffPanel" style="display:none">
          <div class="form-group" style="margin-bottom:12px">
            <label>Access level</label>
            <select id="loginRole" onchange="toggleNameField()">
              <option value="staff">Staff member</option>
              <option value="fund">Fund Manager</option>
              <option value="admin">Admin / Faculty</option>
            </select>
          </div>
          <div class="form-group" id="staffNameGroup" style="margin-bottom:12px">
            <label>Your name</label>
            <select id="loginName">
              <option value="">Select your name...</option>
              ${STAFF_LIST.map(s=>`<option value="${s}">${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label>Passcode</label>
            <input type="password" id="loginPasscode" placeholder="Enter your passcode" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <div id="loginError" style="font-size:12px;color:#A32D2D;margin-bottom:10px;display:none">Incorrect passcode. Please try again.</div>
          <button class="btn primary" style="width:100%" onclick="doLogin()">Sign in</button>
        </div>
      </div>
    </div>`);
}

function switchLoginTab(tab){
  get('tab-public').className='login-tab'+(tab==='public'?' active':'');
  get('tab-staff').className='login-tab'+(tab==='staff'?' active':'');
  get('loginPublicPanel').style.display=tab==='public'?'block':'none';
  get('loginStaffPanel').style.display=tab==='staff'?'block':'none';
}
function toggleNameField(){
  const r=val('loginRole');
  const ng=get('staffNameGroup');
  if(ng)ng.style.display=r==='staff'?'flex':'none';
}
function enterAsPublic(){session={role:'public',name:null};currentPage='intake';renderNav();renderPage('intake');}
function doLogin(){
  const role=val('loginRole'),code=val('loginPasscode'),name=val('loginName');
  const err=get('loginError');
  if(code!==PASSCODES[role]){err.style.display='block';return;}
  if(role==='staff'&&!name){alert('Please select your name.');return;}
  err.style.display='none';
  session={role,name:role==='staff'?name:(role==='fund'?'Fund Manager':'Admin')};
  currentPage=ROLE_PAGES[role][0];
  loadData(false);
}
function logout(){session={role:'public',name:null};currentPage='intake';showLogin();}
function getRoleLabel(){
  if(session.role==='public')return'Public — Submit a project';
  if(session.role==='staff')return'Staff — '+session.name;
  if(session.role==='fund')return'Fund Manager';
  return'Admin / Faculty';
}

// ── Nav / routing ──────────────────────────────────────────────────────────
function renderNav(){
  const pages=ROLE_PAGES[session.role]||[];
  const syncHtml=session.role!=='public'?`<div class="sync-bar"><div class="sync-dot syncing" id="syncDot"></div><span id="syncStatus">Loading...</span></div>`:'';

function projectHoursTotal(projectId){return hoursData.filter(h=>h.projectId===projectId).reduce((a,h)=>a+h.hours,0);}
function projectBillingTotal(projectId){return hoursData.filter(h=>h.projectId===projectId).reduce((a,h)=>a+h.billingAmount,0);}

function getBudgetBar(p){
  if(!p.budgetTarget)return'';
  const spent=projectBillingTotal(p.id);
  const pct=Math.min(100,Math.round((spent/p.budgetTarget)*100));
  const color=pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#639922';
  return`<div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${color}"></div></div>
    <div style="font-size:10px;color:#888;margin-top:2px">${fmtMoney(spent)} / ${fmtMoney(p.budgetTarget)}</div>`;
}

function buildDashboard(){
  const myP=session.role==='staff'?projects.filter(p=>(p.team||[]).some(m=>m.name===session.name)):projects;
  const active=myP.filter(p=>p.status==='active').length;
  const upcoming=myP.filter(p=>p.status==='upcoming').length;
  const winding=myP.filter(p=>p.status==='winding').length;
  const canSeeFunds=session.role==='fund'||session.role==='admin';
  const qHrs=hoursData.filter(h=>h.quarter===currentQuarter()&&h.year===currentYear()&&(session.role==='staff'?h.staffName===session.name:true)).reduce((a,h)=>a+h.hours,0);
  const alerts=[];
  myP.filter(p=>p.status==='winding').forEach(p=>{const d=daysLeft(p.end);if(d<90)alerts.push({t:'warning',m:`<strong>${p.project}</strong> (${p.pi}) winds down in ${d} days`});});
  myP.filter(p=>p.status==='upcoming').forEach(p=>alerts.push({t:'info',m:`<strong>${p.project}</strong> starts ${fmtDate(p.start)}`}));

    <div class="metric"><div class="metric-label">Upcoming</div><div class="metric-value">${upcoming}</div></div>
  </div>
  ${alerts.length?`<div class="card"><div class="card-title">Alerts</div>${alerts.map(a=>`<div class="alert ${a.t}">${a.m}</div>`).join('')}</div>`:''}
  <div class="card">
    <div class="section-header"><span class="card-title" style="margin:0">${session.role==='staff'?'My projects':'All projects'} (${myP.length})</span></div>
    ${!myP.length?`<div class="empty">No projects to display.</div>`:
    `<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Team</th><th>Status</th><th>Period</th>${canSeeFunds?'<th>Budget</th>':''}
    </tr></thead><tbody>
    ${myP.slice(0,10).map(p=>`<tr style="cursor:pointer" onclick="showDetail('${p.id}')">
      <td style="font-weight:600">${p.project}</td>
      <td style="font-size:12px;color:#666">${p.pi}${p.department?`<br><span style="color:#aaa">${p.department}</span>`:''}</td>
      <td><span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span><br><span class="badge ${projStatusClass(p.projectStatus)}" style="margin-top:3px">${p.projectStatus||'Active Project'}</span></td>
      <td>${renderTeamPills(p)}</td>

function calcBilling(projId,svcIdx,staffName){
  const rate=RATES[staffName]||66.08;
  const hrs=parseFloat(get('hrs_'+projId+'_'+svcIdx).value)||0;
  const bill=hrs*rate;
  const billEl=get('bill_'+projId+'_'+svcIdx);
  if(billEl)billEl.textContent=hrs>0?fmtMoney(bill):'—';
  let totalHrs=0,totalBill=0;
  SERVICE_TYPES.forEach((_,i)=>{
    const h=parseFloat((get('hrs_'+projId+'_'+i)||{}).value)||0;
    totalHrs+=h;totalBill+=h*rate;
  });
  const tot=get('projWeekTotal_'+projId);
  if(tot)tot.innerHTML=totalHrs.toFixed(1)+' hrs — '+fmtMoney(totalBill);
}

async function submitHours(){
  const weekEnding=val('logWeek');
  const staffName=session.role==='admin'?val('logStaff'):session.name;
  if(!staffName){alert('Please select a staff member.');return;}
  if(!weekEnding){alert('Please select a week ending date.');return;}
  const rate=RATES[staffName]||66.08;
  const q=getQuarter(weekEnding);
  const yr=getYear(weekEnding);
  const entries=[];
  projects.filter(p=>(p.team||[]).some(m=>m.name===staffName)).forEach(p=>{
    const newStatus=val('ps_'+p.id)||p.projectStatus||'Active Project';
    SERVICE_TYPES.forEach((svc,si)=>{
      const hrs=parseFloat((get('hrs_'+p.id+'_'+si)||{}).value)||0;
      if(hrs>0){
        entries.push({
          id:String(nextHoursId++),projectId:p.id,staffName,
          weekEnding,serviceType:svc,hours:hrs,
          billingAmount:parseFloat((hrs*rate).toFixed(2)),
          pctEffort:parseFloat((hrs/520).toFixed(4)),
          projectStatus:newStatus,notes:'',
          submittedDate:new Date().toISOString().split('T')[0],
          quarter:q,year:yr
        });
      }
    });
    // Update project status if changed
    if(newStatus!==p.projectStatus){
      p.projectStatus=newStatus;
      saveRecord('update',projectToRow(p),'Sheet1');
    }
  });
  if(!entries.length){alert('No hours entered. Please enter hours for at least one project and service type.');return;}
  let saved=0;
  for(const entry of entries){
    hoursData.push(entry);
    const ok=await saveRecord('add',hoursToRow(entry),'hours');
    if(ok)saved++;
  }
  openModal(`
    <div class="modal-title">Hours submitted</div>
    <div class="alert success" style="margin-bottom:1rem">${saved} entries saved for week ending ${fmtDate(weekEnding)}.</div>
    <p style="font-size:13px;color:#666;margin-bottom:1rem"><strong>Staff:</strong> ${staffName}<br>
    <strong>Total hours:</strong> ${entries.reduce((a,e)=>a+e.hours,0).toFixed(1)}<br>
    <strong>Total billing:</strong> ${fmtMoney(entries.reduce((a,e)=>a+e.billingAmount,0))}</p>
    <div class="form-actions">
      <button class="btn primary" onclick="closeModal();renderPage('myhours')">View my hours</button>
      <button class="btn" onclick="closeModal();renderPage('loghours')">Log another week</button>
    </div>`);
}

function renderMyHoursTable(q,yr){
  const myH=hoursData.filter(h=>h.staffName===session.name&&h.quarter===q&&h.year===yr);
  const totalHrs=myH.reduce((a,h)=>a+h.hours,0);

  const el=get('myHoursContent');
  if(!el)return;
  if(!myH.length){el.innerHTML=`<div class="empty">No hours logged for ${q} ${yr}.</div>`;return;}
  // Group by project
  const byProj={};
  myH.forEach(h=>{if(!byProj[h.projectId])byProj[h.projectId]=[];byProj[h.projectId].push(h);});
  let html=`
    <div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1rem">
      <div class="metric"><div class="metric-label">${q} ${yr} hours</div><div class="metric-value mv-blue">${fmtHrs(totalHrs)}</div></div>
      <div class="metric"><div class="metric-label">${q} ${yr} billing</div><div class="metric-value mv-green">${fmtMoney(totalBill)}</div></div>
      <div class="metric"><div class="metric-label">% effort (${q})</div><div class="metric-value mv-purple">${(totPct*100).toFixed(1)}%</div></div>
    </div>
    <div style="overflow-x:auto"><table><thead><tr><th>Week ending</th><th>Project</th><th>Type of service</th><th>Hours</th><th>% Effort</th><th>Billing amount</th><th>Project status</th></tr></thead><tbody>
    ${myH.sort((a,b)=>new Date(b.weekEnding)-new Date(a.weekEnding)).map(h=>{
      const p=projects.find(x=>x.id===h.projectId);
      return`<tr>
        <td style="font-size:12px">${fmtDate(h.weekEnding)}</td>
        <td style="font-weight:600;font-size:12px">${p?p.project:h.projectId}</td>
        <td style="font-size:12px">${h.serviceType}</td>
        <td style="font-size:12px;font-weight:500">${fmtHrs(h.hours)}</td>
        <td style="font-size:12px">${(h.pctEffort*100).toFixed(1)}%</td>

        <td><span class="badge ${projStatusClass(h.projectStatus)}">${h.projectStatus}</span></td>
      </tr>`;}).join('')}
    </tbody></table></div>`;

}

// ── HOURS & BILLING ────────────────────────────────────────────────────────
function buildBilling(){
  const selQ=currentQuarter(),selYr=currentYear();
  set('pageContainer',`
  <div class="card">
    <div class="section-header"><span class="card-title" style="margin:0">Hours &amp; Billing</span>
    <button class="btn sm success" onclick="exportBillingExcel()">Download Excel</button></div>
    <div class="filter-row">
      <span style="font-size:12px;color:#666;font-weight:500">Quarter:</span>
      ${['Q1','Q2','Q3','Q4'].map(q=>`<button class="quarter-btn ${q===selQ?'active':''}" id="bilQ_${q}" onclick="filterBilling('${q}',document.getElementById('bilYear').value)">${q}</button>`).join('')}
      <span style="font-size:12px;color:#666;font-weight:500;margin-left:8px">Year:</span>
      <select id="bilYear" onchange="filterBilling(document.querySelector('[id^=bilQ_].active').textContent,this.value)" style="width:auto;font-size:12px;padding:5px 8px">
        ${[currentYear(),currentYear()-1].map(y=>`<option value="${y}"${y===selYr?' selected':''}>${y}</option>`).join('')}
      </select>
      <select id="bilStaff" onchange="filterBilling(document.querySelector('[id^=bilQ_].active').textContent,document.getElementById('bilYear').value)" style="font-size:12px;padding:5px 8px"><option value="">All staff</option>${STAFF_LIST.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
      <select id="bilPI" onchange="filterBilling(document.querySelector('[id^=bilQ_].active').textContent,document.getElementById('bilYear').value)" style="font-size:12px;padding:5px 8px"><option value="">All PIs</option>${[...new Set(projects.map(p=>p.pi))].sort().map(pi=>`<option value="${pi}">${pi}</option>`).join('')}</select>
      <select id="bilSvc" onchange="filterBilling(document.querySelector('[id^=bilQ_].active').textContent,document.getElementById('bilYear').value)" style="font-size:12px;padding:5px 8px"><option value="">All services</option>${SERVICE_TYPES.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
    </div>
    <div id="billingContent"></div>
  </div>`);
  renderBillingTable(selQ,selYr);
}

function filterBilling(q,yr){
  document.querySelectorAll('[id^=bilQ_]').forEach(b=>{b.className='quarter-btn'+(b.textContent===q?' active':'');});
  renderBillingTable(q,parseInt(yr));
}

function renderBillingTable(q,yr){
  const staff=val('bilStaff'),pi=val('bilPI'),svc=val('bilSvc');
  let h=hoursData.filter(x=>x.quarter===q&&x.year===yr);
  if(staff)h=h.filter(x=>x.staffName===staff);
  if(svc)h=h.filter(x=>x.serviceType===svc);
  if(pi){const pids=projects.filter(p=>p.pi===pi).map(p=>p.id);h=h.filter(x=>pids.includes(x.projectId));}
  const totalHrs=h.reduce((a,x)=>a+x.hours,0);
  const totalBill=h.reduce((a,x)=>a+x.billingAmount,0);
  // Aggregate by project
  const byProj={};
  h.forEach(x=>{
    if(!byProj[x.projectId])byProj[x.projectId]={hours:0,billing:0,staff:new Set(),services:new Set()};
    byProj[x.projectId].hours+=x.hours;
    byProj[x.projectId].billing+=x.billingAmount;
    byProj[x.projectId].staff.add(x.staffName);
    byProj[x.projectId].services.add(x.serviceType);
  });
  const el=get('billingContent');
  if(!el)return;
  if(!h.length){el.innerHTML=`<div class="empty">No hours logged for ${q} ${yr} matching these filters.</div>`;return;}
  el.innerHTML=`
    <div class="metrics" style="margin-bottom:1rem">
      <div class="metric"><div class="metric-label">Total hours (${q} ${yr})</div><div class="metric-value mv-blue">${fmtHrs(totalHrs)}</div></div>
      <div class="metric"><div class="metric-label">Total billing</div><div class="metric-value mv-green">${fmtMoney(totalBill)}</div></div>
      <div class="metric"><div class="metric-label">Projects billed</div><div class="metric-value mv-purple">${Object.keys(byProj).length}</div></div>
      <div class="metric"><div class="metric-label">% effort (team)</div><div class="metric-value mv-amber">${(totalHrs/520*100).toFixed(1)}%</div></div>
    </div>
    <div class="tab-group" style="margin-bottom:1rem">
      <button class="tab-btn active" id="bilTabProj" onclick="switchBilTab('project','${q}',${yr})">By project</button>
      <button class="tab-btn" id="bilTabDetail" onclick="switchBilTab('detail','${q}',${yr})">Line items</button>
    </div>
    <div id="bilTabContent">${buildBilProjectView(byProj)}</div>`;
}

function switchBilTab(tab,q,yr){
  get('bilTabProj').className='tab-btn'+(tab==='project'?' active':'');
  get('bilTabDetail').className='tab-btn'+(tab==='detail'?' active':'');
  const staff=val('bilStaff'),pi=val('bilPI'),svc=val('bilSvc');
  let h=hoursData.filter(x=>x.quarter===q&&x.year===yr);
  if(staff)h=h.filter(x=>x.staffName===staff);
  if(svc)h=h.filter(x=>x.serviceType===svc);
  if(pi){const pids=projects.filter(p=>p.pi===pi).map(p=>p.id);h=h.filter(x=>pids.includes(x.projectId));}
  const byProj={};
  h.forEach(x=>{if(!byProj[x.projectId])byProj[x.projectId]={hours:0,billing:0,staff:new Set(),services:new Set()};byProj[x.projectId].hours+=x.hours;byProj[x.projectId].billing+=x.billingAmount;byProj[x.projectId].staff.add(x.staffName);byProj[x.projectId].services.add(x.serviceType);});
  set('bilTabContent',tab==='project'?buildBilProjectView(byProj):buildBilDetailView(h));
}

function buildBilProjectView(byProj){
  if(!Object.keys(byProj).length)return`<div class="empty">No data</div>`;
  return`<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Staff</th><th>Hours</th><th>Billing amount</th><th>Budget target</th><th>Budget remaining</th><th>FM status</th></tr></thead><tbody>
  ${Object.entries(byProj).map(([pid,d])=>{
    const p=projects.find(x=>x.id===pid);if(!p)return'';
    const budgetRem=p.budgetTarget?(p.budgetTarget-projectBillingTotal(p.id)):null;
    const budgetPct=p.budgetTarget?Math.min(100,Math.round(projectBillingTotal(p.id)/p.budgetTarget*100)):null;
    const bsClass=budgetPct===null?'':budgetPct>=100?'bs-over':budgetPct>=80?'bs-warn':'bs-ok';
    return`<tr>
      <td style="font-weight:600">${p.project}</td>
      <td style="font-size:12px;color:#666">${p.pi}${p.department?`<br><span style="color:#aaa">${p.department}</span>`:''}</td>
      <td><span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></td>
      <td style="font-size:12px">${[...d.staff].map(s=>s.split(' ').pop()).join(', ')}</td>
      <td style="font-weight:500">${fmtHrs(d.hours)}</td>
      <td style="font-weight:500;color:#3B6D11">${fmtMoney(d.billing)}</td>
      <td style="font-size:12px">${fmtMoney(p.budgetTarget)}</td>
      <td>${budgetRem!==null?`<span class="budget-status ${bsClass}">${fmtMoney(budgetRem)}</span>`:'—'}</td>
      <td><span class="badge ${p.fundManagerStatus==='processed'?'processed':'pending'}">${p.fundManagerStatus==='processed'?'Processed':'Pending'}</span></td>
    </tr>`;}).join('')}
  </tbody></table></div>`;
}

function buildBilDetailView(h){
  if(!h.length)return`<div class="empty">No data</div>`;
  return`<div style="overflow-x:auto"><table><thead><tr><th>Week ending</th><th>Project</th><th>PI</th><th>Staff</th><th>Type of service</th><th>Hours</th><th>% Effort</th><th>Billing amount</th><th>Project status</th></tr></thead><tbody>
  ${h.sort((a,b)=>new Date(b.weekEnding)-new Date(a.weekEnding)).map(x=>{
    const p=projects.find(px=>px.id===x.projectId);
    return`<tr>
      <td style="font-size:12px">${fmtDate(x.weekEnding)}</td>
      <td style="font-weight:600;font-size:12px">${p?p.project:x.projectId}</td>
      <td style="font-size:12px;color:#666">${p?p.pi:''}</td>
      <td style="font-size:12px">${x.staffName}</td>
      <td style="font-size:12px">${x.serviceType}</td>
      <td style="font-weight:500">${fmtHrs(x.hours)}</td>
      <td style="font-size:12px">${(x.pctEffort*100).toFixed(1)}%</td>
      <td style="color:#3B6D11;font-weight:500">${fmtMoney(x.billingAmount)}</td>
      <td><span class="badge ${projStatusClass(x.projectStatus)}">${x.projectStatus}</span></td>
    </tr>`;}).join('')}
  </tbody></table></div>`;
}

function exportBillingExcel(){
  alert('Excel export: in the full deployment this would generate a downloadable Excel file matching the Q1 2026 billing report format. This feature requires the server-side export endpoint to be enabled in your Google Apps Script.');
}

  <div class="card">
    <div class="card-title">Action required — pending (${pending.length})</div>
    ${!pending.length?`<div class="empty">All caught up</div>`:
    `<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Lead</th><th>Staff</th><th>Grant</th><th>Value</th><th>Start</th><th>Submitted by</th><th>Action</th></tr></thead><tbody>
    ${pending.map(p=>`<tr>
      <td style="font-weight:600">${p.project}</td>
      <td style="font-size:12px;color:#666">${p.pi}${p.department?`<br><span style="color:#aaa">${p.department}</span>`:''}</td>
      <td><span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></td>
      <td style="font-size:12px;color:#3C3489;font-weight:600">${getlead(p).name||'—'}</td>

    </tr>`).join('')}

  <div class="card">
    <div class="card-title">% Effort payment tracker</div>
    ${!pctP.length?`<div class="empty">No % Effort projects yet</div>`:
    `<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI</th><th>Lead</th><th>Team &amp; %</th><th>Grant</th><th>Period</th><th>Total value</th><th>Received</th><th>Outstanding</th><th>Status</th></tr></thead><tbody>
    ${pctP.map(p=>`<tr>
      <td style="font-weight:600;font-size:12px">${p.project}</td>
      <td style="font-size:11px;color:#666">${p.pi}</td>
      <td style="font-size:12px;color:#3C3489;font-weight:600">${getlead(p).name.split(' ').pop()}</td>
      <td style="font-size:11px">${(p.team||[]).map(m=>m.name.split(' ').pop()+`${m.pct?' ('+m.pct+'%)':''}`).join(', ')}</td>
      <td style="font-size:11px">${p.grant||'—'}</td>

      <td style="font-size:12px;color:#3B6D11">${fmtMoney(p.fundsReceived)}</td>

async function markProcessed(id){
  const p=projects.find(x=>String(x.id)===String(id));if(!p)return;
  p.fundManagerStatus='processed';p.fundsReceived=p.totalValue||0;
  await saveRecord('update',projectToRow(p),'Sheet1');renderPage('fund');
}

// ── BUDGETS ────────────────────────────────────────────────────────────────
function buildBudgets(){
  set('pageContainer',`
  <div class="card">
    <div class="card-title">Budget management</div>
    <p style="font-size:13px;color:#666;margin-bottom:1rem">Set or update budget targets for any project. Budget targets are used to calculate hours accrued vs. budget remaining in the billing view.</p>
    <div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Budget target</th><th>Hours billed</th><th>Amount billed</th><th>Budget remaining</th><th>Utilization</th><th>Action</th></tr></thead><tbody>
    ${projects.map(p=>{
      const spent=projectBillingTotal(p.id);
      const rem=p.budgetTarget?(p.budgetTarget-spent):null;
      const pct=p.budgetTarget?Math.min(100,Math.round(spent/p.budgetTarget*100)):0;
      const color=pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#639922';
      return`<tr>
        <td style="font-weight:600;font-size:12px">${p.project}</td>
        <td style="font-size:12px;color:#666">${p.pi}${p.department?`<br><span style="color:#aaa">${p.department}</span>`:''}</td>
        <td><span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></td>
        <td><input type="number" id="budget_${p.id}" value="${p.budgetTarget||''}" placeholder="Set budget" style="width:110px;font-size:12px;padding:5px 8px"></td>
        <td style="font-size:12px">${fmtHrs(projectHoursTotal(p.id))}</td>
        <td style="font-size:12px;color:#3B6D11;font-weight:500">${fmtMoney(spent)}</td>
        <td style="font-size:12px;color:${rem!==null&&rem<0?'#A32D2D':'#3B6D11'}">${rem!==null?fmtMoney(rem):'—'}</td>
        <td>${p.budgetTarget?`<div class="budget-bar" style="width:100px"><div class="budget-fill" style="width:${pct}%;background:${color}"></div></div><div style="font-size:10px;color:#888;margin-top:2px">${pct}%</div>`:'—'}</td>
        <td><button class="btn sm" onclick="saveBudget('${p.id}')">Save</button></td>
      </tr>`;}).join('')}
    </tbody></table></div>
  </div>`);
}
async function saveBudget(id){
  const p=projects.find(x=>String(x.id)===String(id));if(!p)return;
  const newBudget=parseFloat(val('budget_'+id))||null;
  p.budgetTarget=newBudget;
  await saveRecord('update',projectToRow(p),'Sheet1');
  buildBudgets();
}

// ── STAFF OVERVIEW ─────────────────────────────────────────────────────────
function buildStaffOverview(){
  set('pageContainer',`
  <div class="card">
    <div class="card-title">Staff assignments — all staff</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Staff member</th><th>Leads</th><th>Supporting</th><th>Total % effort</th><th>Types</th><th>Winding down</th><th>Upcoming</th></tr></thead><tbody>
    ${STAFF_LIST.map(s=>{
      const leading=projects.filter(p=>(p.team||[]).some(m=>m.name===s&&m.lead));
      const supporting=projects.filter(p=>(p.team||[]).some(m=>m.name===s&&!m.lead));
      const all=projects.filter(p=>(p.team||[]).some(m=>m.name===s));
      const totalPct=all.filter(p=>p.type==='pct').reduce((a,p)=>{const m=(p.team||[]).find(x=>x.name===s);return a+(m&&m.pct?Number(m.pct):0);},0);
      const types=[...new Set(all.map(p=>p.type))];
      const wind=all.filter(p=>p.status==='winding');
      const up=all.filter(p=>p.status==='upcoming');
      return`<tr>
        <td style="font-weight:600;font-size:13px"><div style="display:flex;align-items:center;gap:8px"><div class="initials">${initials(s)}</div>${s}</div></td>
        <td>${leading.length?leading.map(p=>`<div style="font-size:12px;font-weight:600;color:#3C3489">${p.project}</div>`).join(''):'<span style="color:#999;font-size:12px">—</span>'}</td>
        <td>${supporting.length?supporting.map(p=>`<div style="font-size:12px;color:#666">${p.project}</div>`).join(''):'<span style="color:#999;font-size:12px">—</span>'}</td>
        <td style="font-size:13px">${totalPct>0?totalPct+'%':'—'}</td>
        <td>${types.map(t=>`<span class="badge ${typeClass(t)}">${typeLabel(t)}</span>`).join(' ')}</td>
        <td>${wind.length?wind.map(p=>`<div style="font-size:11px;color:#854F0B">${p.project} → ${fmtDate(p.end)}</div>`).join(''):'<span style="color:#999;font-size:12px">—</span>'}</td>
        <td>${up.length?up.map(p=>`<div style="font-size:11px;color:#185FA5">${p.project} → ${fmtDate(p.start)}</div>`).join(''):'<span style="color:#999;font-size:12px">—</span>'}</td>
      </tr>`;}).join('')}
    </tbody></table></div>
  </div>`);
}

function toggleTypeFields(){
  const t=val('f_type');
  get('f_val_group').style.display=t==='pct'||t==='hr'||t==='ctsi'?'flex':'none';
  get('f_pay_group').style.display=t==='pct'?'flex':'none';
  const pw=get('pct_per_staff_wrap');if(pw)pw.style.display=t==='pct'?'block':'none';
  renderTeamBuilder();
}
function addTeamMember(){
  const sel=get('addStaffSelect');const name=sel.value;if(!name)return;
  if(intakeTeam.find(m=>m.name===name)){alert('Already added.');return;}
  const t=val('f_type');
  const pct=t==='pct'?(parseInt((get('addStaffPct')||{}).value)||null):null;
  intakeTeam.push({name,pct,lead:intakeTeam.length===0});
  sel.value='';const pe=get('addStaffPct');if(pe)pe.value='';
  renderTeamBuilder();
}
function removeTeamMember(name){
  intakeTeam=intakeTeam.filter(m=>m.name!==name);
  if(intakeTeam.length&&!intakeTeam.some(m=>m.lead))intakeTeam[0].lead=true;
  renderTeamBuilder();
}
function setLead(name){intakeTeam.forEach(m=>m.lead=m.name===name);renderTeamBuilder();}
function renderTeamBuilder(){
  const t=val('f_type');const el=get('teamBuilder');if(!el)return;
  if(!intakeTeam.length){el.innerHTML=`<div style="font-size:12px;color:#888;padding:8px">No team members added yet.</div>`;return;}
  el.innerHTML=intakeTeam.map(m=>`
    <div class="staff-row-item ${m.lead?'is-lead':''}">
      <div class="initials">${initials(m.name)}</div>
      <span class="staff-name">${m.name}</span>
      ${m.lead?`<span class="badge lead">Lead</span>`:`<button class="btn sm" style="font-size:11px;padding:2px 8px" onclick="setLead('${m.name}')">Set as lead</button>`}
      ${t==='pct'?`<span class="pct-note">${m.pct?m.pct+'%':'—%'}</span>`:''}
      ${!m.lead?`<button class="btn sm danger" style="font-size:11px;padding:2px 8px;margin-left:auto" onclick="removeTeamMember('${m.name}')">Remove</button>`:''}
    </div>`).join('');
}

async function submitProject(){
  const submitter=val('f_submitter').trim(),pi=val('f_pi').trim(),proj=val('f_project').trim();
  const type=val('f_type'),start=val('f_start'),end=val('f_end'),dept=val('f_dept');
  const isPublic=session.role==='public';
  if(!submitter||!pi||!proj||!type||!start||!end||!dept){alert('Please fill in all required fields (*).');return;}
  if(!isPublic&&!intakeTeam.length){const te=get('teamError');if(te)te.style.display='block';return;}
  const btn=get('submitBtn');if(btn){btn.disabled=true;btn.textContent='Submitting...';}
  const bv=parseFloat(val('f_val'))||null;
  const record={
    id:String(nextProjId++),pi,project:proj,type,department:dept,
    grant:val('f_grant')||'',start,end,
    totalValue:type==='pct'?bv:null,
    fundsReceived:0,budgetTarget:bv,
    status:new Date(start)>new Date()?'upcoming':'active',
    projectStatus:val('f_projStatus')||'New Project',
    notes:val('f_notes')||'',submittedBy:submitter,
    submittedDate:new Date().toISOString().split('T')[0],
    fundManagerStatus:'pending',
    lead:isPublic?'':(intakeTeam.find(m=>m.lead)||{name:''}).name,
    team:isPublic?[]:intakeTeam
  };
  projects.push(record);
  const ok=await saveRecord('add',projectToRow(record),'Sheet1');
  if(btn){btn.disabled=false;btn.textContent='Submit';}
  openModal(`
    <div class="modal-title">Submission received</div>
    <div class="alert ${ok?'success':'warning'}" style="margin-bottom:1rem">${ok?'Saved to Google Sheets successfully.':'Saved locally — Google Sheets connection could not be confirmed.'}</div>
    <p style="font-size:13px;color:#666;margin-bottom:6px"><strong>Project:</strong> ${proj}</p>
    <p style="font-size:13px;color:#666;margin-bottom:6px"><strong>PI:</strong> ${pi}</p>
    <p style="font-size:13px;color:#666;margin-bottom:1rem"><strong>Department:</strong> ${dept}</p>
    ${isPublic?`<p style="font-size:13px;color:#666;margin-bottom:1rem">Track the status of this submission using the My Submissions tab.</p>`:''}
    <div class="form-actions">
      ${isPublic?`<button class="btn primary" onclick="closeModal();renderPage('mystatus')">Track my submission</button>`:''}
      <button class="btn ${isPublic?'':'primary'}" onclick="closeModal();renderPage('intake')">Submit another</button>
    </div>`);
}

// ── MY STATUS (public) ─────────────────────────────────────────────────────
function buildMyStatus(){
  set('pageContainer',`
  <div class="card">
    <div class="card-title">My submissions</div>
    <p style="font-size:13px;color:#666;margin-bottom:1rem">Enter the name you used when submitting to see your submissions.</p>
    <div style="display:flex;gap:8px;margin-bottom:1rem">
      <input id="statusSearch" type="text" placeholder="Your name as submitted..." style="flex:1">
      <button class="btn primary" onclick="searchMyStatus()">Search</button>
    </div>
    <div id="statusResults"></div>
  </div>`);
}
function searchMyStatus(){
  const name=val('statusSearch').toLowerCase().trim();
  if(!name){set('statusResults',`<div class="empty">Please enter your name to search.</div>`);return;}
  const mine=projects.filter(p=>p.submittedBy&&p.submittedBy.toLowerCase().includes(name));
  if(!mine.length){set('statusResults',`<div class="empty">No submissions found for that name.</div>`);return;}
  set('statusResults',`<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI</th><th>Dept</th><th>Type</th><th>Submitted</th><th>Start</th><th>Processing status</th></tr></thead><tbody>
  ${mine.map(p=>`<tr>
    <td style="font-weight:600">${p.project}</td>
    <td style="font-size:12px;color:#666">${p.pi}</td>
    <td style="font-size:12px;color:#666">${p.department||'—'}</td>
    <td><span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></td>
    <td style="font-size:12px;color:#666">${fmtDate(p.submittedDate)}</td>
    <td style="font-size:12px;color:#666">${fmtDate(p.start)}</td>
    <td><span style="font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;${p.fundManagerStatus==='processed'?'background:#EAF3DE;color:#3B6D11':'background:#FAEEDA;color:#854F0B'}">${p.fundManagerStatus==='processed'?'Processed':'Pending processing'}</span></td>
  </tr>`).join('')}
  </tbody></table></div>`);
}

// ── PROJECT DETAIL MODAL ───────────────────────────────────────────────────
function showDetail(id){
  const p=projects.find(x=>String(x.id)===String(id));if(!p)return;
  const canSeeFunds=session.role==='fund'||session.role==='admin';
  const projHrs=projectHoursTotal(p.id);
  const projBill=projectBillingTotal(p.id);
  const budgetRem=p.budgetTarget?(p.budgetTarget-projBill):null;
  openModal(`
    <div class="modal-title">${p.project}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:1rem">
      <div><span style="color:#666">PI:</span> ${p.pi}</div>
      <div><span style="color:#666">Department:</span> ${p.department||'—'}</div>
      <div><span style="color:#666">Type:</span> <span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></div>
      <div><span style="color:#666">Project status:</span> <span class="badge ${projStatusClass(p.projectStatus)}">${p.projectStatus||'Active Project'}</span></div>
      <div><span style="color:#666">Start:</span> ${fmtDate(p.start)}</div>
      <div><span style="color:#666">End:</span> ${fmtDate(p.end)}</div>
      ${p.grant?`<div><span style="color:#666">Grant #:</span> ${p.grant}</div>`:''}
      ${canSeeFunds&&p.totalValue!=null?`<div><span style="color:#666">Total value:</span> ${fmtMoney(p.totalValue)}</div>`:''}
      ${canSeeFunds?`<div><span style="color:#666">Budget target:</span> ${fmtMoney(p.budgetTarget)}</div>`:''}
      ${canSeeFunds?`<div><span style="color:#666">Hours logged:</span> ${fmtHrs(projHrs)}</div>`:''}
      ${canSeeFunds?`<div><span style="color:#666">Amount billed:</span> <span style="color:#3B6D11;font-weight:500">${fmtMoney(projBill)}</span></div>`:''}
      ${canSeeFunds&&budgetRem!=null?`<div><span style="color:#666">Budget remaining:</span> <span style="color:${budgetRem<0?'#A32D2D':'#3B6D11'};font-weight:500">${fmtMoney(budgetRem)}</span></div>`:''}
      ${canSeeFunds?`<div><span style="color:#666">FM status:</span> <span class="badge ${p.fundManagerStatus==='processed'?'processed':'pending'}">${p.fundManagerStatus==='processed'?'Processed':'Pending'}</span></div>`:''}
    </div>
    <div style="margin-bottom:1rem">
      <div style="font-size:12px;font-weight:600;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Team</div>
      ${(p.team||[]).length?((p.team||[]).map(m=>`
        <div class="staff-row-item ${m.lead?'is-lead':''}">
          <div class="initials">${initials(m.name)}</div>
          <span class="staff-name">${m.name}</span>
          ${m.lead?`<span class="badge lead">Lead</span>`:''}
          ${p.type==='pct'&&m.pct?`<span class="pct-note">${m.pct}%</span>`:''}
        </div>`).join('')):`<div style="font-size:12px;color:#999;padding:8px">Team not yet assigned</div>`}
    </div>
    ${p.notes?`<div style="font-size:13px;background:#f5f5f5;padding:10px 12px;border-radius:8px;color:#666;margin-bottom:1rem">${p.notes}</div>`:''}
    <div class="form-actions">
      ${session.role==='fund'&&p.fundManagerStatus==='pending'?`<button class="btn primary" onclick="markProcessed('${p.id}');closeModal()">Mark processed</button>`:''}
      <button class="btn" onclick="closeModal()">Close</button>
    </div>`);
}
