<!DOCTYPE html>
<html>
<head>
<style>
body{font-family:sans-serif;padding:2rem;background:#f5f5f5}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:2rem;max-width:400px;margin:0 auto}
.tabs{display:flex;gap:4px;background:#f0f0f0;padding:4px;border-radius:8px;margin-bottom:1rem}
.tab{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;background:transparent;font-size:13px}
.tab.active{background:#fff;color:#185FA5;font-weight:600}
.panel{display:none}.panel.show{display:block}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
label{font-size:12px;color:#555;font-weight:500}
input,select{padding:8px;border:1px solid #ccc;border-radius:6px;font-size:13px}
.btn{width:100%;padding:10px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-top:4px}
.err{color:#c00;font-size:12px;display:none;margin-bottom:8px}
#result{margin-top:1rem;padding:12px;border-radius:8px;background:#e8f5e9;font-size:13px;display:none}
</style>
</head>
<body>
<div class="card">
  <h2 style="margin-bottom:4px">DOMStat Login Test</h2>
  <p style="font-size:12px;color:#888;margin-bottom:1rem">Minimal test — no Google Sheets calls</p>
  
  <div class="tabs">
    <button class="tab active" onclick="showTab('staff')">Staff</button>
    <button class="tab" onclick="showTab('faculty')">Faculty</button>
    <button class="tab" onclick="showTab('admin')">Admin/FM</button>
  </div>

  <!-- Staff -->
  <div class="panel show" id="p-staff">
    <div class="fg"><label>Name</label>
      <select id="ln-staff">
        <option value="">Select...</option>
        <option>Josh Lee</option>
        <option>Jenny Brook</option>
        <option>Sitaram Vangala</option>
      </select>
    </div>
    <div class="fg"><label>Role</label>
      <select id="lr-staff">
        <option value="staff">Staff</option>
        <option value="staffmgr">Staff Manager</option>
      </select>
    </div>
    <div class="fg"><label>Passcode</label>
      <input type="password" id="lc-staff" placeholder="Enter passcode">
    </div>
    <div class="err" id="le-staff">Incorrect passcode</div>
    <button class="btn" onclick="doLogin('staff')">Sign in</button>
  </div>

  <!-- Faculty -->
  <div class="panel" id="p-faculty">
    <div class="fg"><label>Name</label>
      <select id="ln-faculty">
        <option value="">Select...</option>
        <option>David Elashoff</option>
        <option>Nicholas Jackson</option>
        <option>Chi-Hong Tseng</option>
      </select>
    </div>
    <div class="fg"><label>Passcode</label>
      <input type="password" id="lc-faculty" placeholder="Enter passcode">
    </div>
    <div class="err" id="le-faculty">Incorrect passcode</div>
    <button class="btn" onclick="doLogin('faculty')">Sign in</button>
  </div>

  <!-- Admin -->
  <div class="panel" id="p-admin">
    <div class="fg"><label>Role</label>
      <select id="lr-admin">
        <option value="fund">Fund Manager</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="fg"><label>Passcode</label>
      <input type="password" id="lc-admin" placeholder="Enter passcode">
    </div>
    <div class="err" id="le-admin">Incorrect passcode</div>
    <button class="btn" onclick="doLogin('admin')">Sign in</button>
  </div>

  <div id="result"></div>
</div>

<script>
var PASSCODES = {
  staff: 'staff123',
  staffmgr: 'StaffManager123',
  faculty: 'Faculty123',
  fund: 'fund456',
  admin: 'admin789'
};

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(function(b,i){
    b.className = 'tab' + (['staff','faculty','admin'][i]===tab?' active':'');
  });
  document.querySelectorAll('.panel').forEach(function(p){
    p.className = 'panel';
  });
  document.getElementById('p-'+tab).className = 'panel show';
}

function get(id){ return document.getElementById(id); }
function val(id){ var e=get(id); return e?e.value:''; }

function doLogin(tab) {
  var role, name, code, errEl, expectedCode;

  if (tab === 'staff') {
    role = val('lr-staff');
    name = val('ln-staff');
    code = val('lc-staff');
    errEl = get('le-staff');
    if (!name) { alert('Select your name'); return; }
    var isSitaram = (name === 'Sitaram Vangala' && role === 'staffmgr');
    expectedCode = isSitaram ? PASSCODES.admin : (role === 'staffmgr' ? PASSCODES.staffmgr : PASSCODES.staff);
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
    if (isSitaram) role = 'assocdir';

  } else if (tab === 'faculty') {
    name = val('ln-faculty');
    code = val('lc-faculty');
    errEl = get('le-faculty');
    if (!name) { alert('Select your name'); return; }
    role = name === 'David Elashoff' ? 'director' : 'faculty';
    expectedCode = role === 'director' ? PASSCODES.admin : PASSCODES.faculty;
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }

  } else {
    role = val('lr-admin');
    code = val('lc-admin');
    errEl = get('le-admin');
    expectedCode = role === 'fund' ? PASSCODES.fund : PASSCODES.admin;
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
    name = role === 'fund' ? 'Fund Manager' : 'Admin';
  }

  errEl.style.display = 'none';
  var result = get('result');
  result.style.display = 'block';
  result.style.background = '#e8f5e9';
  result.innerHTML = '<strong>✓ Login successful</strong><br>Role: ' + role + '<br>Name: ' + name;
}
</script>
</body>
</html>
