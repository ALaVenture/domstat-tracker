// ── Utilities ──────────────────────────────────────────────────────────────
function set(id,html){const e=document.getElementById(id);if(e)e.innerHTML=html;}
function get(id){return document.getElementById(id);}
function val(id){const e=get(id);return e?e.value:'';}
function setSyncStatus(state,msg){
  const dot=get('syncDot'),txt=get('syncStatus');
  if(!dot||!txt)return;
  dot.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  txt.textContent=msg;
}
function openModal(html){set('modalContent',html);get('modalOverlay').classList.add('open');}
function closeModal(){get('modalOverlay').classList.remove('open');}
function closeModalOnOverlay(e){if(e.target===get('modalOverlay'))closeModal();}

function getlead(p){return(p.team||[]).find(m=>m.lead)||(p.team||[])[0]||{name:p.lead||'—'};}
function fmtDate(d){if(!d)return'—';try{const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return d;}}
function fmtMoney(n){return(n===null||n===undefined||n==='')?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtHrs(n){return(n===null||n===undefined||n==='')?'—':Number(n).toFixed(1);}
function daysLeft(end){return Math.ceil((new Date(end)-new Date())/86400000);}
function progressPct(s,e){const n=new Date(),st=new Date(s),en=new Date(e);if(n<st)return 0;if(n>en)return 100;return Math.round((n-st)/(en-st)*100);}

// ── Quarter helpers ────────────────────────────────────────────────────────
function getQuarter(dateStr){
  if(!dateStr)return null;
  const m=new Date(dateStr).getMonth()+1;
  return m<=3?'Q1':m<=6?'Q2':m<=9?'Q3':'Q4';
}
function getYear(dateStr){if(!dateStr)return null;return new Date(dateStr).getFullYear();}
function getFridayWeeks(n){
  const weeks=[];
  let d=new Date();
  d.setHours(0,0,0,0);
  const day=d.getDay();
  const diff=day<=5?5-day:5-day+7;
  d.setDate(d.getDate()+diff);
  for(let i=0;i<n;i++){
    const copy=new Date(d);
    weeks.push(copy.toISOString().split('T')[0]);
    d.setDate(d.getDate()-7);
  }
  return weeks;
}
function currentQuarter(){return getQuarter(new Date().toISOString());}
function currentYear(){return new Date().getFullYear();}

    fundsReceived:(r.fundsReceived!==''&&r.fundsReceived!=null)?Number(r.fundsReceived):null,

    lead:r.lead||'',team:parseTeam(r.team)
  };
}

  };

    projectStatus:r.projectStatus||'Active Project',notes:r.notes||'',
    submittedDate:r.submittedDate||'',quarter:r.quarter||'',year:Number(r.year)||0
  };
}

function rowToApproval(r){
  return{id:String(r.id||''),requestType:r.requestType||'',requestedBy:r.requestedBy||'',
    projectId:String(r.projectId||''),projectName:r.projectName||'',
    fieldChanged:r.fieldChanged||'',oldValue:r.oldValue||'',newValue:r.newValue||'',
    status:r.status||'pending',requestedDate:r.requestedDate||'',
    reviewedBy:r.reviewedBy||'',reviewedDate:r.reviewedDate||'',notes:r.notes||''};
}

async function submitApproval(requestType,projectId,projectName,fieldChanged,oldValue,newValue){
  const rec={
    id:String(nextIds.approvals++),requestType,requestedBy:session.name,
    projectId,projectName,fieldChanged,
    oldValue:typeof oldValue==='object'?JSON.stringify(oldValue):String(oldValue||''),
    newValue:typeof newValue==='object'?JSON.stringify(newValue):String(newValue||''),
    status:'pending',requestedDate:new Date().toISOString().split('T')[0],
    reviewedBy:'',reviewedDate:'',notes:''
  };
  approvals.push(rec);
  await saveRecord('add',rec,'approvals');
  return rec;
}

// ── API calls ──────────────────────────────────────────────────────────────
async function loadData(manual){
  setSyncStatus('syncing',manual?'Refreshing...':'Connecting...');
  try{
    const res=await fetch(API+'?t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(Array.isArray(data)){
      projects=data.map(rowToProject).filter(p=>p.id&&p.project);
      nextIds={...nextIds,proj:projects.length?Math.max(...projects.map(p=>Number(p.id)||0))+1:1};
    }else projects=[];
    try{
      const hres=await fetch(API+'?sheet=hours&t='+Date.now());
      if(hres.ok){const hdata=await hres.json();if(Array.isArray(hdata)){hoursData=hdata.map(rowToHours).filter(h=>h.id&&h.projectId);nextIds.hours=hoursData.length?Math.max(...hoursData.map(h=>Number(h.id)||0))+1:1;}}
    }catch(e){hoursData=[];}
    try{
      const ares=await fetch(API+'?sheet=approvals&t='+Date.now());
      if(ares.ok){const adata=await ares.json();if(Array.isArray(adata)){approvals=adata.map(rowToApproval).filter(a=>a.id);nextIds.approvals=approvals.length?Math.max(...approvals.map(a=>Number(a.id)||0))+1:1;}}
    }catch(e){approvals=[];}
    try{const pres=await fetch(API+'?sheet=profiles&t='+Date.now());if(pres.ok){const pd=await pres.json();if(Array.isArray(pd)){profilesData={};pd.forEach(r=>{if(r.staffName){try{profilesData[r.staffName]={skills:JSON.parse(r.skills||'[]'),updatedDate:r.updatedDate||''};}catch(e){profilesData[r.staffName]={skills:[],updatedDate:''};}}});}}}catch(e){profilesData={};}
    try{const sres=await fetch(API+'?sheet=skillRequests&t='+Date.now());if(sres.ok){const sd=await sres.json();if(Array.isArray(sd)){skillRequests=sd.filter(r=>r.id);nextSkillReqId=skillRequests.length?Math.max(...skillRequests.map(r=>Number(r.id)||0))+1:1;}}}catch(e){skillRequests=[];}
    setSyncStatus('ok',(manual?'Refreshed — ':'Connected — ')+projects.length+' project'+(projects.length!==1?'s':''));
    setTimeout(()=>setSyncStatus('ok','Live — Google Sheets'),3000);
  }catch(e){
    setSyncStatus('error','Connection failed');
  }
  renderNav();renderPage(currentPage);
}


async function saveRecord(action,record,sheet){
  setSyncStatus('syncing','Saving...');
  try{
    await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action,record,sheet:sheet||'Sheet1'})});
    setSyncStatus('ok','Saved');
    setTimeout(()=>setSyncStatus('ok','Live — Google Sheets'),2000);
    return true;
  }catch(e){setSyncStatus('error','Save failed');return false;}
}

function projectHoursTotal(projectId){return hoursData.filter(h=>h.projectId===projectId).reduce((a,h)=>a+h.hours,0);}
function projectBillingTotal(projectId){return hoursData.filter(h=>h.projectId===projectId).reduce((a,h)=>a+h.billingAmount,0);}

function getBudgetBar(p){
  if(!p.budgetTarget)return'';
  const spent=projectBillingTotal(p.id);
  const pct=Math.min(100,Math.round((spent/p.budgetTarget)*100));
  const color=pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#639922';
  return`<div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${color}"></div></div>
    <div style="font-size:10px;color:#888;margin-top:2px">${fmtMoney(spent)} / ${fmtMoney(p.budgetTarget)}</div>`;
}

function buildDashboard(){
  const isStaff=session.role==='staff'||session.role==='staffmgr';
  const myP=isStaff?projects.filter(p=>(p.team||[]).some(m=>m.name===session.name)):projects;
  const active=myP.filter(p=>p.status==='active').length;
  const winding=myP.filter(p=>p.status==='winding').length;
  const upcoming=myP.filter(p=>p.status==='upcoming').length;
  const qHrs=hoursData.filter(h=>h.quarter===currentQuarter()&&h.year===currentYear()&&(isStaff?h.staffName===session.name:true)).reduce((a,h)=>a+h.hours,0);
  const canSeeFunds=['fund','admin','director','assocdir'].includes(session.role);
  const pendingApprovals=(typeof approvals!=='undefined'&&canApprove())?approvals.filter(a=>a.status==='pending'):[];
  const myPendingReqs=(session.role==='staff'&&typeof approvals!=='undefined')?approvals.filter(a=>a.requestedBy===session.name&&a.status==='pending'):[];
  const myApprovedReqs=(session.role==='staff'&&typeof approvals!=='undefined')?approvals.filter(a=>a.requestedBy===session.name&&a.status==='approved'):[];
  const alerts=[];
  if(canApprove()&&pendingApprovals.length)alerts.push({t:'warning',m:`<strong>${pendingApprovals.length} change request${pendingApprovals.length>1?'s':''}</strong> awaiting approval — <a href="#" onclick="renderPage('approvals');return false" style="color:inherit;font-weight:600">Review now →</a>`});
  const pendingSkillCount=(typeof skillRequests!=='undefined')?skillRequests.filter(r=>r.status==='pending').length:0;
  if(canApprove()&&pendingSkillCount)alerts.push({t:'info',m:`<strong>${pendingSkillCount} skill addition request${pendingSkillCount>1?'s':''}</strong> awaiting approval — <a href="#" onclick="renderPage('staffskills');return false" style="color:inherit;font-weight:600">Review in Staff Skills →</a>`});
  if(myPendingReqs.length)alerts.push({t:'info',m:`You have <strong>${myPendingReqs.length} pending request${myPendingReqs.length>1?'s':''}</strong> awaiting admin approval`});
  myApprovedReqs.forEach(a=>alerts.push({t:'success',m:`Your request to change <strong>${a.fieldChanged}</strong> on <em>${a.projectName}</em> was approved`}));
  myP.filter(p=>p.status==='winding').forEach(p=>{const d=daysLeft(p.end);if(d<90&&d>0)alerts.push({t:'warning',m:`<strong>${p.project}</strong> winds down in ${d} days`});});
  myP.filter(p=>p.status==='upcoming').forEach(p=>alerts.push({t:'info',m:`<strong>${p.project}</strong> starts ${fmtDate(p.start)}`}));
  if(canSeeFunds)myP.filter(p=>p.fundManagerStatus==='pending').forEach(p=>alerts.push({t:'warning',m:`Fund manager action needed: <strong>${p.project}</strong>`}));
  if(canSeeFunds)myP.filter(p=>p.budgetTarget&&projectBillingTotal(p.id)/p.budgetTarget>=0.9).forEach(p=>{

  const outstanding=canSeeFunds?myP.reduce((a,p)=>a+Math.max(0,(Number(p.totalValue)||0)-(Number(p.fundsReceived)||0)),0):null;
  set('pageContainer',`

    ${canSeeFunds?`<div class="metric"><div class="metric-label">Outstanding funds</div><div class="metric-value mv-red">${fmtMoney(outstanding)}</div></div>`:`<div class="metric"><div class="metric-label">Upcoming</div><div class="metric-value">${upcoming}</div></div>`}
  </div>
  ${alerts.length?`<div class="card"><div class="card-title">Alerts</div>${alerts.map(a=>`<div class="alert ${a.t}">${a.m}</div>`).join('')}</div>`:''}
  <div class="card">
    <div class="section-header"><span class="card-title" style="margin:0">${isStaff?'My projects':'All projects'} (${myP.length})</span></div>
    ${!myP.length?'<div class="empty">No projects yet.</div>':
    `<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Team</th><th>Status</th>${canSeeFunds?'<th>Budget</th>':''}</tr></thead><tbody>

      <td style="font-weight:600">${p.project}</td>
      <td style="font-size:12px;color:#666">${p.pi}${p.department?`<br><span style="color:#aaa">${p.department}</span>`:''}</td>

      <td>${renderTeamPills(p)}</td>
      <td><span class="badge ${statusClass(p.status)}">${statusLabel(p.status)}</span></td>
      ${canSeeFunds?`<td>${getBudgetBar(p)}</td>`:''}
    </tr>`).join('')}
    </tbody></table></div>`}
  </div>`);

function applyAllFilters(){

  const f=projects.filter(p=>{

function calcBilling(projId,svcIdx,staffName){
  const rate=RATES[staffName]||66.08;
  const hrs=parseFloat(get('hrs_'+projId+'_'+svcIdx).value)||0;
  const bill=hrs*rate;
  const billEl=get('bill_'+projId+'_'+svcIdx);
  if(billEl)billEl.textContent=hrs>0?fmtMoney(bill):'—';
  let totalHrs=0,totalBill=0;
  SERVICE_TYPES.forEach((_,i)=>{
    const h=parseFloat((get('hrs_'+projId+'_'+i)||{}).value)||0;
    totalHrs+=h;totalBill+=h*rate;
  });
  const tot=get('projWeekTotal_'+projId);
  if(tot)tot.innerHTML=totalHrs.toFixed(1)+' hrs — '+fmtMoney(totalBill);
}

async function submitHours(){
  const weekEnding=val('logWeek');
  const staffName=session.role==='admin'?val('logStaff'):session.name;
  if(!staffName){alert('Please select a staff member.');return;}
  if(!weekEnding){alert('Please select a week ending date.');return;}
  const rate=RATES[staffName]||66.08;
  const q=getQuarter(weekEnding);
  const yr=getYear(weekEnding);
  const entries=[];
  projects.filter(p=>(p.team||[]).some(m=>m.name===staffName)).forEach(p=>{
    const newStatus=val('ps_'+p.id)||p.projectStatus||'Active Project';
    SERVICE_TYPES.forEach((svc,si)=>{
      const hrs=parseFloat((get('hrs_'+p.id+'_'+si)||{}).value)||0;
      if(hrs>0){
        entries.push({
          id:String(nextHoursId++),projectId:p.id,staffName,
          weekEnding,serviceType:svc,hours:hrs,
          billingAmount:parseFloat((hrs*rate).toFixed(2)),
          pctEffort:parseFloat((hrs/520).toFixed(4)),
          projectStatus:newStatus,notes:'',
          submittedDate:new Date().toISOString().split('T')[0],
          quarter:q,year:yr
        });
      }
    });
    // Update project status if changed
    if(newStatus!==p.projectStatus){
      p.projectStatus=newStatus;
      saveRecord('update',projectToRow(p),'Sheet1');
    }
  });
  if(!entries.length){alert('No hours entered. Please enter hours for at least one project and service type.');return;}
  let saved=0;
  for(const entry of entries){
    hoursData.push(entry);
    const ok=await saveRecord('add',hoursToRow(entry),'hours');
    if(ok)saved++;
  }
  openModal(`
    <div class="modal-title">Hours submitted</div>
    <div class="alert success" style="margin-bottom:1rem">${saved} entries saved for week ending ${fmtDate(weekEnding)}.</div>
    <p style="font-size:13px;color:#666;margin-bottom:1rem"><strong>Staff:</strong> ${staffName}<br>
    <strong>Total hours:</strong> ${entries.reduce((a,e)=>a+e.hours,0).toFixed(1)}<br>
    <strong>Total billing:</strong> ${fmtMoney(entries.reduce((a,e)=>a+e.billingAmount,0))}</p>
    <div class="form-actions">
      <button class="btn primary" onclick="closeModal();renderPage('myhours')">View my hours</button>
      <button class="btn" onclick="closeModal();renderPage('loghours')">Log another week</button>
    </div>`);
}

function filterBilling(q,yr){
  document.querySelectorAll('[id^=bilQ_]').forEach(b=>{b.className='quarter-btn'+(b.textContent===q?' active':'');});
  renderBillingTable(q,parseInt(yr));
}

function renderBillingTable(q,yr){
  const staff=val('bilStaff'),pi=val('bilPI'),svc=val('bilSvc');
  let h=hoursData.filter(x=>x.quarter===q&&x.year===yr);
  if(staff)h=h.filter(x=>x.staffName===staff);
  if(svc)h=h.filter(x=>x.serviceType===svc);
  if(pi){const pids=projects.filter(p=>p.pi===pi).map(p=>p.id);h=h.filter(x=>pids.includes(x.projectId));}
  const totalHrs=h.reduce((a,x)=>a+x.hours,0);
  const totalBill=h.reduce((a,x)=>a+x.billingAmount,0);
  // Aggregate by project
  const byProj={};
  h.forEach(x=>{
    if(!byProj[x.projectId])byProj[x.projectId]={hours:0,billing:0,staff:new Set(),services:new Set()};
    byProj[x.projectId].hours+=x.hours;
    byProj[x.projectId].billing+=x.billingAmount;
    byProj[x.projectId].staff.add(x.staffName);
    byProj[x.projectId].services.add(x.serviceType);
  });
  const el=get('billingContent');
  if(!el)return;
  if(!h.length){el.innerHTML=`<div class="empty">No hours logged for ${q} ${yr} matching these filters.</div>`;return;}
  el.innerHTML=`
    <div class="metrics" style="margin-bottom:1rem">
      <div class="metric"><div class="metric-label">Total hours (${q} ${yr})</div><div class="metric-value mv-blue">${fmtHrs(totalHrs)}</div></div>
      <div class="metric"><div class="metric-label">Total billing</div><div class="metric-value mv-green">${fmtMoney(totalBill)}</div></div>
      <div class="metric"><div class="metric-label">Projects billed</div><div class="metric-value mv-purple">${Object.keys(byProj).length}</div></div>
      <div class="metric"><div class="metric-label">% effort (team)</div><div class="metric-value mv-amber">${(totalHrs/520*100).toFixed(1)}%</div></div>
    </div>
    <div class="tab-group" style="margin-bottom:1rem">
      <button class="tab-btn active" id="bilTabProj" onclick="switchBilTab('project','${q}',${yr})">By project</button>
      <button class="tab-btn" id="bilTabDetail" onclick="switchBilTab('detail','${q}',${yr})">Line items</button>
    </div>
    <div id="bilTabContent">${buildBilProjectView(byProj)}</div>`;
}

function switchBilTab(tab,q,yr){
  get('bilTabProj').className='tab-btn'+(tab==='project'?' active':'');
  get('bilTabDetail').className='tab-btn'+(tab==='detail'?' active':'');
  const staff=val('bilStaff'),pi=val('bilPI'),svc=val('bilSvc');
  let h=hoursData.filter(x=>x.quarter===q&&x.year===yr);
  if(staff)h=h.filter(x=>x.staffName===staff);
  if(svc)h=h.filter(x=>x.serviceType===svc);
  if(pi){const pids=projects.filter(p=>p.pi===pi).map(p=>p.id);h=h.filter(x=>pids.includes(x.projectId));}
  const byProj={};
  h.forEach(x=>{if(!byProj[x.projectId])byProj[x.projectId]={hours:0,billing:0,staff:new Set(),services:new Set()};byProj[x.projectId].hours+=x.hours;byProj[x.projectId].billing+=x.billingAmount;byProj[x.projectId].staff.add(x.staffName);byProj[x.projectId].services.add(x.serviceType);});
  set('bilTabContent',tab==='project'?buildBilProjectView(byProj):buildBilDetailView(h));
}

function buildBilProjectView(byProj){
  if(!Object.keys(byProj).length)return`<div class="empty">No data</div>`;
  return`<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Staff</th><th>Hours</th><th>Billing amount</th><th>Budget target</th><th>Budget remaining</th><th>FM status</th></tr></thead><tbody>
  ${Object.entries(byProj).map(([pid,d])=>{
    const p=projects.find(x=>x.id===pid);if(!p)return'';
    const budgetRem=p.budgetTarget?(p.budgetTarget-projectBillingTotal(p.id)):null;
    const budgetPct=p.budgetTarget?Math.min(100,Math.round(projectBillingTotal(p.id)/p.budgetTarget*100)):null;
    const bsClass=budgetPct===null?'':budgetPct>=100?'bs-over':budgetPct>=80?'bs-warn':'bs-ok';
    return`<tr>
      <td style="font-weight:600">${p.project}</td>
      <td style="font-size:12px;color:#666">${p.pi}${p.department?`<br><span style="color:#aaa">${p.department}</span>`:''}</td>
      <td><span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></td>
      <td style="font-size:12px">${[...d.staff].map(s=>s.split(' ').pop()).join(', ')}</td>
      <td style="font-weight:500">${fmtHrs(d.hours)}</td>
      <td style="font-weight:500;color:#3B6D11">${fmtMoney(d.billing)}</td>
      <td style="font-size:12px">${fmtMoney(p.budgetTarget)}</td>
      <td>${budgetRem!==null?`<span class="budget-status ${bsClass}">${fmtMoney(budgetRem)}</span>`:'—'}</td>
      <td><span class="badge ${p.fundManagerStatus==='processed'?'processed':'pending'}">${p.fundManagerStatus==='processed'?'Processed':'Pending'}</span></td>
    </tr>`;}).join('')}
  </tbody></table></div>`;

      <td style="font-size:12px;font-weight:600">${a.projectName}</td>

async function reviewApproval(id,decision){
  if(typeof approvals==='undefined')approvals=[];
  const a=approvals.find(x=>x.id===id);if(!a)return;
  a.status=decision;a.reviewedBy=session.name;a.reviewedDate=new Date().toISOString().split('T')[0];
  if(decision==='approved'){
    if(a.requestType==='join_project'){
      const p=projects.find(x=>x.id===a.projectId);
      if(p&&!(p.team||[]).some(m=>m.name===a.requestedBy)){
        p.team=[...(p.team||[]),{name:a.requestedBy,pct:null,lead:false}];
        await saveRecord('update',projectToRow(p),'Sheet1');
      }
    } else if(a.requestType==='project_edit'||a.requestType==='field_change'){
      try{const updates=JSON.parse(a.newValue);const p=projects.find(x=>x.id===a.projectId);if(p){Object.assign(p,updates);await saveRecord('update',projectToRow(p),'Sheet1');}}catch(e){}
    }
  }
  await saveRecord('update',a,'approvals');
  buildApprovals();
}

function buildEditProjectList(list){
  if(!list.length)return'<div class="empty">No projects match your search.</div>';

    const onTeam=(p.team||[]).some(m=>m.name===session.name);

    return`<div style="border:1px solid #e5e5e5;border-radius:8px;padding:12px;margin-bottom:8px;background:#fff">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">

        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${!onTeam?`<button class="btn sm primary" onclick="joinProject('${p.id}')">+ Join</button>`:'<span style="font-size:12px;color:#3B6D11;font-weight:500;padding:5px">✓ On team</span>'}
          ${canEdit?`<button class="btn sm" onclick="openEditModal('${p.id}')">Edit</button>`:''}
        </div>
      </div>
      <div style="font-size:12px;color:#999;margin-top:5px">Team: ${(p.team||[]).map(m=>m.name+(m.lead?' (Lead)':'')).join(', ')||'Unassigned'}</div>
    </div>`;
  }).join('')+(list.length>20?'<div class="empty">Showing first 20. Refine your search to see more.</div>':'');

async function joinProject(projectId){
  const p=projects.find(x=>x.id===projectId);if(!p)return;
  if((p.team||[]).some(m=>m.name===session.name)){alert('You are already on this project.');return;}
  if(canEditImmediate()){
    p.team=[...(p.team||[]),{name:session.name,pct:null,lead:false}];
    if(!(p.team||[]).some(m=>m.lead)){p.team[0].lead=true;p.lead=p.team[0].name;}
    await saveRecord('update',projectToRow(p),'Sheet1');
    alert('You have been added to '+p.project);renderPage('editproject');
  } else {
    await submitApproval('join_project',p.id,p.project,'team member','',session.name+' joining as supporting staff');
    alert('Request submitted — admin will be notified for approval.');
  }
}

function buildEditTeam(p){
  if(!(p.team||[]).length)return'<div style="font-size:12px;color:#999;padding:8px">No team members yet.</div>';
  return(p.team||[]).map(m=>`
    <div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;background:${m.lead?'#EEEDFE':'#f5f5f5'};border:1px solid ${m.lead?'#AFA9EC':'#e5e5e5'};margin-bottom:4px">
      <div style="width:24px;height:24px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#185FA5;flex-shrink:0">${initials(m.name)}</div>
      <span style="font-size:12px;font-weight:500;flex:1">${m.name}</span>
      ${getUserBadge(m.name)}
      ${m.lead?'<span class="badge lead">Lead</span>':''}
      ${p.type==='pct'&&m.pct?`<span style="font-size:11px;background:#EEEDFE;color:#534AB7;padding:2px 7px;border-radius:4px">${m.pct}%</span>`:''}
      <div style="display:flex;gap:4px;margin-left:auto">
        ${!m.lead?`<button class="btn sm" style="font-size:10px;padding:2px 8px" onclick="setEditLead('${p.id}','${m.name}')">Set lead</button>`:''}
        <button class="btn sm danger" style="font-size:10px;padding:2px 8px" onclick="removeFromEditTeam('${p.id}','${m.name}')">✕</button>
      </div>
    </div>`).join('');
}

function setEditLead(pid,name){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  p.team=(p.team||[]).map(m=>({...m,lead:m.name===name}));p.lead=name;
  set('ep_team',buildEditTeam(p));
}
function removeFromEditTeam(pid,name){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  if((p.team||[]).length<=1){alert('A project needs at least one team member.');return;}
  p.team=(p.team||[]).filter(m=>m.name!==name);
  if(!p.team.some(m=>m.lead)){p.team[0].lead=true;p.lead=p.team[0].name;}
  set('ep_team',buildEditTeam(p));
}
function addToEditTeam(pid){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  const name=val('ep_addStaff');if(!name)return;
  if((p.team||[]).some(m=>m.name===name)){alert('Already on team.');return;}
  const pct=p.type==='pct'?(parseInt(val('ep_addPct'))||null):null;
  p.team=[...(p.team||[]),{name,pct,lead:false}];
  if(p.team.length===1){p.team[0].lead=true;p.lead=name;}
  set('ep_team',buildEditTeam(p));
  const sel=get('ep_addStaff');if(sel)sel.value='';
}

async function saveEditProject(pid){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  const canFunding=['fund','admin','director','assocdir'].includes(session.role);
  const newGrant=val('ep_grant');const newFau=val('ep_fau');
  const grantChanged=newGrant!==p.grant;const fauChanged=newFau!==p.fau;
  if((grantChanged||fauChanged)&&!canFunding){
    await submitApproval('grant_fau_change',p.id,p.project,
      grantChanged&&fauChanged?'grant and FAU':grantChanged?'grant #':'FAU',
      grantChanged?p.grant:p.fau,grantChanged?newGrant:newFau);
  }
  if(session.role==='staff'){
    const updates={project:val('ep_project')||p.project,pi:val('ep_pi')||p.pi,department:val('ep_dept')||p.department,projectStatus:val('ep_ps')||p.projectStatus,start:val('ep_start')||p.start,end:val('ep_end')||p.end,notes:val('ep_notes'),team:p.team};
    await submitApproval('project_edit',p.id,p.project,'project fields',JSON.stringify({project:p.project}),JSON.stringify(updates));
    closeModal();alert('Change request submitted — admin will review.');return;
  }
  p.project=val('ep_project')||p.project;p.pi=val('ep_pi')||p.pi;
  p.department=val('ep_dept')||p.department;p.projectStatus=val('ep_ps')||p.projectStatus;
  p.start=val('ep_start')||p.start;p.end=val('ep_end')||p.end;p.notes=val('ep_notes');
  if(!grantChanged||canFunding)p.grant=newGrant;
  if(!fauChanged||canFunding)p.fau=newFau;
  if(canFunding){
    p.totalValue=parseFloat(val('ep_tv'))||p.totalValue;
    p.fundsReceived=parseFloat(val('ep_fr'))||p.fundsReceived;
    p.budgetTarget=parseFloat(val('ep_bt'))||p.budgetTarget;
    p.piEmail=val('ep_piemail')||p.piEmail;
    p.fmName=val('ep_fmname')||p.fmName;
    p.fmEmail=val('ep_fmemail')||p.fmEmail;
  }
  await saveRecord('update',projectToRow(p),'Sheet1');
  closeModal();renderPage('allprojects');
}

function calcFRTotal(){
  let running=0;
  FACULTY_SERVICES.forEach((_,i)=>{
    const h=parseFloat((get('fh_'+i)||{}).value)||0;running+=h;
    const el=get('fhRun_'+i);if(el)el.textContent=running>0?running.toFixed(1)+' hrs':'—';
  });
  const el=get('frTotal');if(el)el.textContent=running.toFixed(1)+' hrs';
}

function buildFRHoursHistory(){
  if(typeof facultyHours==='undefined')return'<div class="empty" style="padding:1rem">No entries yet.</div>';

async function submitFRHours(){
  const inv=val('fr_inv').trim(),dept=val('fr_dept'),q=val('fr_q'),yr=parseInt(val('fr_yr'));
  if(!inv||!dept){alert('Investigator and department are required.');return;}
  const svcs={};FACULTY_SERVICES.forEach((svc,i)=>{svcs[svc]=parseFloat((get('fh_'+i)||{}).value)||0;});
  const total=Object.values(svcs).reduce((a,v)=>a+v,0);
  const rec={
    id:String(++nextIds.fhours),facultyName:session.name,investigator:inv,department:dept,
    period:q+' '+yr,quarter:q,year:yr,
    dataAnalysis:svcs['Data Analysis']||0,grantApplication:svcs['Grant Application']||0,
    administration:svcs['Administration']||0,studyDesign:svcs['Study Design']||0,
    dataManagement:svcs['Data Management']||0,totalHours:total,
    serviceDescription:val('fr_desc'),ctsi:val('fr_ctsi'),
    fundingSource:val('fr_fsrc'),perfStart:val('fr_pstart'),perfEnd:val('fr_pend'),
    submittedDate:new Date().toISOString().split('T')[0]
  };
  if(typeof facultyHours==='undefined')facultyHours=[];
  facultyHours.push(rec);
  await saveRecord('add',rec,'facultyHours');
  alert('Hours entry submitted successfully.');buildFRHours();
}

function getProfile(name){return profilesData[name]||{skills:[],updatedDate:''};}
function getAllApprovedSkills(){
  const custom=skillRequests.filter(r=>r.status==='approved');
  const tax=JSON.parse(JSON.stringify(SKILL_TAXONOMY));
  custom.forEach(r=>{if(tax[r.category]&&!tax[r.category].includes(r.skillName))tax[r.category].push(r.skillName);});
  return tax;
}
function renderSkillBadge(skill){
  const lvl=skill.level||'Proficient';
  const isWOC=skill.name==='WOC (VA Authorization)';
  const bg=isWOC?'#FAEEDA':(PROF_BG[lvl]||'#f5f5f5');
  const col=isWOC?'#854F0B':(PROF_COL[lvl]||'#555');
  return`<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;background:${bg};color:${col};border:1px solid ${isWOC?'#EF9F27':'transparent'};font-weight:500;margin:2px">${isWOC?'🏥 ':''}${skill.name}<span style="font-size:10px;opacity:.65;margin-left:2px">· ${lvl}</span></span>`;
}
function renderSkillBadgesForProfile(name){
  const p=getProfile(name);
  if(!(p.skills||[]).length)return'';
  const tax=getAllApprovedSkills();
  return Object.keys(tax).map(cat=>{
    const cs=(p.skills||[]).filter(s=>s.category===cat);
    if(!cs.length)return'';
    return`<div style="margin-bottom:5px"><span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-right:4px">${cat}</span>${cs.map(renderSkillBadge).join('')}</div>`;
  }).join('');
}
function previewStaffSkills(name){
  const el=get('staffSkillPreview');if(!el)return;
  if(!name){el.innerHTML='';return;}
  const skills=getProfile(name).skills||[];
  if(!skills.length){el.innerHTML='<span style="font-size:11px;color:#aaa">No skills on profile yet</span>';return;}
  el.innerHTML=skills.slice(0,4).map(renderSkillBadge).join('')+(skills.length>4?`<span style="font-size:10px;color:#aaa"> +${skills.length-4} more</span>`:'');
}

function toggleSkill(cat,skill){
  const idSafe='sk_'+cat.replace(/\W/g,'')+'_'+skill.replace(/\W/g,'');
  const cb=get(idSafe);
  const p=profilesData[session.name]||{skills:[],updatedDate:''};
  if(!p.skills)p.skills=[];
  if(cb&&cb.checked){if(!p.skills.find(s=>s.name===skill))p.skills.push({name:skill,category:cat,level:'Proficient'});}
  else{p.skills=p.skills.filter(s=>s.name!==skill);}
  profilesData[session.name]=p;
  set('profileSkillsPreview',renderSkillBadgesForProfile(session.name)||'<span style="font-size:13px;color:#bbb">No skills added yet</span>');
  buildMyProfile();
}

function updateSkillLevel(cat,skill,level){
  const p=profilesData[session.name]||{skills:[]};
  const entry=(p.skills||[]).find(s=>s.name===skill);
  if(entry){entry.level=level;profilesData[session.name]=p;}
  set('profileSkillsPreview',renderSkillBadgesForProfile(session.name)||'<span style="font-size:13px;color:#bbb">No skills added yet</span>');
}

async function saveMyProfile(){
  const p=profilesData[session.name]||{skills:[]};
  p.updatedDate=new Date().toISOString().split('T')[0];
  profilesData[session.name]=p;
  const rec={staffName:session.name,skills:JSON.stringify(p.skills||[]),updatedDate:p.updatedDate};
  setSyncStatus('syncing','Saving profile...');
  try{
    await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'upsert',sheet:'profiles',keyField:'staffName',record})});
    setSyncStatus('ok','Profile saved');setTimeout(()=>setSyncStatus('ok','Live — Google Sheets'),2000);

async function submitSkillRequest(category){
  const name=val('newSkillName').trim();
  if(!name){alert('Please enter a skill name.');return;}
  const tax=getAllApprovedSkills();
  if((tax[category]||[]).map(s=>s.toLowerCase()).includes(name.toLowerCase())){alert('This skill already exists in the list.');return;}
  if(skillRequests.find(r=>r.skillName.toLowerCase()===name.toLowerCase()&&r.status==='pending')){alert('A request for this skill is already pending approval.');closeModal();return;}
  const rec={id:String(nextSkillReqId++),requestedBy:session.name,category,skillName:name,status:'pending',requestedDate:new Date().toISOString().split('T')[0],reviewedBy:'',reviewedDate:''};
  skillRequests.push(rec);
  await saveRecord('add',rec,'skillRequests');
  closeModal();
  openModal(`<div class="modal-title">Request submitted</div>
    <div class="alert success">Your request to add <strong>${name}</strong> to the ${category} list has been sent to admin for review.</div>
    <div class="form-actions"><button class="btn primary" onclick="closeModal()">OK</button></div>`);
}

function buildSkillGrid(staffList){
  const skill=val('ssSkill'),level=val('ssLevel'),cat=val('ssCat');
  const tax=getAllApprovedSkills();
  const cats=Object.keys(tax);
  const filtered=staffList.filter(name=>{
    const skills=getProfile(name).skills||[];
    if(skill&&!skills.find(s=>s.name===skill&&(!level||s.level===level)))return false;
    if(level&&!skill&&!skills.find(s=>s.level===level))return false;

    return true;
  });
  if(!filtered.length)return'<div class="empty">No staff match current filters.</div>';
  return`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px">
  ${filtered.map(name=>{
    const p=getProfile(name);
    const skills=p.skills||[];

    return`<div style="border:1px solid #e5e5e5;border-radius:10px;padding:14px;background:#fff;${hasWOC?'border-top:3px solid #EF9F27':''}">

        ${hasWOC?'<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:#FAEEDA;color:#854F0B;font-weight:600;flex-shrink:0;white-space:nowrap">🏥 WOC</span>':''}
      </div>
      ${skills.length?cats.map(c=>{
        const cs=skills.filter(s=>s.category===c);
        if(!cs.length)return'';
        return`<div style="margin-bottom:6px">
          <div style="font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">${c}</div>

    </div>`;
  }).join('')}</div>`;
}

    <div class="form-actions">
      ${isPublic?'<button class="btn primary" onclick="closeModal();renderPage('mystatus')">Track my submission</button>':''}
      <button class="btn ${isPublic?'':'primary'}" onclick="closeModal();renderPage('intake')">Submit another</button>
    </div>`);
}

function sendInvoice(pid){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  const ph=hoursData.filter(h=>h.projectId===pid);
  const totalHrs=ph.reduce((a,h)=>a+h.hours,0);
  const totalBill=ph.reduce((a,h)=>a+h.billingAmount,0);
  // group by service type
  const bySvc={};
  ph.forEach(h=>{
    if(!bySvc[h.serviceType])bySvc[h.serviceType]={hrs:0,bill:0,staff:new Set()};
    bySvc[h.serviceType].hrs+=h.hours;bySvc[h.serviceType].bill+=h.billingAmount;
    bySvc[h.serviceType].staff.add(h.staffName);
  });
  // group by quarter
  const byQ={};
  ph.forEach(h=>{const k=h.quarter+' '+h.year;if(!byQ[k])byQ[k]={hrs:0,bill:0};byQ[k].hrs+=h.hours;byQ[k].bill+=h.billingAmount;});
  const fmt=n=>n.toLocaleString('en-US',{style:'currency',currency:'USD'});
  const svcLines=Object.entries(bySvc).map(([svc,d])=>`  ${svc.padEnd(28,' ')} ${d.hrs.toFixed(1).padStart(6,' ')} hrs   ${fmt(d.bill)}`).join('\n');
  const qLines=Object.entries(byQ).map(([q,d])=>`  ${q.padEnd(28,' ')} ${d.hrs.toFixed(1).padStart(6,' ')} hrs   ${fmt(d.bill)}`).join('\n');
  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const piEmail=p.piEmail||'';
  const subject=encodeURIComponent(`DOMStat Invoice — ${p.project} — ${today}`);
  const body=encodeURIComponent(
`UCLA DEPARTMENT OF MEDICINE STATISTICS
DOMStat Statistical Consulting Services
Invoice Date: ${today}
═══════════════════════════════════════════════════════

BILL TO
Principal Investigator: ${p.pi}
Department:             ${p.department||'N/A'}
Project / Grant Title:  ${p.project}
Grant Number:           ${p.grant||'N/A'}
FAU:                    ${p.fau||'N/A'}

═══════════════════════════════════════════════════════
CHARGES BY SERVICE TYPE
───────────────────────────────────────────────────────
  Service                          Hours       Amount
───────────────────────────────────────────────────────
${svcLines}
───────────────────────────────────────────────────────
  TOTAL                        ${totalHrs.toFixed(1).padStart(6,' ')} hrs   ${fmt(totalBill)}
═══════════════════════════════════════════════════════

CHARGES BY PERIOD
───────────────────────────────────────────────────────
${qLines}
═══════════════════════════════════════════════════════

BUDGET SUMMARY
  Budget Target:    ${p.budgetTarget?fmt(p.budgetTarget):'Not set'}
  Total Billed:     ${fmt(totalBill)}
  Remaining:        ${p.budgetTarget?fmt(p.budgetTarget-totalBill):'N/A'}

═══════════════════════════════════════════════════════
PAYMENT INSTRUCTIONS
Please remit payment via FAU: ${p.fau||'[FAU to be provided]'}

Questions? Contact your fund manager:
  ${p.fmName||'DOMStat Fund Manager'}
  ${p.fmEmail||'[fund manager email]'}

UCLA Department of Medicine Statistics
DOMStat — Statistical Consulting Services
https://alaventure.github.io/domstat-tracker
═══════════════════════════════════════════════════════`);
  window.location.href=`mailto:${piEmail}?subject=${subject}&body=${body}`;
}

function showDetail(id){
  const p=projects.find(x=>String(x.id)===String(id));if(!p)return;
  const canSeeFunds=['fund','admin','director','assocdir'].includes(session.role);
  const canEdit=canEditImmediate()||['staff'].includes(session.role);
  openModal(`
    <div class="modal-title">${p.project}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:1rem">
      <div><span style="color:#666">PI:</span> <strong>${p.pi}</strong></div>
      <div><span style="color:#666">Department:</span> ${p.department||'—'}</div>
      <div><span style="color:#666">Type:</span> <span class="badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></div>
      <div><span style="color:#666">Project status:</span> <span class="badge ${projStatusClass(p.projectStatus)}">${p.projectStatus}</span></div>
      <div><span style="color:#666">Start:</span> ${fmtDate(p.start)}</div>
      <div><span style="color:#666">End:</span> ${fmtDate(p.end)}</div>
      ${p.grant?`<div><span style="color:#666">Grant #:</span> ${p.grant}</div>`:''}
      ${p.fau?`<div><span style="color:#666">FAU:</span> ${p.fau}</div>`:''}
      ${p.piEmail?`<div><span style="color:#666">PI email:</span> ${p.piEmail}</div>`:''}
      ${canSeeFunds&&p.fmName?`<div><span style="color:#666">Fund manager:</span> ${p.fmName}</div>`:''}
      ${canSeeFunds&&p.totalValue!=null?`<div><span style="color:#666">Total value:</span> ${fmtMoney(p.totalValue)}</div>`:''}
      ${canSeeFunds&&p.budgetTarget!=null?`<div><span style="color:#666">Budget target:</span> ${fmtMoney(p.budgetTarget)}</div>`:''}
      ${canSeeFunds?`<div><span style="color:#666">Billed to date:</span> <span style="color:#3B6D11;font-weight:600">${fmtMoney(projectBillingTotal(p.id))}</span></div>`:''}
      ${canSeeFunds&&p.budgetTarget?`<div><span style="color:#666">Budget remaining:</span> <span style="color:${(p.budgetTarget-projectBillingTotal(p.id))<0?'#A32D2D':'#3B6D11'};font-weight:600">${fmtMoney(p.budgetTarget-projectBillingTotal(p.id))}</span></div>`:''}
      <div><span style="color:#666">Submitted by:</span> ${p.submittedBy} · ${fmtDate(p.submittedDate)}</div>
      ${canSeeFunds?`<div><span style="color:#666">FM status:</span> <span class="badge ${p.fundManagerStatus==='processed'?'processed':'pending'}">${p.fundManagerStatus==='processed'?'Processed':'Pending'}</span></div>`:''}
    </div>
    <div style="margin-bottom:1rem">
      <div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Team</div>
      ${(p.team||[]).length?`
      ${renderTeamPills(p)}
      ${(p.team||[]).some(m=>(getProfile(m.name).skills||[]).length)?`
        <div style="margin-top:10px">${(p.team||[]).map(m=>{
          const ms=getProfile(m.name).skills||[];
          if(!ms.length)return'';
          return'<div style="margin-top:6px;padding:8px 10px;background:#f9f9f9;border-radius:8px"><div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">'+m.name.split(' ')[0]+'&apos;s skills</div>'+renderSkillBadgesForProfile(m.name)+'</div>';
        }).join('')}</div>`:''}
    `:'<div style="font-size:12px;color:#999">Team not yet assigned</div>'}
    </div>
    ${p.notes?`<div style="font-size:13px;background:#f5f5f5;padding:10px 12px;border-radius:8px;color:#666;margin-bottom:1rem">${p.notes}</div>`:''}
    <div class="form-actions">
      ${canEdit?`<button class="btn" onclick="closeModal();openEditModal('${p.id}')">Edit project</button>`:''}
      ${session.role==='fund'&&p.fundManagerStatus==='pending'?`<button class="btn primary" onclick="markProcessed('${p.id}');closeModal()">Mark processed</button>`:''}
      ${['fund','admin','director','assocdir'].includes(session.role)?`<button class="btn success" onclick="closeModal();sendInvoice('${p.id}')">Send invoice</button>`:''}
      <button class="btn" onclick="closeModal()">Close</button>
    </div>`);
}
