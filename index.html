// ── DOM helpers ────────────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function gv(id){var e=el(id);return e?e.value:"";}
function sh(id,html){var e=el(id);if(e)e.innerHTML=html;}
function openModal(html){el("modalContent").innerHTML=html;el("modalOverlay").className="modal-overlay open";}
function closeModal(){el("modalOverlay").className="modal-overlay";}

// ── Utilities ──────────────────────────────────────────────────────────────
function initials(n){var p=(n||"").split(" ");return((p[0]||"?")[0]+(p[p.length-1]||"?")[0]).toUpperCase();}
function fmtDate(d){if(!d)return"—";try{var dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){return d;}}
function fmtMoney(n){return(n===null||n===undefined||n==="")?"—":"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtHrs(n){return(n===null||n===undefined||n==="")?0:Number(n).toFixed(1);}
function typeLabel(t){return{pct:"% Effort",hr:"Hourly Recharge",ctsi:"CTSI"}[t]||t;}
function typeBadge(t){return "badge badge-"+{pct:"pct",hr:"hr",ctsi:"ctsi"}[t];}
function statusBadge(s){return "badge badge-"+{active:"active",pending:"pending",upcoming:"upcoming",winding:"winding"}[s]||"badge";}
function getProjectDurationTag(p) {
  if (!p.start || !p.end) return null;
  var start = new Date(p.start);
  var end = new Date(p.end);
  if (isNaN(start) || isNaN(end)) return null;
  var months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
  if (months <= 0) return null;
  if (months <= 12) {
    return {label: months + 'mo', color: '#5F5E5A', bg: '#F1EFE8', title: months + ' month project'};
  }
  var years = Math.round(months / 12 * 10) / 10;
  var yrsLabel = Number.isInteger(years) ? years + 'yr' : Math.round(years) + 'yr';
  var col = years >= 4 ? '#3C3489' : years >= 2 ? '#185FA5' : '#854F0B';
  var bg  = years >= 4 ? '#EEEDFE' : years >= 2 ? '#E6F1FB' : '#FAEEDA';
  return {label: yrsLabel, color: col, bg: bg, title: Math.round(years) + ' year project'};
}

function durationTagHtml(p) {
  var tag = getProjectDurationTag(p);
  if (!tag) return '';
  return '<span style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:'+tag.bg+';color:'+tag.color+';letter-spacing:.02em" title="'+tag.title+'">'+tag.label+'</span>';
}

function getProjectCategory(p) {
  // Planned: future start date OR New Project status
  var today = new Date(); today.setHours(0,0,0,0);
  var startDate = p.start ? new Date(p.start) : null;
  if (p.projectStatus === 'Project Complete') return 'complete';
  if (p.projectStatus === 'New Project' || (startDate && startDate > today)) return 'planned';
  if (startDate && startDate <= today) return 'current';
  return 'current';
}

function getProjectCategoryLabel(cat) {
  return {current:'Current',planned:'Planned',complete:'Complete'}[cat]||'Current';
}

function getProjectCategoryColor(cat) {
  return {current:'#3B6D11',planned:'#185FA5',complete:'#5F5E5A'}[cat]||'#3B6D11';
}

function getProjectCategoryBg(cat) {
  return {current:'#EAF3DE',planned:'#E6F1FB',complete:'#F1EFE8'}[cat]||'#EAF3DE';
}

function setSyncStatus(state,msg){
  var dot=el("syncDot"),txt=el("syncStatus");
  if(!dot||!txt)return;
  dot.className="sync-dot"+(state==="syncing"?" syncing":state==="err"?" err":"");
  txt.textContent=msg;
}

function getFridayWeeks(n){
  var weeks=[],d=new Date();d.setHours(0,0,0,0);
  var diff=d.getDay()<=5?5-d.getDay():5-d.getDay()+7;
  d.setDate(d.getDate()+diff);
  for(var i=0;i<n;i++){weeks.push(new Date(d).toISOString().split("T")[0]);d.setDate(d.getDate()-7);}
  return weeks;
}

// ── API ────────────────────────────────────────────────────────────────────
function fetchSheet(name){
  return fetch(API+"?sheet="+name+"&t="+Date.now())
    .then(function(r){return r.ok?r.json():[];})
    .catch(function(){return[];});
}

function saveRecord(action,record,sheet){
  setSyncStatus("syncing","Saving...");
  return fetch(API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:action,record:record,sheet:sheet||"Sheet1"})})
    .then(function(){setSyncStatus("ok","Saved");setTimeout(function(){setSyncStatus("ok","Live — Google Sheets");},2000);return true;})
    .catch(function(){setSyncStatus("err","Save failed");return false;});
}

function submitApproval(reqType,projId,projName,field,oldVal,newVal){
  var rec={id:String(nextIds.appr++),requestType:reqType,requestedBy:session.name,
    projectId:projId,projectName:projName,fieldChanged:field,
    oldValue:typeof oldVal==="object"?JSON.stringify(oldVal):String(oldVal||""),
    newValue:typeof newVal==="object"?JSON.stringify(newVal):String(newVal||""),
    status:"pending",requestedDate:new Date().toISOString().split("T")[0],
    reviewedBy:"",reviewedDate:"",notes:""};
  approvals.push(rec);
  return saveRecord("add",rec,"approvals");
}

function loadData(manual){
  setSyncStatus("syncing",manual?"Refreshing...":"Connecting...");
  var p0=fetchSheet("Sheet1");
  var p1=fetchSheet("hours");
  var p2=fetchSheet("approvals");
  var p3=fetchSheet("profiles");
  var p4=fetchSheet("skillRequests");
  var p5=fetchSheet("facultyHours");
  var p6=fetchSheet("facultyPublications");
  var p7=fetchSheet("facultyGrants");
  Promise.all([p0,p1,p2,p3,p4,p5,p6,p7]).then(function(results){
    var pd=results[0],hd=results[1],ad=results[2],prfd=results[3],srd=results[4],fhd=results[5],fpd=results[6],fgd=results[7];
    if(Array.isArray(pd)){
      try { projects=pd.map(rowToProject).filter(function(p){return p.id&&p.project;}); }
      catch(mapErr) {
        projects=[];
        pd.forEach(function(r){try{var p=rowToProject(r);if(p.id&&p.project)projects.push(p);}catch(e2){}});
      }
      if(projects.length){
        nextIds.proj=Math.max.apply(null,projects.map(function(p){return Number(p.id)||0;}).concat([0]))+1;
      }
    } else {
    }
    if(Array.isArray(hd)){
      hoursData=hd.map(rowToHours).filter(function(h){return h.id&&h.projectId;});
      if(hoursData.length)nextIds.hrs=Math.max.apply(null,hoursData.map(function(h){return Number(h.id)||0;}).concat([0]))+1;
    }
    if(Array.isArray(ad)){
      approvals=ad.map(rowToApproval).filter(function(a){return a.id;});
      if(approvals.length)nextIds.appr=Math.max.apply(null,approvals.map(function(a){return Number(a.id)||0;}).concat([0]))+1;
    }
    profilesData={};
    if(Array.isArray(prfd))prfd.forEach(function(r){
      if(r.staffName)try{profilesData[r.staffName]={skills:JSON.parse(r.skills||"[]"),updatedDate:r.updatedDate||""};}catch(e){profilesData[r.staffName]={skills:[],updatedDate:""};}
    });
    skillRequests=[];
    if(Array.isArray(srd)){skillRequests=srd.filter(function(r){return r.id;});}
    if(Array.isArray(fhd))facultyHours=fhd.filter(function(r){return r.id;});
    if(Array.isArray(fpd))facultyPubs=fpd.filter(function(r){return r.id;});
    if(Array.isArray(fgd))facultyGrants=fgd.filter(function(r){return r.id;});
    setSyncStatus("ok",(manual?"Refreshed — ":"Connected — ")+projects.length+" project"+(projects.length!==1?"s":""));
    setTimeout(function(){setSyncStatus("ok","Live — Google Sheets");},3000);
    try { renderNav(); } catch(navErr) { console.error('DOMStat renderNav error:', navErr); }
    try { renderPage(currentPage); } catch(pageErr) { console.error('DOMStat renderPage error:', pageErr); }
  }).catch(function(e){
    setSyncStatus("err","Connection failed");
    renderNav();
    renderPage(currentPage);
  });
}

    if (btn) btn.className = 'ltab' + (t === tab ? ' active' : '');
    if (panel) panel.style.display = t === tab ? 'block' : 'none';
  });
}

function enterAsPublic(mode) {
  if (mode === 'view') {
    var h = '<div class="lw"><div class="lc">';
    h += '<div style="font-size:20px;font-weight:600;margin-bottom:4px"><span style="color:#185FA5">DOM</span>Stat</div>';
    h += '<div style="font-size:13px;color:#888;margin-bottom:1.5rem">View your project account</div>';
    h += '<div class="form-group" style="margin-bottom:12px"><label>Your email address (as submitted)</label>';
    h += '<input type="email" id="pi-email" placeholder="your@email.edu"></div>';
    h += '<div class="form-group" style="margin-bottom:16px"><label>Your 4-digit PIN</label>';
    h += '<input type="password" id="pi-pin" placeholder="4-digit PIN" maxlength="4"></div>';
    h += '<div class="err-msg" id="pi-err">Email or PIN not found.</div>';
    h += '<button class="btn btn-primary" style="width:100%;margin-bottom:8px" id="piLoginBtn">View my account</button>';
    h += '<button class="btn" style="width:100%" id="piBackBtn">Back</button>';
    h += '</div></div>';
    sh('root', h);
    el('piLoginBtn').addEventListener('click', doPILogin);
    el('piBackBtn').addEventListener('click', showLogin);
    el('pi-pin').addEventListener('keydown', function(ev) { if (ev.key === 'Enter') doPILogin(); });
  } else {
    session = {role:'public', name:null, piEmail:null};
    currentPage = 'intake';
    renderNav();
    renderPage('intake');
  }
}

function doPILogin() {
  var email = gv('pi-email').trim().toLowerCase();
  var pin = gv('pi-pin').trim();
  var errEl = el('pi-err');
  if (!email || !pin) { errEl.style.display = 'block'; return; }
  var match = null;
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].piEmail && projects[i].piEmail.toLowerCase() === email && String(projects[i].piPin) === String(pin)) {
      match = projects[i]; break;
    }
  }
  if (!match) { errEl.style.display = 'block'; return; }
  session = {role:'public', name:match.pi, piEmail:email};
  currentPage = 'pidashboard';
  renderNav();
  renderPage('pidashboard');
}

function doLogin(tab) {
  var role, name, code, errEl, expectedCode;
  if (tab === 'staff') {
    role = gv('lr-staff'); name = gv('ln-staff'); code = gv('lc-staff'); errEl = el('le-staff');
    if (!name) { alert('Please select your name.'); return; }
    var isSitaram = (name === 'Sitaram Vangala' && role === 'staffmgr');
    expectedCode = isSitaram ? PASSCODES.admin : (role === 'staffmgr' ? PASSCODES.staffmgr : PASSCODES.staff);
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
    if (isSitaram) role = 'assocdir';
  } else if (tab === 'faculty') {
    name = gv('ln-faculty'); code = gv('lc-faculty'); errEl = el('le-faculty');
    if (!name) { alert('Please select your name.'); return; }
    role = name === 'David Elashoff' ? 'director' : (name === 'Sitaram Vangala' ? 'assocdir' : 'faculty');
    expectedCode = (role === 'director' || role === 'assocdir') ? PASSCODES.admin : PASSCODES.faculty;
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
  } else {
    role = gv('lr-admin'); code = gv('lc-admin'); errEl = el('le-admin');
    expectedCode = role === 'fund' ? PASSCODES.fund : PASSCODES.admin;
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
    name = role === 'fund' ? 'Fund Manager' : 'Admin';
  }
  errEl.style.display = 'none';
  session = {role:role, name:name, piEmail:null};
  currentPage = ROLE_PAGES[role][0];
  loadData(false);
}

function logout() {
  session = {role:'public', name:null, piEmail:null};
  currentPage = 'intake';
  showLogin();
}

// ── Nav / Routing ──────────────────────────────────────────────────────────
function renderNav(){

    {label:"Overview",   color:"#185FA5",bg:"#E6F1FB",border:"#b5d4f4",pages:["availability","dashboard","pidashboard","staffskills","staffview"]},
    {label:"Projects",   color:"#3B6D11",bg:"#EAF3DE",border:"#a8d470",pages:["allprojects","editproject","intake","myprojects","mystatus"]},
    {label:"Hours",      color:"#854F0B",bg:"#FAEEDA",border:"#f5c97a",pages:["loghours","myhours"]},
    {label:"Reporting",  color:"#0F6E56",bg:"#E1F5EE",border:"#5dcaa5",pages:["billing","facultydb","facultyreporting"]},
    {label:"Management", color:"#3C3489",bg:"#EEEDFE",border:"#afa9ec",pages:["approvals","budgets","fund"]},
    {label:"Profile",    color:"#5F5E5A",bg:"#F1EFE8",border:"#d3d1c7",pages:["myprofile"]}
  ];
  var allowedPages=ROLE_PAGES[session.role]||[];
  var pendingAppr=approvals.filter(function(a){return a.status==="pending";}).length;
  var pendingSkill=skillRequests.filter(function(r){return r.status==="pending";}).length;

  var logoSvg='<svg width="22" height="20" viewBox="0 0 56 52" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="38" width="8" height="12" rx="2" fill="#FFD100"/><rect x="18" y="28" width="8" height="22" rx="2" fill="#FFD100"/><rect x="28" y="18" width="8" height="32" rx="2" fill="#FFD100"/><rect x="38" y="8" width="8" height="42" rx="2" fill="#FFD100"/></svg>';

  var top='<div class="topbar">';
  top+='<div style="display:flex;align-items:center;gap:10px">';
  top+='<span class="logo">'+logoSvg+'<span style="font-weight:800;color:#FFD100">UCLA</span><span style="font-weight:600"> DOMStat</span></span>';
  top+=roleBadgeHtml();
  top+='</div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  if(session.role!=="public"){
    top+='<div class="sync-bar"><div class="sync-dot syncing" id="syncDot"></div><span id="syncStatus">Loading...</span></div>';
    top+='<button class="btn btn-sm" id="refreshBtn">Refresh</button>';
  }
  top+='<button class="btn btn-sm" id="logoutBtn">Sign out</button>';
  top+='</div></div>';

  var nav='<div id="mainNav" style="margin-bottom:1rem">';
  var firstCat=true;
  NAV_CATS.forEach(function(cat){
    var catPages=cat.pages.filter(function(p){return allowedPages.indexOf(p)>-1;});
    if(!catPages.length)return;
    if(!firstCat) nav+='<div style="height:1px;background:#e8e8e6;margin:8px 0"></div>';
    firstCat=false;
    nav+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
    nav+='<span style="font-size:10px;font-weight:700;color:'+cat.color+';text-transform:uppercase;letter-spacing:.08em;padding:2px 0;flex-shrink:0;min-width:70px">'+cat.label+'</span>';
    catPages.forEach(function(p){
      var lbl=PAGE_LABELS[p]||p;
      if(p==="approvals"&&pendingAppr>0)lbl+=" ("+pendingAppr+")";
      if(p==="staffskills"&&pendingSkill>0)lbl+=" ("+pendingSkill+")";
      var isActive=currentPage===p;
      var btnStyle="padding:5px 13px;font-size:12px;font-weight:"+(isActive?"600":"500")+";border-radius:20px;cursor:pointer;white-space:nowrap;border:1.5px solid "+cat.border+";";
      btnStyle+=isActive?"background:"+cat.color+";color:#fff;":"background:#fff;color:"+cat.color+";";
      nav+='<button class="navbtn" style="'+btnStyle+'" data-page="'+p+'">'+lbl+'</button>';
    });
    nav+='</div>';
  });
  nav+='</div>';

  sh('root','<div class="app">'+top+nav+'<div id="pageContainer"></div></div>');

  var navEl=el("mainNav");
  if(navEl)navEl.querySelectorAll(".navbtn").forEach(function(btn){
    btn.addEventListener("click",function(){renderPage(this.getAttribute("data-page"));});
  });
  var ref=el("refreshBtn");if(ref)ref.addEventListener("click",function(){loadData(true);});
  var lo=el("logoutBtn");if(lo)lo.addEventListener("click",logout);
}

function renderPage(p) {
  var pages = ROLE_PAGES[session.role] || [];
  if (pages.indexOf(p) === -1) p = pages[0];
  currentPage = p;
  renderNav();
  var fns = {
    pidashboard: buildPIDashboard, dashboard: buildDashboard,
    myprojects: buildMyProjects, allprojects: buildAllProjects,
    loghours: buildLogHours, myhours: buildMyHours,
    facultyreporting: buildFacultyReporting,
    billing: buildBilling, fund: buildFund,
    staffview: buildStaffOverview, budgets: buildBudgets,
    approvals: buildApprovals, editproject: buildEditProject,
    intake: buildIntake, mystatus: buildMyStatus,
    myprofile: buildMyProfile, staffskills: buildStaffSkills,
    availability: buildAvailability, facultydb: buildFacultyDB
  };
  try {
    (fns[p] || buildIntake)();
  } catch(e) {
    sh('pageContainer', '<div class="card"><div class="alert alert-err">Page error: ' + e.message + '</div></div>');
    console.error('renderPage error:', e);
  }
}

// ── Shared UI helpers ──────────────────────────────────────────────────────
function teamPills(p) {
  var html = '';
  (p.team || []).forEach(function(m) {
    html += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">';
    html += '<div class="initials">' + initials(m.name) + '</div>';
    html += '<span style="font-size:12px">' + m.name + '</span>';
    if (m.lead) html += ' <span class="badge badge-lead">Lead</span>';
    if (p.type === 'pct' && m.pct) html += ' <span style="font-size:10px;background:#EEEDFE;color:#534AB7;padding:1px 5px;border-radius:3px">' + m.pct + '%</span>';
    html += userBadge(m.name);
    html += '</div>';
  });
  return html;
}

function budgetBar(p) {
  if (!p.budgetTarget) return '';
  var spent = projBill(p.id);
  var pct = Math.min(100, Math.round(spent / p.budgetTarget * 100));
  var col = pct >= 100 ? '#E24B4A' : pct >= 80 ? '#EF9F27' : '#639922';
  return '<div class="budget-bar"><div class="budget-fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
    '<div style="font-size:10px;color:#888;margin-top:2px">' + fmtMoney(spent) + ' / ' + fmtMoney(p.budgetTarget) + '</div>';
}

function getProfile(name) { return profilesData[name] || {skills:[], updatedDate:''}; }

function getAllSkills() {
  var tax = JSON.parse(JSON.stringify(SKILLS));
  skillRequests.filter(function(r) { return r.status === 'approved'; }).forEach(function(r) {
    if (tax[r.category] && tax[r.category].indexOf(r.skillName) === -1) tax[r.category].push(r.skillName);
  });
  return tax;
}

function skillBadge(skill) {
  var lvl = skill.level || 'Proficient';
  var isWOC = skill.name === 'WOC (VA Authorization)';
  var bg = isWOC ? '#FAEEDA' : (PROF_BG[lvl] || '#f5f5f5');
  var col = isWOC ? '#854F0B' : (PROF_COL[lvl] || '#555');
  return '<span class="skill-badge" style="background:' + bg + ';color:' + col + ';border:1px solid ' + (isWOC ? '#EF9F27' : 'transparent') + '">' +
    (isWOC ? '&#127973; ' : '') + skill.name + ' <span style="opacity:.65;font-size:10px">&middot; ' + lvl + '</span></span>';
}

function profileSkillsHtml(name) {
  var p = getProfile(name);
  if (!(p.skills || []).length) return '';
  var tax = getAllSkills();
  var html = '';
  Object.keys(tax).forEach(function(cat) {
    var cs = p.skills.filter(function(s) { return s.category === cat; });
    if (!cs.length) return;
    html += '<div style="margin-bottom:5px"><span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-right:4px">' + cat + '</span>';
    cs.forEach(function(s) { html += skillBadge(s); });
    html += '</div>';
  });
  return html;
}

// ── Detail modal ───────────────────────────────────────────────────────────
function showDetail(id) {
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (String(projects[i].id) === String(id)) { p = projects[i]; break; } }
  if (!p) return;
  var canFunds = ['fund','admin','director','assocdir'].indexOf(session.role) > -1;
  var canEdit = canEditNow() || session.role === 'staff';
  var h = '<div class="modal-title">' + p.project + '</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:1rem">';
  h += '<div><span style="color:#666">PI:</span> <strong>' + p.pi + '</strong></div>';
  h += '<div><span style="color:#666">Department:</span> ' + (p.department || '&mdash;') + '</div>';
  h += '<div><span style="color:#666">Type:</span> <span class="' + typeBadge(p.type) + '">' + typeLabel(p.type) + '</span></div>';
  h += durationTagHtml(p);
  h += '<div><span style="color:#666">Status:</span> <span class="' + projStatusBadge(p.projectStatus) + '">' + p.projectStatus + '</span></div>';
  h += '<div><span style="color:#666">Start:</span> ' + fmtDate(p.start) + '</div>';
  h += '<div><span style="color:#666">End:</span> ' + fmtDate(p.end) + '</div>';
  if (p.grant) h += '<div><span style="color:#666">Grant #:</span> ' + p.grant + '</div>';
  if (p.fau) h += '<div><span style="color:#666">FAU:</span> ' + p.fau + '</div>';
  if (canFunds && p.totalValue != null) h += '<div><span style="color:#666">Total value:</span> ' + fmtMoney(p.totalValue) + '</div>';
  if (canFunds && p.budgetTarget != null) h += '<div><span style="color:#666">Budget target:</span> ' + fmtMoney(p.budgetTarget) + '</div>';
  if (canFunds) h += '<div><span style="color:#666">Billed to date:</span> <strong style="color:#3B6D11">' + fmtMoney(projBill(p.id)) + '</strong></div>';
  h += '</div>';
  // Build effort summary
  var totalEffort = 0;
  (p.team||[]).forEach(function(m){ totalEffort += (Number(m.pct)||0); });
  h += '<div style="margin-bottom:1rem">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  h += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase">Team &amp; effort</div>';
  if (totalEffort > 0) h += '<div style="font-size:12px;font-weight:700;background:#E6F1FB;color:#185FA5;padding:3px 10px;border-radius:20px">Total DOMStat effort: '+totalEffort+'%</div>';
  h += '</div>';
  if ((p.team||[]).length) {
    (p.team||[]).forEach(function(m) {
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;background:'+(m.lead?'#f0f4ff':'#f9f9f9')+';border:1px solid '+(m.lead?'#b5d4f4':'#ebebeb')+';margin-bottom:4px">';
      h += '<div style="display:flex;align-items:center;gap:8px">';
      h += '<div class="initials">'+initials(m.name)+'</div>';
      h += '<span style="font-size:13px;font-weight:500">'+m.name+'</span>';
      if (m.lead) h += '<span class="badge badge-lead">Lead</span>';
      h += userBadge(m.name);
      h += '</div>';
      if (m.pct) {
        var pctWidth = Math.min(100, Number(m.pct));
        h += '<div style="display:flex;align-items:center;gap:8px">';
        h += '<div style="width:80px;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden">';
        h += '<div style="width:'+pctWidth+'%;height:100%;background:#185FA5;border-radius:3px"></div></div>';
        h += '<span style="font-size:12px;font-weight:700;color:#185FA5;min-width:36px;text-align:right">'+m.pct+'%</span>';
        h += '</div>';
      }
      h += '</div>';
    });
    if (totalEffort > 0) {
      h += '<div style="margin-top:6px;padding:7px 10px;border-radius:8px;background:#0a1628;display:flex;justify-content:space-between;align-items:center">';
      h += '<span style="font-size:12px;color:rgba(255,255,255,.7)">Total DOMStat support</span>';
      h += '<span style="font-size:14px;font-weight:800;color:#FFD100">'+totalEffort+'%</span></div>';
    }
  } else {
    h += '<div style="font-size:12px;color:#999">Unassigned</div>';
  }
  // Skills for each team member
  var teamSkills = '';
  (p.team || []).forEach(function(m) {
    var ps = profileSkillsHtml(m.name);
    if (ps) teamSkills += '<div style="margin-top:6px;padding:8px;background:#f9f9f9;border-radius:8px"><div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:4px">' + m.name.split(' ')[0] + '\'s skills</div>' + ps + '</div>';
  });
  if (teamSkills) h += teamSkills;
  h += '</div>';
  if (p.notes) h += '<div style="font-size:13px;background:#f5f5f5;padding:10px 12px;border-radius:8px;margin-bottom:1rem;color:#666">' + p.notes + '</div>';
  h += '<div class="actions">';
  if (canEdit) h += '<button class="btn btn-sm" id="detailEditBtn">Edit project</button>';
  if (['fund','admin','director','assocdir'].indexOf(session.role) > -1 && p.fundManagerStatus === 'pending') h += '<button class="btn btn-sm btn-primary" id="detailProcessBtn">Mark processed</button>';
  if (['fund','admin','director','assocdir'].indexOf(session.role) > -1) h += '<button class="btn btn-sm btn-success" id="detailInvoiceBtn">Send invoice</button>';
  h += '<button class="btn btn-sm" id="detailCloseBtn">Close</button>';
  h += '</div>';
  openModal(h);
  el('detailCloseBtn').addEventListener('click', closeModal);
  var editBtn = el('detailEditBtn');
  if (editBtn) editBtn.addEventListener('click', function() { closeModal(); openEditModal(id); });
  var procBtn = el('detailProcessBtn');
  if (procBtn) procBtn.addEventListener('click', function() { markProcessed(id); closeModal(); });
  var invBtn = el('detailInvoiceBtn');
  if (invBtn) invBtn.addEventListener('click', function() { closeModal(); sendInvoice(id); });
}

function markProcessed(id) {
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === id) { p = projects[i]; break; } }
  if (!p) return;
  p.fundManagerStatus = 'processed';
  saveRecord('update', projectToRow(p), 'Sheet1');
  renderPage(currentPage);
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function buildDashboard() {
  var isAdmin = ['admin','director','assocdir'].indexOf(session.role) > -1;
  var isStaff = session.role === 'staff' || session.role === 'staffmgr';
  var isFaculty = session.role === 'faculty';

  // For non-admin roles keep the existing simple view
  if (!isAdmin) {
    var myP = isStaff ? projects.filter(function(p){return (p.team||[]).some(function(m){return m.name===session.name;});}) :
      isFaculty ? projects.filter(function(p){return (p.team||[]).some(function(m){return m.name===session.name;})||p.pi===session.name;}) :
      projects;
    var active=myP.filter(function(p){return p.status==='active';}).length;
    var qHrs=hoursData.filter(function(h){return h.quarter===curQ()&&h.year===curYr()&&(!isStaff||h.staffName===session.name);}).reduce(function(a,h){return a+h.hours;},0);
    var canFunds=['fund','admin','director','assocdir'].indexOf(session.role)>-1;
    var outstanding=canFunds?myP.reduce(function(a,p){return a+Math.max(0,(Number(p.totalValue)||0)-(Number(p.fundsReceived)||0));},0):null;
    var facHrsQ=isFaculty?facultyHours.filter(function(h){return h.facultyName===session.name&&h.quarter===curQ()&&h.year===curYr();}).reduce(function(a,h){return a+h.totalHours;},0):0;
    var facPubs=isFaculty?facultyPubs.filter(function(p){return p.facultyName===session.name;}).length:0;
    var facGrants=isFaculty?facultyGrants.filter(function(g){return g.facultyName===session.name;}).length:0;
    var pendingAppr=canApprove()?approvals.filter(function(a){return a.status==='pending';}).length:0;
    var pendingSkill=canApprove()?skillRequests.filter(function(r){return r.status==='pending';}).length:0;
    var alerts='';
    if(canApprove()&&pendingAppr)alerts+='<div class="alert alert-warn"><strong>'+pendingAppr+' change request'+(pendingAppr>1?'s':'')+'</strong> awaiting approval &mdash; <a href="#" id="gotoApprovals" style="color:inherit;font-weight:600">Review &rarr;</a></div>';
    if(canApprove()&&pendingSkill)alerts+='<div class="alert alert-info"><strong>'+pendingSkill+' skill request'+(pendingSkill>1?'s':'')+'</strong> pending</div>';
    var h='<div class="metrics">';
    h+='<div class="metric"><div class="metric-label">'+(isFaculty?'My projects':isStaff?'My active':'Active')+' projects</div><div class="metric-value mv-blue">'+active+'</div></div>';
    if(isFaculty){
      h+='<div class="metric"><div class="metric-label">'+curQ()+' CTSI hours</div><div class="metric-value mv-purple">'+fmtHrs(facHrsQ)+'</div></div>';
      h+='<div class="metric"><div class="metric-label">Publications</div><div class="metric-value mv-teal">'+facPubs+'</div></div>';
      h+='<div class="metric"><div class="metric-label">Grants</div><div class="metric-value mv-amber">'+facGrants+'</div></div>';
    } else {
      h+='<div class="metric"><div class="metric-label">'+curQ()+' hours</div><div class="metric-value mv-purple">'+fmtHrs(qHrs)+'</div></div>';
      if(canFunds)h+='<div class="metric"><div class="metric-label">Outstanding</div><div class="metric-value mv-red">'+fmtMoney(outstanding)+'</div></div>';
    }
    h+='</div>';
    if(alerts)h+='<div class="card">'+alerts+'</div>';
    h+='<div class="card"><div class="section-hdr"><span class="card-title" style="margin:0">'+(isStaff?'My projects':'All projects')+' ('+myP.length+')</span></div>';
    if(!myP.length){h+='<div class="empty">No projects yet.</div>';}
    else{
      h+='<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Team</th><th>Status</th></tr></thead><tbody>';
      myP.slice(0,8).forEach(function(p){
        h+='<tr style="cursor:pointer" data-detail="'+p.id+'">';
        h+='<td style="font-weight:600">'+p.project+'</td>';
        h+='<td style="font-size:12px;color:#666">'+p.pi+'</td>';
        h+='<td><span class="'+typeBadge(p.type)+'">'+typeLabel(p.type)+'</span></td>';
        h+='<td>'+teamPills(p)+'</td>';
        h+='<td><span class="'+projStatusBadge(p.projectStatus)+'">'+p.projectStatus+'</span></td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }
    h+='</div>';
    sh('pageContainer',h);
    document.querySelectorAll('[data-detail]').forEach(function(row){row.addEventListener('click',function(){showDetail(this.getAttribute('data-detail'));});});
    var ga=el('gotoApprovals');if(ga)ga.addEventListener('click',function(e){e.preventDefault();renderPage('approvals');});
    return;

// ── PI DASHBOARD ───────────────────────────────────────────────────────────
function buildPIDashboard() {
  var piEmail = (session.piEmail || '').toLowerCase();
  var myP = projects.filter(function(p) { return p.piEmail && p.piEmail.toLowerCase() === piEmail; });
  var allH = hoursData.filter(function(h) { return myP.some(function(p) { return p.id === h.projectId; }); });
  var totalHrs = allH.reduce(function(a,h) { return a+h.hours; }, 0);
  var totalBill = allH.reduce(function(a,h) { return a+h.billingAmount; }, 0);
  var outstanding = myP.reduce(function(a,p) { var b=projBill(p.id),r=Number(p.fundsReceived)||0; return a+Math.max(0,b-r); }, 0);
  var h = '<div style="background:linear-gradient(135deg,#0C447C,#185FA5);border-radius:12px;padding:1.5rem;color:#fff;margin-bottom:1rem">';
  h += '<div style="font-size:20px;font-weight:600;margin-bottom:4px">Welcome, ' + session.name + '</div>';
  h += '<div style="font-size:13px;opacity:.8">DOMStat project account &mdash; ' + myP.length + ' project' + (myP.length!==1?'s':'') + '</div></div>';
  h += '<div class="metrics"><div class="metric"><div class="metric-label">Projects</div><div class="metric-value mv-blue">' + myP.length + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Hours accrued</div><div class="metric-value mv-purple">' + fmtHrs(totalHrs) + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Total billed</div><div class="metric-value mv-green">' + fmtMoney(totalBill) + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Outstanding</div><div class="metric-value mv-red">' + fmtMoney(outstanding) + '</div></div></div>';
  myP.forEach(function(p) {
    var ph = hoursData.filter(function(hh) { return hh.projectId === p.id; });
    var ptH = ph.reduce(function(a,hh) { return a+hh.hours; }, 0);
    var ptB = ph.reduce(function(a,hh) { return a+hh.billingAmount; }, 0);
    var byQ = {}; ph.forEach(function(hh) { var k=hh.quarter+' '+hh.year; if(!byQ[k])byQ[k]={hrs:0,bill:0}; byQ[k].hrs+=hh.hours; byQ[k].bill+=hh.billingAmount; });
    var bySvc = {}; ph.forEach(function(hh) { if(!bySvc[hh.serviceType])bySvc[hh.serviceType]={hrs:0,bill:0}; bySvc[hh.serviceType].hrs+=hh.hours; bySvc[hh.serviceType].bill+=hh.billingAmount; });
    h += '<div class="card">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:1rem">';
    h += '<div><div style="font-weight:600;font-size:15px">' + p.project + '</div><div style="font-size:12px;color:#666;margin-top:3px">' + (p.department||'') + ' &middot; ' + typeLabel(p.type) + ' &middot; ' + fmtDate(p.start) + ' &rarr; ' + fmtDate(p.end) + '</div></div>';
    h += '<span class="' + projStatusBadge(p.projectStatus) + '">' + p.projectStatus + '</span></div>';
    h += '<div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1rem">';
    h += '<div class="metric"><div class="metric-label">Total hours</div><div class="metric-value mv-blue" style="font-size:18px">' + fmtHrs(ptH) + '</div></div>';
    h += '<div class="metric"><div class="metric-label">Total billed</div><div class="metric-value mv-green" style="font-size:18px">' + fmtMoney(ptB) + '</div></div>';
    h += '<div class="metric"><div class="metric-label">Budget remaining</div><div class="metric-value ' + (p.budgetTarget&&(p.budgetTarget-ptB)<0?'mv-red':'mv-green') + '" style="font-size:18px">' + (p.budgetTarget?fmtMoney(p.budgetTarget-ptB):'&mdash;') + '</div></div></div>';
    if (Object.keys(byQ).length) {
      h += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px">By quarter</div>';
      h += '<div style="overflow-x:auto;margin-bottom:1rem"><table><thead><tr><th>Period</th><th>Hours</th><th>Billed</th></tr></thead><tbody>';
      Object.keys(byQ).forEach(function(q) { h += '<tr><td>' + q + '</td><td>' + fmtHrs(byQ[q].hrs) + '</td><td style="color:#3B6D11;font-weight:500">' + fmtMoney(byQ[q].bill) + '</td></tr>'; });
      h += '</tbody></table></div>';
    }
    if (Object.keys(bySvc).length) {
      h += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px">By service type</div>';
      h += '<div style="overflow-x:auto;margin-bottom:1rem"><table><thead><tr><th>Service</th><th>Hours</th><th>Billed</th></tr></thead><tbody>';
      Object.keys(bySvc).forEach(function(sv) { h += '<tr><td>' + sv + '</td><td>' + fmtHrs(bySvc[sv].hrs) + '</td><td style="color:#3B6D11;font-weight:500">' + fmtMoney(bySvc[sv].bill) + '</td></tr>'; });
      h += '</tbody></table></div>';
    }
    // Team skills
    var tsHtml = '';
    (p.team||[]).forEach(function(m) { var ps=profileSkillsHtml(m.name); if(ps) tsHtml+='<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:3px">'+m.name+'</div>'+ps+'</div>'; });
    if (tsHtml) h += '<div style="border-top:1px solid #f0f0f0;padding-top:1rem;margin-top:.5rem"><div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Assigned team &amp; skills</div>' + tsHtml + '</div>';
    h += '</div>';
  });
  if (!myP.length) h += '<div class="card"><div class="empty">No projects found for your email. Contact your DOMStat fund manager.</div></div>';
  sh('pageContainer', h);
}

// ── MY PROJECTS / ALL PROJECTS ─────────────────────────────────────────────
function buildMyProjects() {
  var myP = projects.filter(function(p) { return (p.team||[]).some(function(m) { return m.name === session.name; }); });
  var h = '<div class="card"><div class="section-hdr"><span class="card-title" style="margin:0">My projects &mdash; ' + session.name + '</span>';
  h += '<button class="btn btn-sm btn-primary" id="logHrsBtn">+ Log hours</button></div>';

  if (!myP.length) {
    h += '<div class="empty">You are not assigned to any projects yet.</div>';
  } else {
    var cats = [
      {key:'current', label:'Current projects', icon:'&#9679;', color:'#3B6D11', bg:'#EAF3DE'},
      {key:'planned', label:'Upcoming & planned', icon:'&#9670;', color:'#185FA5', bg:'#E6F1FB'},
      {key:'complete', label:'Completed', icon:'&#10003;', color:'#5F5E5A', bg:'#F1EFE8'}
    ];
    cats.forEach(function(cat) {
      var catP = myP.filter(function(p){ return getProjectCategory(p) === cat.key; });
      if (!catP.length) return;
      // Group by PI within category
      var byPI = {}, piOrder = [];
      catP.forEach(function(p){
        if (!byPI[p.pi]){byPI[p.pi]=[];piOrder.push(p.pi);}
        byPI[p.pi].push(p);
      });
      piOrder.sort();
      h += '<div style="margin-bottom:1.5rem">';
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
      h += '<span style="font-size:12px;font-weight:700;color:'+cat.color+';text-transform:uppercase;letter-spacing:.06em">'+cat.label+' ('+catP.length+')</span>';
      h += '</div>';
      piOrder.forEach(function(pi){
        var piProjs = byPI[pi];
        var piHrs = piProjs.reduce(function(a,p){
          return a+hoursData.filter(function(h){return h.projectId===p.id&&h.staffName===session.name;}).reduce(function(b,h){return b+h.hours;},0);
        },0);
        h += '<div style="margin-bottom:1rem">';
        h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0a1628;border-radius:10px 10px 0 0;flex-wrap:wrap;gap:8px">';

        h += '<div style="width:30px;height:30px;border-radius:50%;background:#1a6fcf;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">'+initials(pi)+'</div>';

        h += '<span style="font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:'+cat.bg+';color:'+cat.color+'">'+cat.label.split(' ')[0]+'</span>';
        h += '</div>';
        piProjs.forEach(function(p, idx){
          var isLast = idx === piProjs.length-1;
          var me = (p.team||[]).filter(function(m){return m.name===session.name;})[0];
          var myHrs = hoursData.filter(function(h){return h.projectId===p.id&&h.staffName===session.name;}).reduce(function(a,h){return a+h.hours;},0);
          h += '<div style="border:1px solid #e5e5e5;border-top:none;'+(isLast?'border-radius:0 0 10px 10px;':'')+'background:#fff;padding:12px 16px;cursor:pointer" data-detail="'+p.id+'">';
          h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:6px">';
          h += '<div>';
          h += '<div style="font-weight:600;font-size:13px;margin-bottom:4px">'+p.project+'</div>';
          h += '<div style="display:flex;flex-wrap:wrap;gap:5px">';
          h += '<span class="'+typeBadge(p.type)+'">'+typeLabel(p.type)+'</span>';
          h += durationTagHtml(p);
          h += '<span class="'+projStatusBadge(p.projectStatus)+'">'+p.projectStatus+'</span>';
          if (me&&me.lead) h += '<span class="badge badge-lead">Lead</span>';
          if (me&&me.pct) h += '<span style="font-size:11px;background:#EEEDFE;color:#534AB7;padding:2px 8px;border-radius:20px">'+me.pct+'% effort</span>';
          if (p.department) h += '<span style="font-size:11px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:20px">'+p.department+'</span>';
          h += '</div></div>';
          h += '<div style="text-align:right;flex-shrink:0">';
          h += '<div style="font-size:13px;font-weight:700;color:#185FA5">'+fmtHrs(myHrs)+' hrs</div>';
          h += '<div style="font-size:11px;color:#aaa;margin-top:2px">'+fmtDate(p.start)+' &rarr; '+fmtDate(p.end)+'</div>';
          h += '</div></div>';
          if (p.scopeSummary) h += '<div style="font-size:12px;color:#555;background:#f9f9f9;padding:6px 10px;border-radius:6px;margin-top:4px"><span style="font-weight:600;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-right:6px">Scope:</span>'+p.scopeSummary+'</div>';
          if (p.nextSteps) h += '<div style="font-size:12px;color:#3B6D11;background:#EAF3DE;padding:6px 10px;border-radius:6px;margin-top:4px"><span style="font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-right:6px">Next:</span>'+p.nextSteps+'</div>';
          h += '</div>';

function buildAPGrouped(list) {
  if (!list.length) return '<div class="empty">No projects match filters.</div>';
  var canFunds = ['fund','admin','director','assocdir'].indexOf(session.role) > -1;

  // Group by PI
  var byPI = {};
  var piOrder = [];
  list.forEach(function(p) {
    if (!byPI[p.pi]) { byPI[p.pi] = []; piOrder.push(p.pi); }
    byPI[p.pi].push(p);
  });
  piOrder.sort();

  var h = '';
  piOrder.forEach(function(pi) {
    var piProjects = byPI[pi];
    var piHrs = piProjects.reduce(function(a,p){return a+projHrs(p.id);},0);
    var piBilled = piProjects.reduce(function(a,p){return a+projBill(p.id);},0);

    // PI header row
    h += '<div style="margin-bottom:1.25rem">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0a1628;border-radius:10px 10px 0 0;flex-wrap:wrap;gap:8px">';
    h += '<div style="display:flex;align-items:center;gap:10px">';
    h += '<div style="width:34px;height:34px;border-radius:50%;background:#1a6fcf;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">'+initials(pi)+'</div>';
    h += '<div><div style="font-weight:700;font-size:14px;color:#fff">'+pi+'</div>';
    h += '<div style="font-size:11px;color:rgba(255,255,255,.55)">'+piProjects.length+' project'+(piProjects.length!==1?'s':'')+' &middot; '+fmtHrs(piHrs)+' hrs logged';
    if (canFunds && piBilled) h += ' &middot; '+fmtMoney(piBilled)+' billed';
    h += '</div></div></div>';
    if (canFunds) {
      h += '<button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2);font-size:11px" data-invoice-pi-grp="'+encodeURIComponent(pi)+'|'+(piProjects[0].piEmail||'')+'">Send invoice</button>';
    }
    h += '</div>';

    // Projects under this PI
    piProjects.forEach(function(p, idx) {
      var isLast = idx === piProjects.length - 1;
      var hrs = projHrs(p.id), billed = projBill(p.id);
      var lead = (p.team||[]).filter(function(m){return m.lead;})[0];
      h += '<div style="border:1px solid #e5e5e5;border-top:none;'+(isLast?'border-radius:0 0 10px 10px;':'')+'background:#fff;cursor:pointer;padding:12px 16px" data-detail="'+p.id+'">';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px">';

      // Left: project name + badges
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-weight:600;font-size:13px;margin-bottom:5px">'+p.project+'</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">';
      h += '<span class="'+typeBadge(p.type)+'">'+typeLabel(p.type)+'</span>';
      h += durationTagHtml(p);
      h += '<span class="'+projStatusBadge(p.projectStatus)+'">'+p.projectStatus+'</span>';
      if (p.department) h += '<span style="font-size:11px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:20px">'+p.department+'</span>';
      if (p.grant) h += '<span style="font-size:11px;color:#666;background:#f5f5f5;padding:2px 8px;border-radius:20px">Grant: '+p.grant+'</span>';
      if (p.fau) h += '<span style="font-size:11px;color:#666;background:#f5f5f5;padding:2px 8px;border-radius:20px">FAU: '+p.fau+'</span>';
      h += '</div></div>';

      h += '<div style="text-align:right;flex-shrink:0">';

      if (canFunds && billed) h += '<div style="font-size:12px;color:#3B6D11;font-weight:500">'+fmtMoney(billed)+' billed</div>';
      h += '<div style="font-size:11px;color:#aaa;margin-top:2px">'+fmtDate(p.start)+' &rarr; '+fmtDate(p.end)+'</div>';
      h += '</div></div>';

      // Team row
      if ((p.team||[]).length) {
        h += '<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">';
        (p.team||[]).forEach(function(m) {
          h += '<div style="display:flex;align-items:center;gap:4px;background:#f5f5f5;padding:3px 8px 3px 4px;border-radius:20px">';
          h += '<div style="width:18px;height:18px;border-radius:50%;background:#185FA5;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">'+initials(m.name)+'</div>';

function applyAllFilters() {
  var type=gv('fType'),status=gv('fStatus'),dept=gv('fDept'),staff=gv('fStaff'),ps=gv('fPS'),skill=gv('fSkill');
  var f = projects.filter(function(p) {
    if (type && p.type !== type) return false;
    if (status && p.status !== status) return false;
    if (dept && p.department !== dept) return false;
    if (ps && p.projectStatus !== ps) return false;
    if (staff && !(p.team||[]).some(function(m) { return m.name === staff; })) return false;
    if (skill && !(p.team||[]).some(function(m) { return (getProfile(m.name).skills||[]).some(function(sk) { return sk.name === skill; }); })) return false;
    return true;
  });
  var filtHtml = '';
  try { filtHtml = buildAPGrouped(f); }
  catch(e) { filtHtml = '<div class="alert alert-err">Filter error: ' + e.message + '</div>'; }
  sh('apBody', filtHtml);
}

function calcBilling(projId, svcIdx, staffName) {
  var rate = RATES[staffName] || 66.08;
  var hrs = parseFloat((el('hrs_'+projId+'_'+svcIdx)||{}).value) || 0;
  var bill = hrs * rate;
  var billEl = el('bill_'+projId+'_'+svcIdx);
  if (billEl) billEl.textContent = hrs > 0 ? fmtMoney(bill) : '—';
  var th = 0, tb = 0;
  SVCS.forEach(function(_,i) { var hv=parseFloat((el('hrs_'+projId+'_'+i)||{}).value)||0; th+=hv; tb+=hv*rate; });
  var tot = el('pWT_'+projId);
  if (tot) tot.innerHTML = th.toFixed(1) + ' hrs &mdash; ' + fmtMoney(tb);
  // Update live budget display
  var p = projects.filter(function(x){return x.id===projId;})[0];
  if (p) {
    var alreadyBilled = projBill(projId);
    var newTotalBill = alreadyBilled + tb;
    var received = Number(p.fundsReceived)||0;
    var target = Number(p.budgetTarget)||0;
    var newAvail = received ? Math.max(0, received - newTotalBill) : null;
    var newRemain = target ? target - newTotalBill : null;
    var availEl = el('avail_'+projId);
    if (availEl && newAvail!==null) {
      availEl.textContent = fmtMoney(newAvail);
      availEl.parentElement.style.color = newAvail<=0?'#A32D2D':'#3B6D11';
    }
    var remainEl = el('remain_'+projId);
    if (remainEl && newRemain!==null) {
      remainEl.textContent = fmtMoney(newRemain);
      remainEl.parentElement.style.color = newRemain<0?'#A32D2D':'#3B6D11';
    }
    if (target) {
      var usedPct = Math.min(100, Math.round(newTotalBill/target*100));
      var barCol = usedPct>=100?'#E24B4A':usedPct>=80?'#EF9F27':'#639922';
      var barEl = el('budbar_'+projId);
      if (barEl) { barEl.style.width=usedPct+'%'; barEl.style.background=barCol; }
      var pctEl = el('budpct_'+projId);
      if (pctEl) pctEl.textContent = usedPct+'%';
    }
  }
}

function submitHours() {
  var weekEnding = gv('logWeek');
  var staffName = isAdmin() ? gv('logStaff') : session.name;
  if (!staffName) { alert('Please select a staff member.'); return; }
  var rate = RATES[staffName] || 66.08;
  var q = getQ(weekEnding), yr = getYr(weekEnding);
  var entries = [];
  projects.filter(function(p) { return (p.team||[]).some(function(m) { return m.name === staffName; }); }).forEach(function(p) {
    var newStatus = gv('ps_'+p.id) || p.projectStatus;
    SVCS.forEach(function(svc,si) {
      var hrs = parseFloat((el('hrs_'+p.id+'_'+si)||{}).value) || 0;
      if (hrs > 0) entries.push({id:String(nextIds.hrs++),projectId:p.id,staffName:staffName,weekEnding:weekEnding,serviceType:svc,hours:hrs,billingAmount:parseFloat((hrs*rate).toFixed(2)),pctEffort:parseFloat((hrs/520).toFixed(4)),projectStatus:newStatus,notes:'',submittedDate:new Date().toISOString().split('T')[0],quarter:q,year:yr});
    });
    if (newStatus !== p.projectStatus) { p.projectStatus = newStatus; saveRecord('update',projectToRow(p),'Sheet1'); }
  });
  if (!entries.length) { alert('No hours entered.'); return; }
  var saves = entries.map(function(e) { hoursData.push(e); return saveRecord('add',e,'hours'); });
  Promise.all(saves).then(function() {
    var totH = entries.reduce(function(a,e) { return a+e.hours; }, 0);
    var totB = entries.reduce(function(a,e) { return a+e.billingAmount; }, 0);
    openModal('<div class="modal-title">Hours submitted</div><div class="alert alert-ok">' + entries.length + ' entries saved for week ending ' + fmtDate(weekEnding) + '.</div>' +
      '<p style="font-size:13px;color:#666;margin-bottom:1rem"><strong>Staff:</strong> ' + staffName + '<br><strong>Total hours:</strong> ' + totH.toFixed(1) + '<br><strong>Total billing:</strong> ' + fmtMoney(totB) + '</p>' +
      '<div class="actions"><button class="btn btn-primary" id="viewHrsBtn">View my hours</button><button class="btn" id="logMoreBtn">Log another week</button></div>');
    el('viewHrsBtn').addEventListener('click', function() { closeModal(); renderPage('myhours'); });
    el('logMoreBtn').addEventListener('click', function() { closeModal(); renderPage('loghours'); });
  });
}

function renderMyHoursTable(q, yr) {
  var myH = hoursData.filter(function(h) { return h.staffName === session.name && h.quarter === q && h.year === yr; });
  var tH = myH.reduce(function(a,h) { return a+h.hours; }, 0);
  var tB = myH.reduce(function(a,h) { return a+h.billingAmount; }, 0);
  if (!myH.length) { sh('mhContent','<div class="empty">No hours logged for ' + q + ' ' + yr + '.</div>'); return; }
  var h = '<div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1rem">';
  h += '<div class="metric"><div class="metric-label">' + q + ' ' + yr + ' hours</div><div class="metric-value mv-blue">' + fmtHrs(tH) + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Billing</div><div class="metric-value mv-green">' + fmtMoney(tB) + '</div></div>';
  h += '<div class="metric"><div class="metric-label">% Effort</div><div class="metric-value mv-purple">' + (tH/520*100).toFixed(1) + '%</div></div></div>';
  h += '<div style="overflow-x:auto"><table><thead><tr><th>Week ending</th><th>Project</th><th>Service type</th><th>Hours</th><th>Billing</th></tr></thead><tbody>';
  myH.sort(function(a,b) { return new Date(b.weekEnding)-new Date(a.weekEnding); }).forEach(function(hh) {
    var p = projects.filter(function(px) { return px.id === hh.projectId; })[0];
    h += '<tr><td style="font-size:12px">' + fmtDate(hh.weekEnding) + '</td><td style="font-weight:600;font-size:12px">' + (p?p.project:hh.projectId) + '</td><td style="font-size:12px">' + hh.serviceType + '</td><td style="font-weight:500">' + fmtHrs(hh.hours) + '</td><td style="color:#3B6D11;font-weight:500">' + fmtMoney(hh.billingAmount) + '</td></tr>';
  });
  h += '</tbody></table></div>';
  sh('mhContent', h);
}

function filterEditProjects() {

function buildEditProjectList(list) {

    h += '<div style="border:1px solid #e5e5e5;border-radius:8px;padding:12px;margin-bottom:8px;background:#fff">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">';

    h += '</div></div>';
    h += '<div style="font-size:12px;color:#999;margin-top:5px">Team: ' + ((p.team||[]).map(function(m) { return m.name+(m.lead?' (Lead)':''); }).join(', ')||'Unassigned') + '</div></div>';
  });
  if (list.length > 20) h += '<div class="empty">Showing first 20. Refine search for more.</div>';

}
function attachEditProjectHandlers() {
  document.querySelectorAll('[data-join]').forEach(function(btn) { btn.addEventListener('click', function() { joinProject(this.getAttribute('data-join')); }); });
  document.querySelectorAll('[data-edit]').forEach(function(btn) { btn.addEventListener('click', function() { openEditModal(this.getAttribute('data-edit')); }); });
}
function joinProject(projectId) {
  var p = projects.filter(function(x) { return x.id === projectId; })[0]; if (!p) return;
  if ((p.team||[]).some(function(m) { return m.name === session.name; })) { alert('You are already on this project.'); return; }
  if (canEditNow()) {
    p.team = (p.team||[]).concat([{name:session.name,pct:null,lead:false}]);
    if (!(p.team||[]).some(function(m) { return m.lead; })) { p.team[0].lead = true; p.lead = p.team[0].name; }
    saveRecord('update', projectToRow(p), 'Sheet1');
    alert('You have been added to ' + p.project);
    renderPage('editproject');
  } else {
    submitApproval('join_project',p.id,p.project,'team member','',session.name+' joining as supporting staff');
    alert('Request submitted. Admin will be notified for approval.');
  }
}

function buildEditTeamHtml(p) {
  if (!(p.team||[]).length) return '<div style="font-size:12px;color:#999">No team members yet.</div>';
  var h = '';
  (p.team||[]).forEach(function(m) {
    h += '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;background:' + (m.lead?'#EEEDFE':'#f5f5f5') + ';border:1px solid ' + (m.lead?'#AFA9EC':'#e5e5e5') + ';margin-bottom:4px">';
    h += '<div class="initials">' + initials(m.name) + '</div>';
    h += '<span style="font-size:12px;font-weight:500;flex:1">' + m.name + '</span>' + userBadge(m.name);
    if (m.lead) h += '<span class="badge badge-lead">Lead</span>';
    if (p.type==='pct'&&m.pct) h += '<span style="font-size:11px;background:#EEEDFE;color:#534AB7;padding:2px 7px;border-radius:4px">' + m.pct + '%</span>';
    h += '<div style="display:flex;gap:4px;margin-left:auto">';
    if (!m.lead) h += '<button class="btn btn-sm" style="font-size:10px;padding:2px 8px" data-setlead="' + m.name + '">Set lead</button>';
    h += '<button class="btn btn-sm btn-danger" style="font-size:10px;padding:2px 8px" data-removemember="' + m.name + '">&times;</button></div></div>';
  });
  return h;
}
function setEditLead(pid, name) {
  var p = projects.filter(function(x) { return x.id === pid; })[0]; if (!p) return;
  (p.team||[]).forEach(function(m) { m.lead = m.name === name; }); p.lead = name;
  sh('ep_team', buildEditTeamHtml(p));
  document.querySelectorAll('[data-setlead]').forEach(function(btn) { btn.addEventListener('click', function() { setEditLead(pid, this.getAttribute('data-setlead')); }); });
  document.querySelectorAll('[data-removemember]').forEach(function(btn) { btn.addEventListener('click', function() { removeFromEditTeam(pid, this.getAttribute('data-removemember')); }); });
}
function removeFromEditTeam(pid, name) {
  var p = projects.filter(function(x) { return x.id === pid; })[0]; if (!p) return;
  if ((p.team||[]).length <= 1) { alert('A project needs at least one team member.'); return; }
  p.team = (p.team||[]).filter(function(m) { return m.name !== name; });
  if (!p.team.some(function(m) { return m.lead; })) { p.team[0].lead = true; p.lead = p.team[0].name; }
  sh('ep_team', buildEditTeamHtml(p));
  document.querySelectorAll('[data-setlead]').forEach(function(btn) { btn.addEventListener('click', function() { setEditLead(pid, this.getAttribute('data-setlead')); }); });
  document.querySelectorAll('[data-removemember]').forEach(function(btn) { btn.addEventListener('click', function() { removeFromEditTeam(pid, this.getAttribute('data-removemember')); }); });
}
function addToEditTeam(pid) {
  var p = projects.filter(function(x) { return x.id === pid; })[0]; if (!p) return;
  var name = gv('ep_addStaff'); if (!name) return;
  if ((p.team||[]).some(function(m) { return m.name === name; })) { alert('Already on team.'); return; }
  var pct = p.type === 'pct' ? (parseInt(gv('ep_addPct'))||null) : null;
  p.team = (p.team||[]).concat([{name:name,pct:pct,lead:false}]);
  if (!p.team.some(function(m) { return m.lead; })) { p.team[0].lead = true; p.lead = p.team[0].name; }
  sh('ep_team', buildEditTeamHtml(p));
  el('ep_addStaff').value = '';
  document.querySelectorAll('[data-setlead]').forEach(function(btn) { btn.addEventListener('click', function() { setEditLead(pid, this.getAttribute('data-setlead')); }); });
  document.querySelectorAll('[data-removemember]').forEach(function(btn) { btn.addEventListener('click', function() { removeFromEditTeam(pid, this.getAttribute('data-removemember')); }); });
}
function saveEditProject(pid) {
  var p = projects.filter(function(x) { return x.id === pid; })[0]; if (!p) return;
  var canFunding = ['fund','admin','director','assocdir'].indexOf(session.role) > -1;
  var newGrant = gv('ep_grant'), newFau = gv('ep_fau');
  var grantChanged = newGrant !== p.grant, fauChanged = newFau !== p.fau;
  if ((grantChanged||fauChanged) && !canFunding) submitApproval('grant_fau_change',p.id,p.project,grantChanged?'grant':'FAU',grantChanged?p.grant:p.fau,grantChanged?newGrant:newFau);
  if (session.role === 'staff') {
    submitApproval('project_edit',p.id,p.project,'project fields',p.project,gv('ep_project'));
    closeModal(); alert('Change request submitted — admin will review.'); return;
  }
  p.project = gv('ep_project')||p.project; p.pi = gv('ep_pi')||p.pi;
  p.department = gv('ep_dept')||p.department; p.projectStatus = gv('ep_ps')||p.projectStatus;
  p.start = gv('ep_start')||p.start; p.end = gv('ep_end')||p.end; p.notes = gv('ep_notes');
  if (!grantChanged||canFunding) p.grant = newGrant;
  if (!fauChanged||canFunding) p.fau = newFau;
  if (canFunding) {
    p.totalValue = parseFloat(gv('ep_tv'))||p.totalValue; p.fundsReceived = parseFloat(gv('ep_fr'))||p.fundsReceived;
    p.budgetTarget = parseFloat(gv('ep_bt'))||p.budgetTarget; p.fmName = gv('ep_fmname')||p.fmName; p.fmEmail = gv('ep_fmemail')||p.fmEmail;
  }
  saveRecord('update', projectToRow(p), 'Sheet1');
  closeModal(); renderPage('allprojects');
}

    h += '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;background:' + (m.lead?'#EEEDFE':'#f5f5f5') + ';border:1px solid ' + (m.lead?'#AFA9EC':'#e5e5e5') + ';margin-bottom:4px">';

function addTeamMember() {
  var name = gv('addStaffSel'); if (!name) return;
  if (intakeTeam.some(function(m){return m.name===name;})) { alert('Already added.'); return; }
  var pct = gv('f_type')==='pct' ? (parseInt(gv('addPct'))||null) : null;
  intakeTeam.push({name:name, pct:pct, lead:intakeTeam.length===0});
  el('addStaffSel').value = '';
  renderIntakeTeam();
}

function submitProject() {
  var sub=gv('f_sub').trim(), pi=gv('f_pi').trim(), proj=gv('f_project').trim();
  var type=gv('f_type'), start=gv('f_start'), end=gv('f_end'), dept=gv('f_dept');
  var isPublic=session.role==='public';
  var piEmail=gv('f_piemail').trim(), pin=gv('f_pin')||'';
  if (!sub||!pi||!proj||!type||!start||!end||!dept) { alert('Please fill in all required fields (*).'); return; }
  if (isPublic&&(!piEmail||!pin||pin.length!==4||!/^[0-9]{4}$/.test(pin))) { alert('PI email and 4-digit PIN are required.'); return; }
  if (!isPublic&&!intakeTeam.length) { el('teamError').style.display='block'; return; }
  var bv=parseFloat(gv('f_val'))||null;
  var record={id:String(nextIds.proj++),pi:pi,project:proj,type:type,department:dept,
    grant:gv('f_grant')||'',fau:gv('f_fau')||'',start:start,end:end,
    totalValue:type==='pct'?bv:null,fundsReceived:0,budgetTarget:bv,
    status:new Date(start)>new Date()?'upcoming':'active',projectStatus:'New Project',
    piEmail:piEmail,fmName:gv('f_fmname')||'',fmEmail:gv('f_fmemail')||'',
    notes:gv('f_notes')||'',submittedBy:sub,submittedDate:new Date().toISOString().split('T')[0],
    fundManagerStatus:'pending',piPin:pin,
    lead:isPublic?'':(intakeTeam.filter(function(m){return m.lead;})[0]||{name:''}).name,
    team:isPublic?[]:intakeTeam};
  projects.push(record);
  saveRecord('add',projectToRow(record),'Sheet1').then(function(ok) {
    openModal('<div class="modal-title">Submission received</div>' +
      '<div class="alert ' + (ok?'alert-ok':'alert-warn') + '" style="margin-bottom:1rem">' + (ok?'Saved to Google Sheets.':'Saved locally — check connection.') + '</div>' +
      '<p style="font-size:13px;color:#555;margin-bottom:4px"><strong>Project:</strong> ' + proj + '</p>' +
      '<p style="font-size:13px;color:#555;margin-bottom:' + (isPublic?'1rem':'4px') + '"><strong>PI:</strong> ' + pi + '</p>' +
      (isPublic?'<p style="font-size:13px;color:#555;margin-bottom:1rem">Use your email and PIN to view your account at any time.</p>':'') +
      '<div class="actions">' +
      (isPublic?'<button class="btn btn-primary" id="trackBtn">Track my submission</button>':'') +
      '<button class="btn ' + (isPublic?'':'btn-primary') + '" id="anotherBtn">Submit another</button></div>');
    var tb = el('trackBtn'); if (tb) tb.addEventListener('click', function() { closeModal(); renderPage('mystatus'); });
    el('anotherBtn').addEventListener('click', function() { closeModal(); renderPage('intake'); });
  });
}


function buildBilling() {
  var pis = [];
  projects.forEach(function(p) { if (pis.indexOf(p.pi) === -1) pis.push(p.pi); });
  pis.sort();

  var h = '<div class="card">';
  h += '<div class="section-hdr" style="margin-bottom:1rem"><span class="card-title" style="margin:0">Hours &amp; Billing</span></div>';
  h += '<div class="filter-row">';
  h += '<span style="font-size:12px;color:#666;font-weight:500">Quarter:</span>';
  ['Q1','Q2','Q3','Q4'].forEach(function(q) {
    h += '<button class="qbtn" id="bq_' + q + '" data-bq="' + q + '">' + q + '</button>';
  });
  h += '<input type="number" id="bYear" value="' + curYr() + '" min="2020" max="2035" style="width:70px;padding:5px 8px;font-size:12px;border:1px solid #ccc;border-radius:6px">';
  h += '<select id="bStaff" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="">All staff</option>';
  STAFF.forEach(function(s) { h += '<option>' + s + '</option>'; });
  h += '</select>';
  h += '<select id="bPI" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="">All PIs</option>';
  pis.forEach(function(pi) { h += '<option>' + pi + '</option>'; });
  h += '</select>';
  h += '</div>';
  h += '<div id="billingContent"><div class="empty">Loading...</div></div>';
  h += '</div>';
  sh('pageContainer', h);

  // Find most recent quarter with data
  var dq = curQ(), dyr = curYr();
  if (hoursData.length) {
    var qOrder = ['Q1','Q2','Q3','Q4'];
    var best = null;
    hoursData.forEach(function(h) {
      if (!best) { best = h; return; }
      if (h.year > best.year) { best = h; return; }
      if (h.year === best.year && qOrder.indexOf(h.quarter) > qOrder.indexOf(best.quarter)) best = h;
    });
    if (best) { dq = best.quarter; dyr = best.year; }
  }

  // Set active quarter button
  document.querySelectorAll('[data-bq]').forEach(function(b) {
    b.className = 'qbtn' + (b.getAttribute('data-bq') === dq ? ' active' : '');
  });
  document.getElementById('bYear').value = dyr;

  // Attach quarter buttons
  document.querySelectorAll('[data-bq]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-bq]').forEach(function(b) { b.className = 'qbtn'; });
      this.className = 'qbtn active';
      doBillingRender();
    });
  });
  document.getElementById('bYear').addEventListener('change', doBillingRender);
  document.getElementById('bStaff').addEventListener('change', doBillingRender);
  document.getElementById('bPI').addEventListener('change', doBillingRender);

  doBillingRender();
}

function doBillingRender() {
  var aq = document.querySelector('[data-bq].active');
  var q = aq ? aq.getAttribute('data-bq') : curQ();
  var yr = parseInt(document.getElementById('bYear').value) || curYr();
  var staff = document.getElementById('bStaff').value;
  var piFilter = document.getElementById('bPI').value;

  var filtered = hoursData.filter(function(h) {
    if (h.quarter !== q || h.year !== yr) return false;
    if (staff && h.staffName !== staff) return false;
    if (piFilter) {
      var p = null;
      for (var i = 0; i < projects.length; i++) { if (projects[i].id === h.projectId) { p = projects[i]; break; } }
      if (!p || p.pi !== piFilter) return false;
    }
    return true;
  });

  if (!filtered.length) {
    sh('billingContent', '<div class="empty">No hours for ' + q + ' ' + yr + ' matching these filters.</div>');
    return;
  }

  var tH = 0, tB = 0;
  filtered.forEach(function(h) { tH += h.hours; tB += h.billingAmount; });

  // Group by PI -> project -> hours
  var byPI = {};
  filtered.forEach(function(h) {
    var p = null;
    for (var i = 0; i < projects.length; i++) { if (projects[i].id === h.projectId) { p = projects[i]; break; } }
    if (!p) return;
    if (!byPI[p.pi]) byPI[p.pi] = { piEmail: p.piEmail || '', fmName: p.fmName || '', fmEmail: p.fmEmail || '', projects: {} };
    if (!byPI[p.pi].piEmail && p.piEmail) byPI[p.pi].piEmail = p.piEmail;
    if (!byPI[p.pi].projects[p.id]) byPI[p.pi].projects[p.id] = { proj: p, hours: 0, billing: 0, bySvc: {} };
    byPI[p.pi].projects[p.id].hours += h.hours;
    byPI[p.pi].projects[p.id].billing += h.billingAmount;
    if (!byPI[p.pi].projects[p.id].bySvc[h.serviceType]) byPI[p.pi].projects[p.id].bySvc[h.serviceType] = 0;
    byPI[p.pi].projects[p.id].bySvc[h.serviceType] += h.hours;
  });

  var html = '<div class="metrics" style="margin-bottom:1rem">';
  html += '<div class="metric"><div class="metric-label">Total hours</div><div class="metric-value mv-blue">' + fmtHrs(tH) + '</div></div>';
  html += '<div class="metric"><div class="metric-label">Total billed</div><div class="metric-value mv-green">' + fmtMoney(tB) + '</div></div>';
  html += '<div class="metric"><div class="metric-label">PIs billed</div><div class="metric-value mv-purple">' + Object.keys(byPI).length + '</div></div>';
  html += '<div class="metric"><div class="metric-label">% Effort</div><div class="metric-value mv-amber">' + (tH / 520 * 100).toFixed(1) + '%</div></div></div>';

  Object.keys(byPI).sort().forEach(function(piName) {
    var pd = byPI[piName];
    var piTotalHrs = 0, piTotalBill = 0;
    Object.keys(pd.projects).forEach(function(pid) { piTotalHrs += pd.projects[pid].hours; piTotalBill += pd.projects[pid].billing; });

    html += '<div style="border:1px solid #e5e5e5;border-radius:10px;margin-bottom:12px;overflow:hidden">';
    // PI header row
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f9f9f9;border-bottom:1px solid #e5e5e5;flex-wrap:wrap;gap:8px">';
    html += '<div><span style="font-weight:700;font-size:14px">' + piName + '</span>';
    html += '<span style="font-size:12px;color:#888;margin-left:12px">' + Object.keys(pd.projects).length + ' project' + (Object.keys(pd.projects).length !== 1 ? 's' : '') + '</span></div>';
    html += '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
    html += '<span style="font-size:13px"><strong>' + fmtHrs(piTotalHrs) + ' hrs</strong></span>';
    html += '<span style="font-size:14px;font-weight:700;color:#3B6D11">' + fmtMoney(piTotalBill) + '</span>';
    if (pd.piEmail) {
      html += '<span style="font-size:11px;color:#3B6D11">' + pd.piEmail + '</span>';
    } else {
      html += '<span style="font-size:11px;color:#A32D2D;font-style:italic">No email on file</span>';
    }
    // Invoice button with PI name stored as data attribute
    html += '<button class="btn btn-sm btn-success billing-invoice-btn" data-pi="' + piName.replace(/"/g, '&quot;') + '" data-email="' + (pd.piEmail || '') + '">Send invoice</button>';
    html += '</div></div>';

    // Projects under this PI
    Object.keys(pd.projects).forEach(function(pid) {
      var pd2 = pd.projects[pid];
      var p = pd2.proj;
      var rem = p.budgetTarget ? (p.budgetTarget - projBill(p.id)) : null;
      html += '<div style="padding:10px 16px;border-bottom:1px solid #f5f5f5">';
      html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">';
      html += '<div>';
      html += '<span style="font-weight:600;font-size:13px">' + p.project + '</span>';
      html += '<span class="' + typeBadge(p.type) + '" style="margin-left:8px">' + typeLabel(p.type) + '</span>';
      if (p.grant) html += '<span style="font-size:11px;color:#888;margin-left:8px">Grant: ' + p.grant + '</span>';
      if (p.fau) html += '<span style="font-size:11px;color:#888;margin-left:8px">FAU: ' + p.fau + '</span>';
      html += '</div>';
      html += '<div style="text-align:right"><span style="font-weight:600;color:#3B6D11">' + fmtMoney(pd2.billing) + '</span>';
      if (rem !== null) html += '<br><span style="font-size:11px;color:' + (rem < 0 ? '#A32D2D' : '#888') + '">Remaining: ' + fmtMoney(rem) + '</span>';
      html += '</div></div>';
      // Service breakdown
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">';
      Object.keys(pd2.bySvc).forEach(function(svc) {
        html += '<span style="font-size:11px;background:#f0f0f0;padding:2px 8px;border-radius:12px;color:#666">' + svc + ': ' + fmtHrs(pd2.bySvc[svc]) + ' hrs</span>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  });

  sh('billingContent', html);

  // Attach invoice buttons AFTER content is rendered
  var btns = document.querySelectorAll('.billing-invoice-btn');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var piName = this.getAttribute('data-pi');
      var piEmail = this.getAttribute('data-email');
      sendInvoiceForPI(piName, piEmail);
    });
  });
}

function buildApprovals() {
  var pending=approvals.filter(function(a){return a.status==='pending';});
  var recent=approvals.filter(function(a){return a.status!=='pending';}).slice(-10).reverse();
  var h='<div class="card"><div class="card-title">Pending approvals ('+pending.length+')</div>';
  if(!pending.length)h+='<div class="empty">No pending approvals &mdash; all caught up</div>';
  else pending.forEach(function(a){
    h+='<div style="border:1px solid #e5e5e5;border-left:4px solid #EF9F27;border-radius:8px;padding:12px;margin-bottom:8px;background:#fff">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">';
    h+='<div><span style="font-weight:600">'+a.projectName+'</span><span class="badge badge-appr-pending" style="margin-left:8px">'+a.requestType.replace(/_/g,' ')+'</span></div>';
    h+='<div style="display:flex;gap:6px"><button class="btn btn-sm btn-approve" data-approve="'+a.id+'">&check; Approve</button><button class="btn btn-sm btn-reject" data-reject="'+a.id+'">&times; Reject</button></div></div>';
    h+='<div style="font-size:12px;color:#666;margin-top:6px"><strong>By:</strong> '+a.requestedBy+' on '+fmtDate(a.requestedDate)+'<br><strong>Field:</strong> '+a.fieldChanged;
    if(a.newValue)h+='<br><strong>Proposed:</strong> '+String(a.newValue).substring(0,120);
    h+='</div></div>';
  });
  h+='</div>';
  if(recent.length){
    h+='<div class="card"><div class="card-title">Recent decisions</div>';
    h+='<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>Request</th><th>Requested by</th><th>Decision</th><th>Reviewed by</th><th>Date</th></tr></thead><tbody>';
    recent.forEach(function(a){
      h+='<tr><td style="font-size:12px;font-weight:600">'+a.projectName+'</td><td style="font-size:12px">'+a.requestType.replace(/_/g,' ')+'</td><td style="font-size:12px">'+a.requestedBy+'</td>';
      h+='<td><span class="badge '+(a.status==='approved'?'badge-approved':'badge-rejected')+'">'+a.status+'</span></td>';
      h+='<td style="font-size:12px">'+a.reviewedBy+'</td><td style="font-size:12px">'+fmtDate(a.reviewedDate)+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  }
  sh('pageContainer',h);
  document.querySelectorAll('[data-approve]').forEach(function(btn){btn.addEventListener('click',function(){reviewApproval(this.getAttribute('data-approve'),'approved');});});
  document.querySelectorAll('[data-reject]').forEach(function(btn){btn.addEventListener('click',function(){reviewApproval(this.getAttribute('data-reject'),'rejected');});});
}
function reviewApproval(id,decision){
  var a=approvals.filter(function(x){return x.id===id;})[0]; if(!a)return;
  a.status=decision; a.reviewedBy=session.name; a.reviewedDate=new Date().toISOString().split('T')[0];
  if(decision==='approved'&&a.requestType==='join_project'){
    var p=projects.filter(function(x){return x.id===a.projectId;})[0];
    if(p&&!(p.team||[]).some(function(m){return m.name===a.requestedBy;})){
      p.team=(p.team||[]).concat([{name:a.requestedBy,pct:null,lead:false}]);
      saveRecord('update',projectToRow(p),'Sheet1');
    }
  }
  saveRecord('update',a,'approvals');
  buildApprovals();
}
