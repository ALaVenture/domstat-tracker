<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOMStat Project Tracker</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F3;color:#1a1a1a;font-size:14px}
.app{max-width:1150px;margin:0 auto;padding:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.logo{font-size:15px;font-weight:600}.logo span{color:#185FA5}
.nav{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.nb{padding:7px 14px;font-size:13px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;color:#666;cursor:pointer}
.nb:hover{background:#f5f5f5}.nb.active{background:#E6F1FB;color:#185FA5;border-color:#b5d4f4}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1rem}
.metric{background:#f5f5f5;border-radius:8px;padding:1rem}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600}
.mv-blue{color:#185FA5}.mv-green{color:#3B6D11}.mv-amber{color:#854F0B}.mv-red{color:#A32D2D}.mv-purple{color:#3C3489}.mv-teal{color:#0F6E56}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:#666;border-bottom:1px solid #e5e5e5;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-pct{background:#E6F1FB;color:#185FA5}.badge-hr{background:#EAF3DE;color:#3B6D11}.badge-ctsi{background:#FAEEDA;color:#854F0B}
.badge-active{background:#EAF3DE;color:#3B6D11}.badge-pending{background:#FAEEDA;color:#854F0B}
.badge-upcoming{background:#E6F1FB;color:#185FA5}.badge-winding{background:#FAECE7;color:#993C1D}
.badge-lead{background:#EEEDFE;color:#3C3489;font-size:10px;padding:1px 6px}
.badge-processed{background:#EAF3DE;color:#3B6D11}
.badge-newproj{background:#E6F1FB;color:#185FA5}.badge-activeproj{background:#EAF3DE;color:#3B6D11}.badge-completeproj{background:#F1EFE8;color:#5F5E5A}
.badge-approved{background:#EAF3DE;color:#3B6D11}.badge-rejected{background:#FCEBEB;color:#A32D2D}.badge-appr-pending{background:#FAEEDA;color:#854F0B}
.ubadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600}
.ub-staff{background:#E6F1FB;color:#185FA5}.ub-mgr{background:#FFF8E1;color:#854F0B}.ub-fac{background:#E1F5EE;color:#0F6E56}
.ub-ad{background:#FFF3E0;color:#854F0B}.ub-dir{background:#E3F2FD;color:#0C447C}.ub-fund{background:#EAF3DE;color:#3B6D11}
.ub-admin{background:#EEEDFE;color:#3C3489}.ub-pub{background:#F1EFE8;color:#5F5E5A}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:#555;font-weight:500}
input,select,textarea{font-size:13px;padding:7px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;width:100%;color:#1a1a1a}
input:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;min-height:60px}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
.btn{padding:8px 18px;font-size:13px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#1a1a1a}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}.btn-primary:hover{background:#0c447c}
.btn-success{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-danger{color:#A32D2D;border-color:#A32D2D}
.btn-approve{background:#EAF3DE;color:#3B6D11;border-color:#3B6D11}
.btn-reject{background:#FCEBEB;color:#A32D2D;border-color:#A32D2D}
.btn-sm{padding:5px 12px;font-size:12px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-row select,.filter-row input{width:auto;font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid #ccc}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;border-left:3px solid transparent}
.alert-warn{background:#FAEEDA;color:#854F0B;border-left-color:#EF9F27}
.alert-info{background:#E6F1FB;color:#185FA5;border-left-color:#378ADD}
.alert-ok{background:#EAF3DE;color:#3B6D11;border-left-color:#639922}
.alert-err{background:#FCEBEB;color:#A32D2D;border-left-color:#E24B4A}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:1.5rem;width:700px;max-width:96vw;margin-bottom:30px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#666}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#639922;flex-shrink:0}
.sync-dot.syncing{background:#EF9F27}.sync-dot.err{background:#E24B4A}
.empty{text-align:center;padding:2.5rem;color:#888;font-size:13px}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F5F5F3;padding:1rem}
.lc{background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:2rem;width:440px;max-width:100%}
.ltabs{display:flex;gap:4px;margin-bottom:1.5rem;background:#f5f5f5;padding:4px;border-radius:10px}
.ltab{flex:1;padding:8px;font-size:13px;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#666;font-weight:500}
.ltab.active{background:#fff;color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tab-group{display:flex;margin-bottom:1rem;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden}
.tab-btn{flex:1;padding:8px 12px;font-size:12px;border:none;background:#f5f5f5;color:#666;cursor:pointer;font-weight:500}
.tab-btn.active{background:#185FA5;color:#fff}
.qbtn{padding:5px 14px;font-size:12px;border:1px solid #e5e5e5;border-radius:20px;background:#fff;color:#666;cursor:pointer}
.qbtn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.budget-bar{height:10px;border-radius:5px;background:#e5e5e5;position:relative;width:120px;margin-top:3px}
.budget-fill{height:10px;border-radius:5px;position:absolute;left:0;top:0}
.skill-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;margin:2px}
.err-msg{font-size:12px;color:#A32D2D;margin-bottom:10px;display:none}
.initials{width:26px;height:26px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#185FA5;flex-shrink:0}
@media(max-width:600px){.metrics{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}.full{grid-column:1}}

</style>
</head>
<body>
<div id="root"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>
<script>

const API="https://script.google.com/macros/s/AKfycbyWbM9m0CRFpbeiesoO3UY9OvGEnFZMyRSH4NTby1qpjS3azDQQRkXmIkjfYxcnqzLj/exec";
const STAFF=["Angelique Rubio", "Angshuman Saha", "Arseniy Vasilyev", "Chris Castle", "Claudia Perez", "Daniela Markovic", "Dennis Ruenger", "Eric Demer", "Estefania Sanchez Salas", "Holly Wilhalme", "Jenny Brook", "Jinhui Liu", "Josh Lee", "Keren Chen", "Lillian Chen", "Lucia Chen", "Mei Leng", "Paige Smith", "Rebecca Chung", "Rong Guo", "Sitaram Vangala", "Tahmineh Romero", "Tristan Grogan", "Tristan Tibbe", "Victoria Adebambo", "Yash Motwani"];

const RATES={"Angelique Rubio": 66.08, "Arseniy Vasilyev": 66.08, "Chris Castle": 66.08, "Claudia Perez": 66.08, "Eric Demer": 66.08, "Estefania Sanchez Salas": 66.08, "Jinhui Liu": 66.08, "Josh Lee": 66.08, "Paige Smith": 66.08, "Rebecca Chung": 66.08, "Victoria Adebambo": 66.08, "Yash Motwani": 66.08, "Lucia Chen": 71.62, "Keren Chen": 72.87, "Lillian Chen": 72.87, "Tristan Tibbe": 72.87, "Dennis Ruenger": 76.2, "Tahmineh Romero": 82.63, "Mei Leng": 92.32, "Daniela Markovic": 92.72, "Holly Wilhalme": 105.42, "Rong Guo": 105.42, "Angshuman Saha": 108.04, "Tristan Grogan": 122.12, "Sitaram Vangala": 122.69, "Jenny Brook": 149.85};
const DEPTS=["Cardiology", "Emergency Medicine", "Endocrinology", "Gastroenterology", "General Internal Medicine", "Geriatrics", "Hematology / Oncology", "Hepatology", "Infectious Disease", "Nephrology", "Neurology", "Obstetrics & Gynecology", "Ophthalmology", "Orthopedic Surgery", "Pediatrics", "Primary Care", "Psychiatry", "Pulmonology / Critical Care", "Radiology", "Rheumatology", "Surgery", "UCLA Health System", "CTSI", "GIM & HSR", "Nursing", "VA", "Orthopaedics", "Radiation Oncology", "Other"];
const SVCS=["Consulting", "Data Analysis", "Data Management", "Database Development", "Grant Application", "Manuscript", "Protocol", "Study Design", "Other"];
const FAC_SVCS=["Data Analysis", "Grant Application", "Administration", "Study Design", "Data Management"];
const PROJ_STATUSES=["New Project", "Active Project", "Project Complete"];
const PUB_STATUSES=["Abstract", "Submitted", "Accepted", "In-Press", "Published", "Under Review", "In-prep"];
const GRANT_TYPES=["PPG/Center", "R01 or Equiv", "U01", "R21 or Equiv", "Foundation", "Industry", "K Series", "Other CDA", "Internal"];
const GRANT_STATUSES=["Funded", "Submitted", "Under Review", "Not Funded"];
const PROF_LEVELS=["Beginner", "Proficient", "Expert"];
const SKILLS={"Methods": ["Regression", "Survival Analysis", "Mixed Models / LME", "Bayesian Analysis", "Power & Sample Size", "Meta-Analysis", "Machine Learning", "Causal Inference", "Longitudinal Data Analysis", "Time Series", "Multivariate Analysis", "Factor Analysis / PCA", "Structural Equation Modeling", "Propensity Score Methods"], "Software": ["R", "SAS", "Stata", "Python", "SPSS", "REDCap", "SQL", "MATLAB"], "Domain": ["Clinical Trials", "EHR / Claims Data", "Survey Design", "Genomics / Omics", "Epidemiology", "Health Services Research", "Pediatrics", "Oncology", "Psychiatry", "Cardiology", "Neurology", "Imaging Data"], "Certifications": ["WOC (VA Authorization)"]};
const PASSCODES={staff:"staff123",staffmgr:"StaffManager123",faculty:"Faculty123",fund:"fund456",admin:"admin789"};
const ROLE_PAGES={
  public:["pidashboard","intake","mystatus"],
  staff:["dashboard","myprojects","editproject","loghours","myhours","myprofile","intake"],
  staffmgr:["dashboard","allprojects","editproject","loghours","myhours","myprofile","staffskills","intake"],
  faculty:["dashboard","editproject","facultyreporting","myprofile","staffskills","intake"],
  fund:["dashboard","allprojects","billing","fund","staffskills"],
  admin:["dashboard","allprojects","editproject","loghours","billing","fund","facultyreporting","myprofile","staffskills","availability","facultydb","staffview","budgets","approvals","intake"],
  assocdir:["dashboard","allprojects","editproject","loghours","billing","fund","facultyreporting","myprofile","staffskills","availability","facultydb","staffview","budgets","approvals","intake"],
  director:["dashboard","allprojects","editproject","loghours","billing","fund","facultyreporting","myprofile","staffskills","availability","facultydb","staffview","budgets","approvals","intake"]
};
const PAGE_LABELS={
  pidashboard:"My Dashboard",dashboard:"Dashboard",myprojects:"My Projects",allprojects:"All Projects",
  loghours:"Log Hours",myhours:"My Hours",facultyreporting:"Faculty Reporting",
  billing:"Hours & Billing",fund:"Fund Manager Queue",staffview:"Staff Overview",
  budgets:"Budget Management",approvals:"Pending Approvals",editproject:"Edit Project",
  intake:"Submit Project",mystatus:"My Submissions",myprofile:"My Profile",staffskills:"Staff Skills",availability:"Staff Availability",facultydb:"Faculty Database"
};
const PROF_BG={Beginner:"#E6F1FB",Proficient:"#EAF3DE",Expert:"#EEEDFE"};
const PROF_COL={Beginner:"#185FA5",Proficient:"#3B6D11",Expert:"#3C3489"};

// ── State ──────────────────────────────────────────────────────────────────
var projects=[],hoursData=[],approvals=[],facultyHours=[],facultyPubs=[],facultyGrants=[];
var profilesData={},skillRequests=[],intakeTeam=[];
var session={role:"public",name:null,piEmail:null};
var currentPage="intake";
var nextIds={proj:1,hrs:1,appr:1,fh:1,fp:1,fg:1,sr:1};

// ── DOM helpers ────────────────────────────────────────────────────────────
function el(id){return document.getElementById(id);}
function gv(id){var e=el(id);return e?e.value:"";}
function sh(id,html){var e=el(id);if(e)e.innerHTML=html;}
function openModal(html){el("modalContent").innerHTML=html;el("modalOverlay").className="modal-overlay open";}
function closeModal(){el("modalOverlay").className="modal-overlay";}

// ── Utilities ──────────────────────────────────────────────────────────────
function initials(n){var p=(n||"").split(" ");return((p[0]||"?")[0]+(p[p.length-1]||"?")[0]).toUpperCase();}
function fmtDate(d){if(!d)return"—";try{var dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){return d;}}
function fmtMoney(n){return(n===null||n===undefined||n==="")?"—":"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtHrs(n){return(n===null||n===undefined||n==="")?0:Number(n).toFixed(1);}
function typeLabel(t){return{pct:"% Effort",hr:"Hourly Recharge",ctsi:"CTSI"}[t]||t;}
function typeBadge(t){return "badge badge-"+{pct:"pct",hr:"hr",ctsi:"ctsi"}[t];}
function statusBadge(s){return "badge badge-"+{active:"active",pending:"pending",upcoming:"upcoming",winding:"winding"}[s]||"badge";}
function projStatusBadge(s){return "badge "+{"New Project":"badge-newproj","Active Project":"badge-activeproj","Project Complete":"badge-completeproj"}[s];}
function daysLeft(d){return Math.ceil((new Date(d)-new Date())/86400000);}
function getQ(d){if(!d)return null;var m=new Date(d).getMonth()+1;return m<=3?"Q1":m<=6?"Q2":m<=9?"Q3":"Q4";}
function getYr(d){if(!d)return null;return new Date(d).getFullYear();}
function curQ(){return getQ(new Date().toISOString());}
function curYr(){return new Date().getFullYear();}
function parseTeam(r){if(!r)return[];try{return JSON.parse(r);}catch(e){return[];}}
function projHrs(id){return hoursData.filter(function(h){return h.projectId===id;}).reduce(function(a,h){return a+h.hours;},0);}
function projBill(id){return hoursData.filter(function(h){return h.projectId===id;}).reduce(function(a,h){return a+h.billingAmount;},0);}
function isAdmin(){return["admin","director","assocdir"].indexOf(session.role)>-1;}
function canApprove(){return["admin","director","assocdir"].indexOf(session.role)>-1;}
function canEditNow(){return["admin","director","assocdir","staffmgr","faculty"].indexOf(session.role)>-1;}

function setSyncStatus(state,msg){
  var dot=el("syncDot"),txt=el("syncStatus");
  if(!dot||!txt)return;
  dot.className="sync-dot"+(state==="syncing"?" syncing":state==="err"?" err":"");
  txt.textContent=msg;
}

function getFridayWeeks(n){
  var weeks=[],d=new Date();d.setHours(0,0,0,0);
  var diff=d.getDay()<=5?5-d.getDay():5-d.getDay()+7;
  d.setDate(d.getDate()+diff);
  for(var i=0;i<n;i++){weeks.push(new Date(d).toISOString().split("T")[0]);d.setDate(d.getDate()-7);}
  return weeks;
}

// ── Badges ─────────────────────────────────────────────────────────────────
function userBadge(name){
  if(name==="David Elashoff") return "<span class='ubadge ub-dir'>&#128311; Director</span>";
  if(name==="Sitaram Vangala") return "<span class='ubadge ub-ad'>&#128310; Assoc. Dir</span>";
  if(STAFF_MGRS.indexOf(name)>-1) return "<span class='ubadge ub-mgr'>&#128203; Staff Mgr</span>";
  if(FACULTY.indexOf(name)>-1) return "<span class='ubadge ub-fac'>&#127891; Faculty</span>";
  if(STAFF.indexOf(name)>-1) return "<span class='ubadge ub-staff'>&#128100; Staff</span>";
  return "";
}

function roleBadgeHtml(){
  var labels={public:"PI / Submitter",staff:"Staff",staffmgr:"Staff Manager",faculty:"Faculty",
    assocdir:"Associate Director",director:"Director",fund:"Fund Manager",admin:"Admin"};
  var icons={public:"&#128302;",staff:"&#128100;",staffmgr:"&#128203;",faculty:"&#127891;",
    assocdir:"&#128310;",director:"&#128311;",fund:"&#128176;",admin:"&#128737;"};
  var cls={public:"ub-pub",staff:"ub-staff",staffmgr:"ub-mgr",faculty:"ub-fac",
    assocdir:"ub-ad",director:"ub-dir",fund:"ub-fund",admin:"ub-admin"};
  var r=session.role||"public";
  var txt=icons[r]+" "+(labels[r]||r)+(session.name?" — "+session.name:"");
  return "<span class='ubadge "+cls[r]+"'>"+txt+"</span>";
}

// ── Row converters ─────────────────────────────────────────────────────────
function rowToProject(r){
  return{id:String(r.id||""),pi:r.pi||"",project:r.project||"",type:r.type||"hr",
    department:r.department||"",grant:r.grant||"",fau:r.fau||"",
    start:r.start||"",end:r.end||"",
    totalValue:(r.totalValue!==""&&r.totalValue!=null)?Number(r.totalValue):null,
    fundsReceived:(r.fundsReceived!==""&&r.fundsReceived!=null)?Number(r.fundsReceived):null,
    budgetTarget:(r.budgetTarget!==""&&r.budgetTarget!=null)?Number(r.budgetTarget):null,
    status:r.status||"active",fundManagerStatus:r.fundManagerStatus||"pending",
    projectStatus:r.projectStatus||"Active Project",
    piEmail:r.piEmail||"",fmName:r.fmName||"",fmEmail:r.fmEmail||"",piPin:r.piPin||"",
    notes:r.notes||"",submittedBy:r.submittedBy||"",submittedDate:r.submittedDate||"",
    lead:r.lead||"",team:parseTeam(r.team)};
}
function projectToRow(p){
  return{id:p.id,pi:p.pi,project:p.project,type:p.type,department:p.department||"",
    grant:p.grant||"",fau:p.fau||"",start:p.start||"",end:p.end||"",
    totalValue:p.totalValue!=null?p.totalValue:"",fundsReceived:p.fundsReceived!=null?p.fundsReceived:"",
    budgetTarget:p.budgetTarget!=null?p.budgetTarget:"",status:p.status,
    fundManagerStatus:p.fundManagerStatus,projectStatus:p.projectStatus||"Active Project",
    piEmail:p.piEmail||"",fmName:p.fmName||"",fmEmail:p.fmEmail||"",piPin:p.piPin||"",
    notes:p.notes||"",submittedBy:p.submittedBy,submittedDate:p.submittedDate,
    lead:p.lead||"",team:JSON.stringify(p.team||[])};
}
function rowToHours(r){
  return{id:String(r.id||""),projectId:String(r.projectId||""),staffName:r.staffName||"",
    weekEnding:r.weekEnding||"",serviceType:r.serviceType||"",hours:Number(r.hours)||0,
    billingAmount:Number(r.billingAmount)||0,pctEffort:Number(r.pctEffort)||0,
    projectStatus:r.projectStatus||"Active Project",notes:r.notes||"",
    submittedDate:r.submittedDate||"",quarter:r.quarter||"",year:Number(r.year)||0};
}
function rowToApproval(r){
  return{id:String(r.id||""),requestType:r.requestType||"",requestedBy:r.requestedBy||"",
    projectId:String(r.projectId||""),projectName:r.projectName||"",
    fieldChanged:r.fieldChanged||"",oldValue:r.oldValue||"",newValue:r.newValue||"",
    status:r.status||"pending",requestedDate:r.requestedDate||"",
    reviewedBy:r.reviewedBy||"",reviewedDate:r.reviewedDate||"",notes:r.notes||""};
}

// ── API ────────────────────────────────────────────────────────────────────
function fetchSheet(name){
  return fetch(API+"?sheet="+name+"&t="+Date.now())
    .then(function(r){return r.ok?r.json():[];})
    .catch(function(){return[];});
}

function saveRecord(action,record,sheet){
  setSyncStatus("syncing","Saving...");
  return fetch(API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:action,record:record,sheet:sheet||"Sheet1"})})
    .then(function(){setSyncStatus("ok","Saved");setTimeout(function(){setSyncStatus("ok","Live — Google Sheets");},2000);return true;})
    .catch(function(){setSyncStatus("err","Save failed");return false;});
}

function submitApproval(reqType,projId,projName,field,oldVal,newVal){
  var rec={id:String(nextIds.appr++),requestType:reqType,requestedBy:session.name,
    projectId:projId,projectName:projName,fieldChanged:field,
    oldValue:typeof oldVal==="object"?JSON.stringify(oldVal):String(oldVal||""),
    newValue:typeof newVal==="object"?JSON.stringify(newVal):String(newVal||""),
    status:"pending",requestedDate:new Date().toISOString().split("T")[0],
    reviewedBy:"",reviewedDate:"",notes:""};
  approvals.push(rec);
  return saveRecord("add",rec,"approvals");
}

function loadData(manual){
  setSyncStatus("syncing",manual?"Refreshing...":"Connecting...");
  Promise.all([
    fetchSheet("Sheet1"),
    fetchSheet("hours"),
    fetchSheet("approvals"),
    fetchSheet("profiles"),
    fetchSheet("skillRequests"),
    fetchSheet("facultyHours"),
    fetchSheet("facultyPublications"),
    fetchSheet("facultyGrants")
  ]).then(function(results){
    var pd=results[0],hd=results[1],ad=results[2],prfd=results[3],srd=results[4],fhd=results[5],fpd=results[6],fgd=results[7];
    if(Array.isArray(pd)){
      projects=pd.map(rowToProject).filter(function(p){return p.id&&p.project;});
      if(projects.length)nextIds.proj=Math.max.apply(null,projects.map(function(p){return Number(p.id)||0;}).concat([0]))+1;
    }
    if(Array.isArray(hd)){
      hoursData=hd.map(rowToHours).filter(function(h){return h.id&&h.projectId;});
      if(hoursData.length)nextIds.hrs=Math.max.apply(null,hoursData.map(function(h){return Number(h.id)||0;}).concat([0]))+1;
    }
    if(Array.isArray(ad)){
      approvals=ad.map(rowToApproval).filter(function(a){return a.id;});
      if(approvals.length)nextIds.appr=Math.max.apply(null,approvals.map(function(a){return Number(a.id)||0;}).concat([0]))+1;
    }
    profilesData={};
    if(Array.isArray(prfd))prfd.forEach(function(r){
      if(r.staffName)try{profilesData[r.staffName]={skills:JSON.parse(r.skills||"[]"),updatedDate:r.updatedDate||""};}catch(e){profilesData[r.staffName]={skills:[],updatedDate:""};}
    });
    if(Array.isArray(srd))skillRequests=srd.filter(function(r){return r.id;});
    if(Array.isArray(fhd))facultyHours=fhd.filter(function(r){return r.id;});
    if(Array.isArray(fpd))facultyPubs=fpd.filter(function(r){return r.id;});
    if(Array.isArray(fgd))facultyGrants=fgd.filter(function(r){return r.id;});
    setSyncStatus("ok",(manual?"Refreshed — ":"Connected — ")+projects.length+" project"+(projects.length!==1?"s":""));
    setTimeout(function(){setSyncStatus("ok","Live — Google Sheets");},3000);
    try { renderNav(); } catch(navErr) {
      console.error('renderNav error:', navErr);
      document.getElementById('root').innerHTML = '<div style="padding:2rem;font-family:sans-serif"><h3 style="color:#c00">Nav error: '+navErr.message+'</h3></div>';
      return;
    }
    try { renderPage(currentPage); } catch(pageErr) {
      console.error('renderPage error:', pageErr);
      var pc = document.getElementById('pageContainer');
      if(pc) pc.innerHTML = '<div style="padding:1rem;background:#fef;border:1px solid #c00;border-radius:8px;font-family:sans-serif;font-size:13px"><strong>Page error:</strong> '+pageErr.message+'<br><pre style="font-size:11px;margin-top:8px">'+pageErr.stack+'</pre></div>';
    }
  }).catch(function(err){
    setSyncStatus("err","Connection failed: "+err.message);
    try { renderNav(); } catch(e2) {}
    try { renderPage(currentPage); } catch(e3) {
      var pc = document.getElementById('pageContainer');
      if(pc) pc.innerHTML = '<div style="padding:1rem;color:#c00">Load error: '+err.message+'</div>';
    }
  });
}

function doPILogin() {
  var email = gv('pi-email').trim().toLowerCase();
  var pin = gv('pi-pin').trim();
  var errEl = el('pi-err');
  if (!email || !pin) { errEl.style.display = 'block'; return; }
  var match = null;
  for (var i = 0; i < projects.length; i++) {
    if (projects[i].piEmail && projects[i].piEmail.toLowerCase() === email && String(projects[i].piPin) === String(pin)) {
      match = projects[i]; break;
    }
  }
  if (!match) { errEl.style.display = 'block'; return; }
  session = {role:'public', name:match.pi, piEmail:email};
  currentPage = 'pidashboard';
  renderNav();
  renderPage('pidashboard');
}

function doLogin(tab) {
  var role, name, code, errEl, expectedCode;
  if (tab === 'staff') {
    role = gv('lr-staff'); name = gv('ln-staff'); code = gv('lc-staff'); errEl = el('le-staff');
    if (!name) { alert('Please select your name.'); return; }
    var isSitaram = (name === 'Sitaram Vangala' && role === 'staffmgr');
    expectedCode = isSitaram ? PASSCODES.admin : (role === 'staffmgr' ? PASSCODES.staffmgr : PASSCODES.staff);
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
    if (isSitaram) role = 'assocdir';
  } else if (tab === 'faculty') {
    name = gv('ln-faculty'); code = gv('lc-faculty'); errEl = el('le-faculty');
    if (!name) { alert('Please select your name.'); return; }
    role = name === 'David Elashoff' ? 'director' : (name === 'Sitaram Vangala' ? 'assocdir' : 'faculty');
    expectedCode = (role === 'director' || role === 'assocdir') ? PASSCODES.admin : PASSCODES.faculty;
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
  } else {
    role = gv('lr-admin'); code = gv('lc-admin'); errEl = el('le-admin');
    expectedCode = role === 'fund' ? PASSCODES.fund : PASSCODES.admin;
    if (code !== expectedCode) { errEl.style.display = 'block'; return; }
    name = role === 'fund' ? 'Fund Manager' : 'Admin';
  }
  errEl.style.display = 'none';
  session = {role:role, name:name, piEmail:null};
  currentPage = ROLE_PAGES[role][0];
  loadData(false);
}

function logout() {
  session = {role:'public', name:null, piEmail:null};
  currentPage = 'intake';
  showLogin();
}

function teamPills(p) {
  var html = '';
  (p.team || []).forEach(function(m) {
    html += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">';
    html += '<div class="initials">' + initials(m.name) + '</div>';
    html += '<span style="font-size:12px">' + m.name + '</span>';
    if (m.lead) html += ' <span class="badge badge-lead">Lead</span>';
    if (p.type === 'pct' && m.pct) html += ' <span style="font-size:10px;background:#EEEDFE;color:#534AB7;padding:1px 5px;border-radius:3px">' + m.pct + '%</span>';
    html += userBadge(m.name);
    html += '</div>';
  });
  return html;
}

function budgetBar(p) {
  if (!p.budgetTarget) return '';
  var spent = projBill(p.id);
  var pct = Math.min(100, Math.round(spent / p.budgetTarget * 100));
  var col = pct >= 100 ? '#E24B4A' : pct >= 80 ? '#EF9F27' : '#639922';
  return '<div class="budget-bar"><div class="budget-fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
    '<div style="font-size:10px;color:#888;margin-top:2px">' + fmtMoney(spent) + ' / ' + fmtMoney(p.budgetTarget) + '</div>';
}

function getProfile(name) { return profilesData[name] || {skills:[], updatedDate:''}; }

function getAllSkills() {
  var tax = JSON.parse(JSON.stringify(SKILLS));
  skillRequests.filter(function(r) { return r.status === 'approved'; }).forEach(function(r) {
    if (tax[r.category] && tax[r.category].indexOf(r.skillName) === -1) tax[r.category].push(r.skillName);
  });
  return tax;
}

function skillBadge(skill) {
  var lvl = skill.level || 'Proficient';
  var isWOC = skill.name === 'WOC (VA Authorization)';
  var bg = isWOC ? '#FAEEDA' : (PROF_BG[lvl] || '#f5f5f5');
  var col = isWOC ? '#854F0B' : (PROF_COL[lvl] || '#555');
  return '<span class="skill-badge" style="background:' + bg + ';color:' + col + ';border:1px solid ' + (isWOC ? '#EF9F27' : 'transparent') + '">' +
    (isWOC ? '&#127973; ' : '') + skill.name + ' <span style="opacity:.65;font-size:10px">&middot; ' + lvl + '</span></span>';
}

function profileSkillsHtml(name) {
  var p = getProfile(name);
  if (!(p.skills || []).length) return '';
  var tax = getAllSkills();
  var html = '';
  Object.keys(tax).forEach(function(cat) {
    var cs = p.skills.filter(function(s) { return s.category === cat; });
    if (!cs.length) return;
    html += '<div style="margin-bottom:5px"><span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-right:4px">' + cat + '</span>';
    cs.forEach(function(s) { html += skillBadge(s); });
    html += '</div>';
  });
  return html;
}

  if (canFunds && p.budgetTarget != null) h += '<div><span style="color:#666">Budget target:</span> ' + fmtMoney(p.budgetTarget) + '</div>';
  if (canFunds) h += '<div><span style="color:#666">Billed to date:</span> <strong style="color:#3B6D11">' + fmtMoney(projBill(p.id)) + '</strong></div>';
  h += '</div>';
  h += '<div style="margin-bottom:1rem"><div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:8px">Team</div>';
  h += teamPills(p) || '<div style="font-size:12px;color:#999">Unassigned</div>';

  if (['fund','admin','director','assocdir'].indexOf(session.role) > -1) h += '<button class="btn btn-sm btn-success" id="detailInvoiceBtn">Send invoice</button>';
  h += '<button class="btn btn-sm" id="detailCloseBtn">Close</button>';

function applyAllFilters() {
  var type=gv('fType'),status=gv('fStatus'),dept=gv('fDept'),staff=gv('fStaff'),ps=gv('fPS'),skill=gv('fSkill');
  var f = projects.filter(function(p) {
    if (type && p.type !== type) return false;
    if (status && p.status !== status) return false;
    if (dept && p.department !== dept) return false;
    if (ps && p.projectStatus !== ps) return false;
    if (staff && !(p.team||[]).some(function(m) { return m.name === staff; })) return false;
    if (skill && !(p.team||[]).some(function(m) { return (getProfile(m.name).skills||[]).some(function(s) { return s.name === skill; }); })) return false;
    return true;
  });
  sh('apBody', buildAPRows(f));
}

function calcBilling(projId, svcIdx, staffName) {
  var rate = RATES[staffName] || 66.08;
  var hrs = parseFloat((el('hrs_'+projId+'_'+svcIdx)||{}).value) || 0;
  var bill = hrs * rate;
  var billEl = el('bill_'+projId+'_'+svcIdx);
  if (billEl) billEl.textContent = hrs > 0 ? fmtMoney(bill) : '—';
  var th = 0, tb = 0;
  SVCS.forEach(function(_,i) { var hv=parseFloat((el('hrs_'+projId+'_'+i)||{}).value)||0; th+=hv; tb+=hv*rate; });
  var tot = el('pWT_'+projId);
  if (tot) tot.innerHTML = th.toFixed(1) + ' hrs &mdash; ' + fmtMoney(tb);
}

function submitHours() {
  var weekEnding = gv('logWeek');
  var staffName = isAdmin() ? gv('logStaff') : session.name;
  if (!staffName) { alert('Please select a staff member.'); return; }
  var rate = RATES[staffName] || 66.08;
  var q = getQ(weekEnding), yr = getYr(weekEnding);
  var entries = [];
  projects.filter(function(p) { return (p.team||[]).some(function(m) { return m.name === staffName; }); }).forEach(function(p) {
    var newStatus = gv('ps_'+p.id) || p.projectStatus;
    SVCS.forEach(function(svc,si) {
      var hrs = parseFloat((el('hrs_'+p.id+'_'+si)||{}).value) || 0;
      if (hrs > 0) entries.push({id:String(nextIds.hrs++),projectId:p.id,staffName:staffName,weekEnding:weekEnding,serviceType:svc,hours:hrs,billingAmount:parseFloat((hrs*rate).toFixed(2)),pctEffort:parseFloat((hrs/520).toFixed(4)),projectStatus:newStatus,notes:'',submittedDate:new Date().toISOString().split('T')[0],quarter:q,year:yr});
    });
    if (newStatus !== p.projectStatus) { p.projectStatus = newStatus; saveRecord('update',projectToRow(p),'Sheet1'); }
  });
  if (!entries.length) { alert('No hours entered.'); return; }
  var saves = entries.map(function(e) { hoursData.push(e); return saveRecord('add',e,'hours'); });
  Promise.all(saves).then(function() {
    var totH = entries.reduce(function(a,e) { return a+e.hours; }, 0);
    var totB = entries.reduce(function(a,e) { return a+e.billingAmount; }, 0);
    openModal('<div class="modal-title">Hours submitted</div><div class="alert alert-ok">' + entries.length + ' entries saved for week ending ' + fmtDate(weekEnding) + '.</div>' +
      '<p style="font-size:13px;color:#666;margin-bottom:1rem"><strong>Staff:</strong> ' + staffName + '<br><strong>Total hours:</strong> ' + totH.toFixed(1) + '<br><strong>Total billing:</strong> ' + fmtMoney(totB) + '</p>' +
      '<div class="actions"><button class="btn btn-primary" id="viewHrsBtn">View my hours</button><button class="btn" id="logMoreBtn">Log another week</button></div>');
    el('viewHrsBtn').addEventListener('click', function() { closeModal(); renderPage('myhours'); });
    el('logMoreBtn').addEventListener('click', function() { closeModal(); renderPage('loghours'); });
  });
}

function buildEditProjectList(list, group, query) {
  group = group || 'mine';

  var myProjects = list.filter(onTeamFn);

  if (!list.length) return '<div class="empty">No projects match your search.</div>';

  var h = '';

  // Show "My Projects" section first if group !== 'all'
  if (group !== 'all' && myProjects.length) {
    h += '<div style="font-size:11px;font-weight:700;color:#185FA5;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;gap:8px">';
    h += '<span style="background:#E6F1FB;color:#185FA5;padding:3px 10px;border-radius:20px">My projects (' + myProjects.length + ')</span></div>';
    myProjects.forEach(function(p) { h += buildEPCard(p, true); });
    if (group === 'onlyme') {
      if (!myProjects.length) h += '<div class="empty">You are not on any projects yet.</div>';
      return h;
    }
    if (otherProjects.length) {
      h += '<div style="height:1px;background:#e8e8e6;margin:12px 0"></div>';
      h += '<div style="font-size:11px;font-weight:700;color:#3B6D11;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">';

    shown.forEach(function(p) { h += buildEPCard(p, onTeamFn(p)); });

  var newGrant = gv('ep_grant'), newFau = gv('ep_fau');
  var grantChanged = newGrant !== p.grant, fauChanged = newFau !== p.fau;
  if ((grantChanged||fauChanged) && !canFunding) submitApproval('grant_fau_change',p.id,p.project,grantChanged?'grant':'FAU',grantChanged?p.grant:p.fau,grantChanged?newGrant:newFau);
  if (session.role === 'staff') {
    submitApproval('project_edit',p.id,p.project,'project fields',p.project,gv('ep_project'));
    closeModal(); alert('Change request submitted — admin will review.'); return;
  }
  p.project = gv('ep_project')||p.project; p.pi = gv('ep_pi')||p.pi;
  p.department = gv('ep_dept')||p.department; p.projectStatus = gv('ep_ps')||p.projectStatus;
  p.start = gv('ep_start')||p.start; p.end = gv('ep_end')||p.end; p.notes = gv('ep_notes');
  if (!grantChanged||canFunding) p.grant = newGrant;
  if (!fauChanged||canFunding) p.fau = newFau;
  if (canFunding) {
    p.totalValue = parseFloat(gv('ep_tv'))||p.totalValue; p.fundsReceived = parseFloat(gv('ep_fr'))||p.fundsReceived;
    p.budgetTarget = parseFloat(gv('ep_bt'))||p.budgetTarget; p.fmName = gv('ep_fmname')||p.fmName; p.fmEmail = gv('ep_fmemail')||p.fmEmail;
  }
  saveRecord('update', projectToRow(p), 'Sheet1');
  closeModal(); renderPage('allprojects');
}

    if (sorted.length) { defaultQ = sorted[0].quarter; defaultYr = sorted[0].year; }
  }

  document.querySelectorAll('[data-bq]').forEach(function(b){ b.className='qbtn'+(b.getAttribute('data-bq')===defaultQ?' active':''); });

function renderBillingTable(q, yr) {
  var staff=gv('bStaff'), pi=gv('bPI');
  var filtered = hoursData.filter(function(h){ return h.quarter===q && h.year===yr && (!staff||h.staffName===staff); });
  if (pi) { var pids=projects.filter(function(p){return p.pi===pi;}).map(function(p){return p.id;}); filtered=filtered.filter(function(h){return pids.indexOf(h.projectId)>-1;}); }
  var tH=filtered.reduce(function(a,h){return a+h.hours;},0), tB=filtered.reduce(function(a,h){return a+h.billingAmount;},0);
  if (!filtered.length) { sh('billingContent','<div class="empty">No hours for '+q+' '+yr+' matching these filters.</div>'); return; }
  // Build byProj map for buildBilProjectView
  var byProj={};
  filtered.forEach(function(h){
    if(!byProj[h.projectId])byProj[h.projectId]={hours:0,billing:0};
    byProj[h.projectId].hours+=h.hours;
    byProj[h.projectId].billing+=h.billingAmount;
  });
  var piCount = {};
  Object.keys(byProj).forEach(function(pid){ var p=projects.filter(function(x){return x.id===pid;})[0]; if(p&&!piCount[p.pi])piCount[p.pi]=1; });
  var h = '<div class="metrics" style="margin-bottom:1rem">';
  h += '<div class="metric"><div class="metric-label">Total hours</div><div class="metric-value mv-blue">'+fmtHrs(tH)+'</div></div>';
  h += '<div class="metric"><div class="metric-label">Total billed</div><div class="metric-value mv-green">'+fmtMoney(tB)+'</div></div>';
  h += '<div class="metric"><div class="metric-label">PIs billed</div><div class="metric-value mv-purple">'+Object.keys(piCount).length+'</div></div>';
  h += '<div class="metric"><div class="metric-label">% Effort</div><div class="metric-value mv-amber">'+(tH/520*100).toFixed(1)+'%</div></div></div>';
  h += buildBilProjectView(byProj);
  sh('billingContent', h);
  // Attach invoice listeners
  document.querySelectorAll('[data-invoice-pi]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var parts=decodeURIComponent(this.getAttribute('data-invoice-pi')).split('|');
      sendInvoiceForPI(parts[0], parts[1]||'');
    });
  });
}


function sendInvoice(pid) {
  // Find the PI for this project, then invoice ALL their projects together
  var triggerProj = projects.filter(function(x) { return x.id === pid; })[0];
  if (!triggerProj) return;
  sendInvoiceForPI(triggerProj.pi, triggerProj.piEmail);
}

function sendInvoiceForPI(piName, piEmail) {
  // Get all projects for this PI
  var piProjects = projects.filter(function(p) { return p.pi === piName; });
  if (!piProjects.length) return;

  // Use first project's FM info and PI email if not passed directly
  var fmName = '', fmEmail = '', fau = '', piEmailFinal = piEmail || '';
  piProjects.forEach(function(p) {
    if (!fmName && p.fmName) fmName = p.fmName;
    if (!fmEmail && p.fmEmail) fmEmail = p.fmEmail;
    if (!piEmailFinal && p.piEmail) piEmailFinal = p.piEmail;
  });

  var today = new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
  function fmt(n) { return n.toLocaleString('en-US', {style:'currency', currency:'USD'}); }
  function pad(s, len) { s = String(s); while (s.length < len) s += ' '; return s; }

  var grandTotalHrs = 0, grandTotalBill = 0;
  var projectSections = [];

  piProjects.forEach(function(p) {
    var ph = hoursData.filter(function(h) { return h.projectId === p.id; });
    if (!ph.length) return; // skip projects with no hours

    var tH = ph.reduce(function(a,h) { return a+h.hours; }, 0);
    var tB = ph.reduce(function(a,h) { return a+h.billingAmount; }, 0);
    grandTotalHrs += tH;
    grandTotalBill += tB;

    // By service type
    var bySvc = {};
    ph.forEach(function(h) {
      if (!bySvc[h.serviceType]) bySvc[h.serviceType] = {hrs:0, bill:0};
      bySvc[h.serviceType].hrs += h.hours;
      bySvc[h.serviceType].bill += h.billingAmount;
    });

    // By quarter
    var byQ = {};
    ph.forEach(function(h) {
      var k = h.quarter + ' ' + h.year;
      if (!byQ[k]) byQ[k] = {hrs:0, bill:0};
      byQ[k].hrs += h.hours;
      byQ[k].bill += h.billingAmount;
    });

    var section = '';
    section += '\nProject: ' + p.project + '\n';
    section += 'Grant #: ' + (p.grant || 'N/A') + '   FAU: ' + (p.fau || 'N/A') + '\n';
    section += '-'.repeat(55) + '\n';
    section += pad('Service type', 28) + pad('Hours', 8) + 'Amount\n';
    section += '-'.repeat(55) + '\n';
    Object.keys(bySvc).forEach(function(svc) {
      section += pad(svc, 28) + pad(bySvc[svc].hrs.toFixed(1), 8) + fmt(bySvc[svc].bill) + '\n';
    });
    section += '-'.repeat(55) + '\n';
    section += pad('Project subtotal', 28) + pad(tH.toFixed(1), 8) + fmt(tB) + '\n';
    if (p.budgetTarget) {
      section += pad('Budget target', 28) + ' '.repeat(8) + fmt(p.budgetTarget) + '\n';
      section += pad('Remaining budget', 28) + ' '.repeat(8) + fmt(p.budgetTarget - tB) + '\n';
    }

    projectSections.push(section);
  });

  if (!projectSections.length) {
    alert('No hours have been logged for any of ' + piName + '\'s projects yet.');
    return;
  }

  var body = 'UCLA DEPARTMENT OF MEDICINE STATISTICS\n';
  body += 'DOMStat Statistical Consulting Services\n';
  body += 'Invoice Date: ' + today + '\n';
  body += '='.repeat(55) + '\n\n';
  body += 'BILL TO\n';
  body += 'Principal Investigator: ' + piName + '\n';
  body += 'Projects invoiced: ' + projectSections.length + '\n\n';
  body += '='.repeat(55) + '\n';
  body += 'ITEMIZED CHARGES BY PROJECT\n';
  body += '='.repeat(55) + '\n';
  body += projectSections.join('\n');
  body += '\n' + '='.repeat(55) + '\n';
  body += 'INVOICE TOTAL\n';
  body += '-'.repeat(55) + '\n';
  body += pad('Total hours', 28) + pad(grandTotalHrs.toFixed(1), 8) + '\n';
  body += pad('TOTAL AMOUNT DUE', 28) + ' '.repeat(8) + fmt(grandTotalBill) + '\n';
  body += '='.repeat(55) + '\n\n';
  body += 'PAYMENT INSTRUCTIONS\n';
  body += 'Please remit payment to UCLA Department of Medicine Statistics.\n';
  if (fau) body += 'FAU: ' + fau + '\n';
  body += '\nQuestions? Contact:\n';
  body += (fmName || 'DOMStat Fund Manager') + '\n';
  if (fmEmail) body += fmEmail + '\n';
  body += '\nDOMStat - UCLA Department of Medicine Statistics\n';
  body += 'https://alaventure.github.io/domstat-tracker\n';
  body += '='.repeat(55) + '\n';

  var subject = encodeURIComponent('DOMStat Invoice — ' + piName + ' — ' + today);
  window.location.href = 'mailto:' + piEmailFinal + '?subject=' + subject + '&body=' + encodeURIComponent(body);
}

function buildApprovals() {

  var h='<div class="card"><div class="card-title">Pending approvals ('+pending.length+')</div>';
  if(!pending.length)h+='<div class="empty">No pending approvals &mdash; all caught up</div>';
  else pending.forEach(function(a){
    h+='<div style="border:1px solid #e5e5e5;border-left:4px solid #EF9F27;border-radius:8px;padding:12px;margin-bottom:8px;background:#fff">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">';
    h+='<div><span style="font-weight:600">'+a.projectName+'</span><span class="badge badge-appr-pending" style="margin-left:8px">'+a.requestType.replace(/_/g,' ')+'</span></div>';
    h+='<div style="display:flex;gap:6px"><button class="btn btn-sm btn-approve" data-approve="'+a.id+'">&check; Approve</button><button class="btn btn-sm btn-reject" data-reject="'+a.id+'">&times; Reject</button></div></div>';
    h+='<div style="font-size:12px;color:#666;margin-top:6px"><strong>By:</strong> '+a.requestedBy+' on '+fmtDate(a.requestedDate)+'<br><strong>Field:</strong> '+a.fieldChanged;
    if(a.newValue)h+='<br><strong>Proposed:</strong> '+String(a.newValue).substring(0,120);
    h+='</div></div>';
  });
  h+='</div>';
  if(recent.length){
    h+='<div class="card"><div class="card-title">Recent decisions</div>';
    h+='<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>Request</th><th>Requested by</th><th>Decision</th><th>Reviewed by</th><th>Date</th></tr></thead><tbody>';
    recent.forEach(function(a){
      h+='<tr><td style="font-size:12px;font-weight:600">'+a.projectName+'</td><td style="font-size:12px">'+a.requestType.replace(/_/g,' ')+'</td><td style="font-size:12px">'+a.requestedBy+'</td>';
      h+='<td><span class="badge '+(a.status==='approved'?'badge-approved':'badge-rejected')+'">'+a.status+'</span></td>';
      h+='<td style="font-size:12px">'+a.reviewedBy+'</td><td style="font-size:12px">'+fmtDate(a.reviewedDate)+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  }
  sh('pageContainer',h);
  document.querySelectorAll('[data-approve]').forEach(function(btn){btn.addEventListener('click',function(){reviewApproval(this.getAttribute('data-approve'),'approved');});});
  document.querySelectorAll('[data-reject]').forEach(function(btn){btn.addEventListener('click',function(){reviewApproval(this.getAttribute('data-reject'),'rejected');});});
}
function reviewApproval(id,decision){
  var a=approvals.filter(function(x){return x.id===id;})[0]; if(!a)return;
  a.status=decision; a.reviewedBy=session.name; a.reviewedDate=new Date().toISOString().split('T')[0];
  if(decision==='approved'&&a.requestType==='join_project'){
    var p=projects.filter(function(x){return x.id===a.projectId;})[0];
    if(p&&!(p.team||[]).some(function(m){return m.name===a.requestedBy;})){
      p.team=(p.team||[]).concat([{name:a.requestedBy,pct:null,lead:false}]);
      saveRecord('update',projectToRow(p),'Sheet1');
    }
  }
  saveRecord('update',a,'approvals');
  buildApprovals();
}

// ── BUDGETS ────────────────────────────────────────────────────────────────
function buildBudgets(){
  var h='<div class="card"><div class="card-title">Budget management</div><div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Budget target</th><th>Total billed</th><th>Remaining</th><th>Utilization</th><th>Action</th></tr></thead><tbody>';
  projects.forEach(function(p){
    var spent=projBill(p.id), rem=p.budgetTarget?(p.budgetTarget-spent):null;
    var pct=p.budgetTarget?Math.min(100,Math.round(spent/p.budgetTarget*100)):0;
    var col=pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#639922';
    h+='<tr><td style="font-weight:600;font-size:12px">'+p.project+'</td>';
    h+='<td style="font-size:12px;color:#666">'+p.pi+(p.department?'<br><span style="color:#aaa">'+p.department+'</span>':'')+'</td>';
    h+='<td><span class="'+typeBadge(p.type)+'">'+typeLabel(p.type)+'</span></td>';
    h+='<td><input type="number" id="budget_'+p.id+'" value="'+(p.budgetTarget||'')+'" placeholder="Set budget" style="width:110px;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"></td>';
    h+='<td style="font-size:12px;color:#3B6D11;font-weight:500">'+fmtMoney(spent)+'</td>';
    h+='<td style="font-size:12px;color:'+(rem!==null&&rem<0?'#A32D2D':'#3B6D11')+'">'+( rem!==null?fmtMoney(rem):'&mdash;')+'</td>';
    h+='<td>'+(p.budgetTarget?'<div class="budget-bar" style="width:100px"><div class="budget-fill" style="width:'+pct+'%;background:'+col+'"></div></div><div style="font-size:10px;color:#888;margin-top:2px">'+pct+'%</div>':'&mdash;')+'</td>';
    h+='<td><button class="btn btn-sm" data-savebudget="'+p.id+'">Save</button></td></tr>';
  });
  h+='</tbody></table></div></div>';
  sh('pageContainer',h);
  document.querySelectorAll('[data-savebudget]').forEach(function(btn){btn.addEventListener('click',function(){
    var id=this.getAttribute('data-savebudget');
    var p=projects.filter(function(x){return x.id===id;})[0]; if(!p)return;
    p.budgetTarget=parseFloat(gv('budget_'+id))||null;

    buildBudgets();
  });});
}

function attachFRHoursHandlers() {
  document.querySelectorAll('.frHrsInput').forEach(function(inp) {
    inp.addEventListener('input', function() {
      var prefix = this.id.replace(/\d+$/, '').replace(/_[^_]+$/, '_');
      // Find the total element
      var totalId = this.id.replace(/\d+$/, 'total');
      // Recalc
      var t = 0;
      FAC_SVCS.forEach(function(_, i) {
        var inp2 = el(this.id.replace(/\d+$/, String(i)));
        if (inp2) t += parseFloat(inp2.value)||0;
      }.bind(this));
      var te = el(totalId);
      if (te) te.textContent = t.toFixed(1) + ' hrs';
    });
  });
  var submitBtn = el('frSubmitHoursBtn');
  if (submitBtn) submitBtn.addEventListener('click', function() { submitFRHoursNew(); });
}

function submitFRHoursNew() {
  var inv = gv('fh_new_inv').trim(), dept = gv('fh_new_dept');
  if (!inv||!dept) { alert('Investigator and department required.'); return; }
  var svcKeys = ['dataAnalysis','grantApplication','administration','studyDesign','dataManagement'];
  var svcs = {}; FAC_SVCS.forEach(function(svc,i) { svcs[svcKeys[i]] = parseFloat((el('fh_new_'+i)||{}).value)||0; });
  var total = Object.keys(svcs).reduce(function(a,k) { return a+svcs[k]; }, 0);
  var rec = {id:String(nextIds.fh++), facultyName:session.name, investigator:inv, department:dept,

    dataAnalysis:svcs.dataAnalysis, grantApplication:svcs.grantApplication,

        h+='<select data-skill-level-cat="'+cat+'" data-skill-level-name="'+skill+'" style="font-size:11px;border:none;border-left:1px solid #b5d4f4;background:#E6F1FB;color:#185FA5;padding:5px 6px;cursor:pointer;font-weight:500">';

function requestNewSkill(category){
  openModal('<div class="modal-title">Request new skill &mdash; '+category+'</div>' +
    '<p style="font-size:13px;color:#666;margin-bottom:1rem">Suggest a skill to add to the <strong>'+category+'</strong> list. Admin will review before it appears for everyone.</p>' +
    '<div class="form-group" style="margin-bottom:1rem"><label>Skill name *</label><input id="newSkillName" placeholder="e.g. Network Meta-Analysis"></div>' +
    '<div class="actions"><button class="btn" id="reqCancelBtn">Cancel</button><button class="btn btn-primary" id="reqSubmitBtn">Submit for review</button></div>');
  el('reqCancelBtn').addEventListener('click',closeModal);
  el('reqSubmitBtn').addEventListener('click',function(){
    var skillName=gv('newSkillName').trim();

    var tax=getAllSkills();
    if((tax[category]||[]).some(function(s){return s.toLowerCase()===skillName.toLowerCase();})){alert('This skill already exists.');return;}

    var rec={id:String(nextIds.sr++),requestedBy:session.name,category:category,skillName:skillName,status:'pending',requestedDate:new Date().toISOString().split('T')[0],reviewedBy:'',reviewedDate:''};
    skillRequests.push(rec);

    el('reqOkBtn').addEventListener('click',closeModal);
  });
}

    if(skill&&!skills.some(function(s){return s.name===skill&&(!level||s.level===level);}))return false;
    if(level&&!skill&&!skills.some(function(s){return s.level===level;}))return false;
    if(cat&&!skills.some(function(s){return s.category===cat;}))return false;
    return true;
  });
  if(!filtered.length)return'<div class="empty">No staff match current filters.</div>';
  var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px">';
  filtered.forEach(function(name){
    var p=getProfile(name), skills=p.skills||[];
    var hasWOC=skills.some(function(s){return s.name==='WOC (VA Authorization)';});
    h+='<div style="border:1px solid #e5e5e5;border-radius:10px;padding:14px;background:#fff;'+(hasWOC?'border-top:3px solid #EF9F27':'')+'">';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
    h+='<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#185FA5,#0C447C);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">'+initials(name)+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name+'</div><div style="margin-top:2px">'+userBadge(name)+'</div></div>';
    if(hasWOC)h+='<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:#FAEEDA;color:#854F0B;font-weight:600;flex-shrink:0">&#127973; WOC</span>';
    h+='</div>';
    if(skills.length){cats.forEach(function(c){var cs=skills.filter(function(s){return s.category===c;});if(!cs.length)return;h+='<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">'+c+'</div><div>';cs.forEach(function(s){h+=skillBadge(s);});h+='</div></div>';});}
    else h+='<div style="font-size:12px;color:#ccc;font-style:italic">No skills listed</div>';
    if(p.updatedDate)h+='<div style="font-size:10px;color:#ddd;margin-top:6px">Updated '+fmtDate(p.updatedDate)+'</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function approveSkillRequest(id){
  var req=skillRequests.filter(function(r){return r.id===id;})[0]; if(!req)return;
  req.status='approved'; req.reviewedBy=session.name; req.reviewedDate=new Date().toISOString().split('T')[0];
  saveRecord('update',req,'skillRequests');
  buildStaffSkills();
}
function rejectSkillRequest(id){
  var req=skillRequests.filter(function(r){return r.id===id;})[0]; if(!req)return;
  req.status='rejected'; req.reviewedBy=session.name; req.reviewedDate=new Date().toISOString().split('T')[0];
  saveRecord('update',req,'skillRequests');
  buildStaffSkills();
}


// ── STAFF AVAILABILITY DASHBOARD ──────────────────────────────────────────
function buildAvailability() {
  var q = curQ(), yr = curYr();
  var FTE_HRS = 520; // hours per quarter at 100% FTE

  // Build per-staff summary
  var staffData = STAFF.map(function(name) {
    // Assigned % effort from active pct projects
    var pctProjects = projects.filter(function(p) {
      return p.type === 'pct' &&
        ['active','upcoming'].indexOf(p.status) > -1 &&
        (p.team||[]).some(function(m) { return m.name === name; });
    });
    var assignedPct = pctProjects.reduce(function(a, p) {
      var m = (p.team||[]).filter(function(m) { return m.name === name; })[0];
      return a + (m && m.pct ? Number(m.pct) : 0);
    }, 0);

    // Active projects of all types
    var allActive = projects.filter(function(p) {
      return ['active','upcoming'].indexOf(p.status) > -1 &&
        (p.team||[]).some(function(m) { return m.name === name; });
    });

    // Logged hours this quarter (all types)
    var qHrs = hoursData.filter(function(h) {
      return h.staffName === name && h.quarter === q && h.year === yr;
    }).reduce(function(a, h) { return a + h.hours; }, 0);

    var loggedPct = Math.round(qHrs / FTE_HRS * 100);

    // Hours by project this quarter
    var byProject = {};
    hoursData.filter(function(h) {
      return h.staffName === name && h.quarter === q && h.year === yr;
    }).forEach(function(h) {
      if (!byProject[h.projectId]) byProject[h.projectId] = 0;
      byProject[h.projectId] += h.hours;
    });

    return {
      name: name,
      assignedPct: assignedPct,
      loggedPct: loggedPct,
      loggedHrs: qHrs,
      activeProjects: allActive.length,
      pctProjects: pctProjects.length,
      byProject: byProject
    };
  });

  var h = '<div class="card">';
  h += '<div class="section-hdr" style="margin-bottom:1rem">';
  h += '<span class="card-title" style="margin:0">Staff availability &mdash; ' + q + ' ' + yr + '</span>';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  h += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12px">';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#639922;display:inline-block"></span>90-100%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#EF9F27;display:inline-block"></span>70-89%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#E87722;display:inline-block"></span>50-69%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#E24B4A;display:inline-block"></span>&lt;50%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#3C3489;display:inline-block"></span>&gt;100%</span>';
  h += '</div>';
  h += '<select id="availFilter" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="all">All staff</option><option value="under50">Needs work (&lt;50%)</option><option value="bandwidth">Has bandwidth (&lt;90%)</option><option value="over">Oversubscribed (&gt;100%)</option></select>';
  h += '</div></div>';

  // Summary metrics
  var over = staffData.filter(function(d) { return d.loggedPct > 100; }).length;
  var green = staffData.filter(function(d) { return d.loggedPct >= 90 && d.loggedPct <= 100; }).length;
  var yellow = staffData.filter(function(d) { return d.loggedPct >= 70 && d.loggedPct < 90; }).length;
  var orange = staffData.filter(function(d) { return d.loggedPct >= 50 && d.loggedPct < 70; }).length;
  var red = staffData.filter(function(d) { return d.loggedPct < 50; }).length;

  h += '<div class="metrics" style="margin-bottom:1.5rem">';
  h += '<div class="metric"><div class="metric-label">Full utilization</div><div class="metric-value" style="color:#639922">' + green + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Has bandwidth</div><div class="metric-value" style="color:#EF9F27">' + (yellow+orange) + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Needs work</div><div class="metric-value mv-red">' + red + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Oversubscribed</div><div class="metric-value mv-purple">' + over + '</div></div>';
  h += '</div>';

  h += '<div id="availGrid">' + buildAvailGrid(staffData, 'all') + '</div></div>';
  sh('pageContainer', h);

  var filt = el('availFilter');
  if (filt) filt.addEventListener('change', function() {
    sh('availGrid', buildAvailGrid(staffData, this.value));
    attachAvailHandlers(staffData);
  });
  attachAvailHandlers(staffData);
}

function getAvailColor(pct) {
  if (pct > 100) return '#3C3489';
  if (pct >= 90) return '#639922';
  if (pct >= 70) return '#EF9F27';
  if (pct >= 50) return '#E87722';
  return '#E24B4A';
}

function getAvailBg(pct) {
  if (pct > 100) return '#EEEDFE';
  if (pct >= 90) return '#EAF3DE';
  if (pct >= 70) return '#FAEEDA';
  if (pct >= 50) return '#FFF0E6';
  return '#FCEBEB';
}

function getAvailLabel(pct) {
  if (pct > 100) return 'Oversubscribed';
  if (pct >= 90) return 'Full utilization';
  if (pct >= 70) return 'Has bandwidth';
  if (pct >= 50) return 'Significant bandwidth';
  return 'Needs work';
}

function buildAvailGrid(staffData, filter) {
  var filtered = staffData.filter(function(d) {
    if (filter === 'under50') return d.loggedPct < 50;
    if (filter === 'bandwidth') return d.loggedPct < 90;
    if (filter === 'over') return d.loggedPct > 100;
    return true;
  });

  if (!filtered.length) return '<div class="empty">No staff match this filter.</div>';

  // Sort: oversubscribed first, then by loggedPct descending
  filtered.sort(function(a, b) {
    if (a.loggedPct > 100 && b.loggedPct <= 100) return -1;
    if (b.loggedPct > 100 && a.loggedPct <= 100) return 1;
    return b.loggedPct - a.loggedPct;
  });

  var h = '<div style="overflow-x:auto"><table><thead><tr>';
  h += '<th>Staff member</th>';
  h += '<th>Logged ' + curQ() + ' hrs</th>';
  h += '<th>Actual FTE %</th>';
  h += '<th>Assigned % effort</th>';
  h += '<th>Active projects</th>';
  h += '<th>Status</th>';
  h += '<th>Utilization</th>';
  h += '<th></th>';
  h += '</tr></thead><tbody>';

  filtered.forEach(function(d) {
    var col = getAvailColor(d.loggedPct);
    var bg = getAvailBg(d.loggedPct);
    var lbl = getAvailLabel(d.loggedPct);
    var barW = Math.min(100, d.loggedPct);
    var assignedBarW = Math.min(100, d.assignedPct);

    h += '<tr>';
    h += '<td style="font-weight:600;font-size:13px">';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#185FA5,#0C447C);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">' + initials(d.name) + '</div>';
    h += d.name + ' ' + userBadge(d.name);
    h += '</div></td>';

    h += '<td style="font-weight:600">' + fmtHrs(d.loggedHrs) + ' hrs</td>';

    h += '<td>';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<div style="width:80px;height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden;flex-shrink:0">';
    h += '<div style="width:' + barW + '%;height:100%;background:' + col + ';border-radius:4px"></div></div>';
    h += '<span style="font-weight:700;color:' + col + '">' + d.loggedPct + '%</span>';
    h += '</div></td>';

    h += '<td>';
    if (d.assignedPct > 0) {
      h += '<div style="display:flex;align-items:center;gap:8px">';
      h += '<div style="width:80px;height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden;flex-shrink:0">';
      h += '<div style="width:' + assignedBarW + '%;height:100%;background:#185FA5;border-radius:4px"></div></div>';
      h += '<span style="font-weight:600;color:#185FA5">' + d.assignedPct + '%</span>';
      h += '</div>';
    } else {
      h += '<span style="font-size:12px;color:#aaa">No % effort projects</span>';
    }
    h += '</td>';

    h += '<td style="font-size:13px">' + d.activeProjects + ' active</td>';

    h += '<td><span style="font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:' + bg + ';color:' + col + '">' + lbl + '</span></td>';

    // Mini utilization bar showing logged vs assigned
    h += '<td>';
    h += '<div style="font-size:10px;color:#aaa;margin-bottom:3px">Logged vs assigned</div>';
    h += '<div style="position:relative;width:100px;height:14px;background:#f0f0f0;border-radius:7px;overflow:hidden">';
    h += '<div style="position:absolute;left:0;top:0;width:' + barW + '%;height:100%;background:' + col + ';border-radius:7px;opacity:.9"></div>';
    if (d.assignedPct > 0) {
      h += '<div style="position:absolute;left:0;top:0;width:' + assignedBarW + '%;height:100%;border:2px solid #185FA5;border-radius:7px;box-sizing:border-box"></div>';
    }
    h += '</div></td>';

    h += '<td><button class="btn btn-sm" data-avail-detail="' + d.name + '">Details</button></td>';
    h += '</tr>';
  });

  h += '</tbody></table></div>';
  return h;
}

function attachAvailHandlers(staffData) {
  document.querySelectorAll('[data-avail-detail]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openAvailDetail(this.getAttribute('data-avail-detail'), staffData);
    });
  });
}

function openAvailDetail(name, staffData) {
  var d = staffData.filter(function(x) { return x.name === name; })[0];
  if (!d) return;
  var q = curQ(), yr = curYr();
  var FTE_HRS = 520;
  var col = getAvailColor(d.loggedPct);
  var lbl = getAvailLabel(d.loggedPct);

  // Hours by project this quarter
  var projBreakdown = [];
  Object.keys(d.byProject).forEach(function(pid) {
    var p = projects.filter(function(x) { return x.id === pid; })[0];
    var hrs = d.byProject[pid];
    projBreakdown.push({
      project: p ? p.project : pid,
      pi: p ? p.pi : '',
      type: p ? p.type : '',
      hrs: hrs,
      pct: Math.round(hrs / FTE_HRS * 100)
    });
  });
  projBreakdown.sort(function(a,b) { return b.hrs - a.hrs; });

  // Hours by service type this quarter
  var bySvc = {};
  hoursData.filter(function(h) {
    return h.staffName === name && h.quarter === q && h.year === yr;
  }).forEach(function(h) {
    if (!bySvc[h.serviceType]) bySvc[h.serviceType] = 0;
    bySvc[h.serviceType] += h.hours;
  });

  // Prior quarters for trend
  var trend = [];
  ['Q1','Q2','Q3','Q4'].forEach(function(tq) {
    var tHrs = hoursData.filter(function(h) {
      return h.staffName === name && h.quarter === tq && h.year === yr;
    }).reduce(function(a,h) { return a+h.hours; }, 0);
    trend.push({q:tq, hrs:tHrs, pct:Math.round(tHrs/FTE_HRS*100)});
  });

  var h = '<div class="modal-title">' + name + ' &mdash; ' + q + ' ' + yr + ' availability</div>';
  h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap">';
  h += '<div style="text-align:center;padding:1rem 1.5rem;background:' + getAvailBg(d.loggedPct) + ';border-radius:10px;flex-shrink:0">';
  h += '<div style="font-size:32px;font-weight:700;color:' + col + '">' + d.loggedPct + '%</div>';
  h += '<div style="font-size:12px;color:' + col + ';font-weight:600">' + lbl + '</div>';
  h += '<div style="font-size:11px;color:#888;margin-top:2px">' + fmtHrs(d.loggedHrs) + ' / 520 hrs</div></div>';
  if (d.assignedPct > 0) {
    h += '<div style="text-align:center;padding:1rem 1.5rem;background:#E6F1FB;border-radius:10px;flex-shrink:0">';
    h += '<div style="font-size:32px;font-weight:700;color:#185FA5">' + d.assignedPct + '%</div>';
    h += '<div style="font-size:12px;color:#185FA5;font-weight:600">Assigned effort</div>';
    h += '<div style="font-size:11px;color:#888;margin-top:2px">from % effort projects</div></div>';
  }
  h += '<div style="flex:1;min-width:180px">';
  h += '<div style="font-size:12px;color:#888;margin-bottom:6px">Quarterly trend (' + yr + ')</div>';
  trend.forEach(function(t) {
    var tc = getAvailColor(t.pct);
    h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
    h += '<span style="font-size:11px;color:#888;width:20px">' + t.q + '</span>';
    h += '<div style="flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden">';
    h += '<div style="width:' + Math.min(100,t.pct) + '%;height:100%;background:' + tc + ';border-radius:4px"></div></div>';
    h += '<span style="font-size:11px;font-weight:600;color:' + tc + ';width:35px;text-align:right">' + t.pct + '%</span>';
    h += '</div>';
  });
  h += '</div></div>';

  if (projBreakdown.length) {
    h += '<div style="font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Hours by project &mdash; ' + q + ' ' + yr + '</div>';
    h += '<div style="overflow-x:auto;margin-bottom:1.5rem"><table><thead><tr><th>Project</th><th>PI</th><th>Type</th><th>Hours</th><th>% FTE</th><th>Share</th></tr></thead><tbody>';
    projBreakdown.forEach(function(p) {
      var shareW = d.loggedHrs > 0 ? Math.round(p.hrs / d.loggedHrs * 100) : 0;
      h += '<tr><td style="font-weight:600;font-size:12px">' + p.project + '</td>';
      h += '<td style="font-size:12px;color:#666">' + p.pi + '</td>';
      h += '<td><span class="' + typeBadge(p.type) + '">' + typeLabel(p.type) + '</span></td>';
      h += '<td style="font-weight:600">' + fmtHrs(p.hrs) + '</td>';
      h += '<td style="font-weight:600;color:' + getAvailColor(p.pct) + '">' + p.pct + '%</td>';
      h += '<td><div style="display:flex;align-items:center;gap:6px"><div style="width:60px;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="width:' + shareW + '%;height:100%;background:#185FA5;border-radius:3px"></div></div><span style="font-size:11px;color:#888">' + shareW + '%</span></div></td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  } else {
    h += '<div style="background:#FAEEDA;border-radius:8px;padding:12px 14px;font-size:13px;color:#854F0B;margin-bottom:1.5rem">&#9888; No hours logged for ' + q + ' ' + yr + '. This staff member has not submitted any hours this quarter.</div>';
  }

  if (Object.keys(bySvc).length) {
    h += '<div style="font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Hours by service type</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem">';
    Object.keys(bySvc).sort(function(a,b){return bySvc[b]-bySvc[a];}).forEach(function(svc) {
      var pct = d.loggedHrs > 0 ? Math.round(bySvc[svc]/d.loggedHrs*100) : 0;
      h += '<div style="background:#f5f5f5;border-radius:8px;padding:8px 12px;text-align:center;min-width:100px">';
      h += '<div style="font-size:14px;font-weight:700;color:#185FA5">' + fmtHrs(bySvc[svc]) + '</div>';
      h += '<div style="font-size:11px;color:#888;margin-top:2px">' + svc + '</div>';
      h += '<div style="font-size:11px;color:#aaa">' + pct + '% of total</div></div>';
    });
    h += '</div>';
  }

  h += '<div class="actions"><button class="btn btn-primary" id="availCloseBtn">Close</button></div>';
  openModal(h);
  el('availCloseBtn').addEventListener('click', closeModal);
}


// ── FACULTY DATABASE (admin view) ──────────────────────────────────────────
function buildFacultyDB(activeTab) {
  activeTab = activeTab || 'hours';
  var allFac = ["David Elashoff"].concat(FACULTY);

  var h = '<div class="card">';
  h += '<div class="section-hdr" style="margin-bottom:1rem">';
  h += '<span class="card-title" style="margin:0">Faculty reporting database</span>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h += '<select id="fdbFac" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="">All faculty</option>';
  allFac.forEach(function(f) { h += '<option>' + f + '</option>'; });
  h += '</select>';
  h += '<select id="fdbQ" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="">All quarters</option>';
  ['Q1','Q2','Q3','Q4'].forEach(function(q) { h += '<option>' + q + '</option>'; });
  h += '</select>';
  h += '<input id="fdbYr" type="number" placeholder="Year" style="width:75px;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px">';
  h += '</div></div>';

  h += '<div class="tab-group" style="margin-bottom:1.5rem">';
  h += '<button class="tab-btn' + (activeTab==='hours'?' active':'') + '" data-fdbtab="hours">Hours (' + facultyHours.length + ')</button>';
  h += '<button class="tab-btn' + (activeTab==='pubs'?' active':'') + '" data-fdbtab="pubs">Publications (' + facultyPubs.length + ')</button>';
  h += '<button class="tab-btn' + (activeTab==='grants'?' active':'') + '" data-fdbtab="grants">Grants (' + facultyGrants.length + ')</button>';
  h += '</div>';
  h += '<div id="fdbContent"></div></div>';

  sh('pageContainer', h);

  document.querySelectorAll('[data-fdbtab]').forEach(function(btn) {
    btn.addEventListener('click', function() { buildFacultyDB(this.getAttribute('data-fdbtab')); });
  });
  ['fdbFac','fdbQ','fdbYr'].forEach(function(id) {
    var e = el(id);
    if (e) e.addEventListener('change', function() { renderFDBContent(activeTab); });
    if (e) e.addEventListener('input', function() { renderFDBContent(activeTab); });
  });

  renderFDBContent(activeTab);
}

function getFDBFiltered(dataset) {
  var fac = gv('fdbFac'), q = gv('fdbQ'), yr = parseInt(gv('fdbYr')) || 0;
  return dataset.filter(function(r) {
    if (fac && r.facultyName !== fac) return false;
    if (q && r.quarter !== q) return false;
    if (yr && r.year !== yr) return false;
    return true;
  });
}

function renderFDBContent(tab) {
  if (tab === 'hours') renderFDBHours();
  else if (tab === 'pubs') renderFDBPubs();
  else renderFDBGrants();
}

function renderFDBHours() {
  var data = getFDBFiltered(facultyHours);
  if (!data.length) { sh('fdbContent', '<div class="empty">No hours entries match the current filters.</div>'); return; }
  var totalHrs = data.reduce(function(a,r) { return a + (r.totalHours||0); }, 0);

function buildBilProjectView(byProj) {
  if (!Object.keys(byProj).length) return '<div class="empty">No data</div>';

  // Group projects by PI
  var byPI = {};
  Object.keys(byProj).forEach(function(pid) {
    var p = projects.filter(function(x) { return x.id === pid; })[0];
    if (!p) return;
    if (!byPI[p.pi]) byPI[p.pi] = {projects:[], hours:0, billing:0, piEmail:p.piEmail||'', fmName:p.fmName||'', fmEmail:p.fmEmail||''};
    byPI[p.pi].projects.push({p:p, d:byProj[pid]});
    byPI[p.pi].hours += byProj[pid].hours;
    byPI[p.pi].billing += byProj[pid].billing;
    if (!byPI[p.pi].piEmail && p.piEmail) byPI[p.pi].piEmail = p.piEmail;
  });

  var h = '<div style="overflow-x:auto"><table><thead><tr>';
  h += '<th>PI</th><th>Projects</th><th>Total hours</th><th>Total billed</th><th>PI email</th><th>Action</th>';
  h += '</tr></thead><tbody>';

  Object.keys(byPI).sort().forEach(function(pi) {
    var piData = byPI[pi];
    h += '<tr>';
    h += '<td style="font-weight:600">' + pi + '</td>';
    h += '<td style="font-size:12px">';
    piData.projects.forEach(function(entry) {
      var p = entry.p, d = entry.d;
      var allBilled = projBill(p.id);
      var rem = p.budgetTarget ? (p.budgetTarget - allBilled) : null;
      h += '<div style="padding:4px 0;border-bottom:1px solid #f5f5f5">';
      h += '<span style="font-weight:500">' + p.project + '</span>';
      h += '<span class="' + typeBadge(p.type) + '" style="margin-left:6px">' + typeLabel(p.type) + '</span>';
      if (p.grant) h += '<span style="font-size:11px;color:#888;margin-left:6px">Grant: ' + p.grant + '</span>';
      if (p.fau) h += '<span style="font-size:11px;color:#888;margin-left:6px">FAU: ' + p.fau + '</span>';
      h += '<br><span style="font-size:11px;color:#666">' + fmtHrs(d.hours) + ' hrs &mdash; ' + fmtMoney(d.billing);
      if (rem !== null) h += ' &mdash; Budget remaining: <span style="color:' + (rem<0?'#A32D2D':'#3B6D11') + '">' + fmtMoney(rem) + '</span>';
      h += '</span></div>';
    });
    h += '</td>';
    h += '<td style="font-weight:600">' + fmtHrs(piData.hours) + '</td>';
    h += '<td style="color:#3B6D11;font-weight:700;font-size:14px">' + fmtMoney(piData.billing) + '</td>';
    h += '<td style="font-size:12px;color:' + (piData.piEmail?'#3B6D11':'#A32D2D') + '">' + (piData.piEmail || '<em>No email on file</em>') + '</td>';
    h += '<td><button class="btn btn-sm btn-success" data-invoice-pi="' + encodeURIComponent(pi) + '|' + (piData.piEmail||'') + '">Send invoice</button></td>';
    h += '</tr>';
  });

  h += '</tbody></table></div>';
  return h;
}
