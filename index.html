// ── BUDGETS ────────────────────────────────────────────────────────────────
function buildBudgets(){
  var h='<div class="card"><div class="card-title">Budget management</div><div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI / Dept</th><th>Type</th><th>Budget target</th><th>Total billed</th><th>Remaining</th><th>Utilization</th><th>Action</th></tr></thead><tbody>';
  projects.forEach(function(p){
    var spent=projBill(p.id), rem=p.budgetTarget?(p.budgetTarget-spent):null;
    var pct=p.budgetTarget?Math.min(100,Math.round(spent/p.budgetTarget*100)):0;
    var col=pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#639922';
    h+='<tr><td style="font-weight:600;font-size:12px">'+p.project+'</td>';
    h+='<td style="font-size:12px;color:#666">'+p.pi+(p.department?'<br><span style="color:#aaa">'+p.department+'</span>':'')+'</td>';
    h+='<td><span class="'+typeBadge(p.type)+'">'+typeLabel(p.type)+'</span></td>';
    h+='<td><input type="number" id="budget_'+p.id+'" value="'+(p.budgetTarget||'')+'" placeholder="Set budget" style="width:110px;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"></td>';
    h+='<td style="font-size:12px;color:#3B6D11;font-weight:500">'+fmtMoney(spent)+'</td>';
    h+='<td style="font-size:12px;color:'+(rem!==null&&rem<0?'#A32D2D':'#3B6D11')+'">'+( rem!==null?fmtMoney(rem):'&mdash;')+'</td>';
    h+='<td>'+(p.budgetTarget?'<div class="budget-bar" style="width:100px"><div class="budget-fill" style="width:'+pct+'%;background:'+col+'"></div></div><div style="font-size:10px;color:#888;margin-top:2px">'+pct+'%</div>':'&mdash;')+'</td>';
    h+='<td><button class="btn btn-sm" data-savebudget="'+p.id+'">Save</button></td></tr>';
  });
  h+='</tbody></table></div></div>';
  sh('pageContainer',h);
  document.querySelectorAll('[data-savebudget]').forEach(function(btn){btn.addEventListener('click',function(){
    var id=this.getAttribute('data-savebudget');
    var p=projects.filter(function(x){return x.id===id;})[0]; if(!p)return;
    p.budgetTarget=parseFloat(gv('budget_'+id))||null;
    saveRecord('update',projectToRow(p),'Sheet1');
    buildBudgets();
  });});
}




// ── FUND MANAGER QUEUE (rebuilt) ──────────────────────────────────────────
function buildFund() {
  var today = new Date(); today.setHours(0,0,0,0);
  var SIXTY_DAYS = 60 * 24 * 60 * 60 * 1000;

  var allActive = projects.filter(function(p){
    return (p.invoiceStatus||'pending') !== 'processed' && p.fundManagerStatus !== 'processed';
  });
  var processed = projects.filter(function(p){
    return p.fundManagerStatus === 'processed' || (p.invoiceStatus||'pending') === 'processed';
  });

  // Categorise active projects
  var outstanding = allActive.filter(function(p){ return projBill(p.id) > 0; });
  var notBilled   = allActive.filter(function(p){ return projBill(p.id) === 0; });

  // Sort outstanding: highest outstanding balance first
  outstanding.sort(function(a,b){
    var aOut = Math.max(0, projBill(a.id) - (Number(a.fundsReceived)||0));
    var bOut = Math.max(0, projBill(b.id) - (Number(b.fundsReceived)||0));
    return bOut - aOut;
  });

  // Renewal alerts — multi-year % effort projects (>12 months) approaching fiscal year end (June 30)
  // Show alert 60 days before each June 30 that falls within the project's period of performance
  // Stay visible until FM marks it processed for that fiscal year
  var renewalAlerts = [];
  projects.forEach(function(p) {
    if (p.type !== 'pct' || !p.start || !p.end) return;
    var startDate = new Date(p.start);
    var endDate = new Date(p.end);
    // Only multi-year projects (>12 months)
    var totalMonths = (endDate.getFullYear()-startDate.getFullYear())*12 + (endDate.getMonth()-startDate.getMonth());
    if (totalMonths <= 12) return;
    // Find all June 30s within the project period
    for (var yr = startDate.getFullYear(); yr <= endDate.getFullYear(); yr++) {
      var fyEnd = new Date(yr, 5, 30); // June 30
      if (fyEnd <= startDate || fyEnd >= endDate) continue;
      var daysToFYEnd = Math.ceil((fyEnd - today) / (24*60*60*1000));
      // Show if within 60 days OR already past but not yet marked renewed for this FY
      var fyKey = 'fy_renewed_'+p.id+'_'+yr;
      var alreadyMarked = p.notes && p.notes.indexOf('FY'+yr+' RENEWED') > -1;
      if (!alreadyMarked && daysToFYEnd <= 60) {
        var nextFYStart = new Date(yr, 6, 1); // July 1
        renewalAlerts.push({
          project: p,
          fyEnd: fyEnd,
          nextFYStart: nextFYStart,
          daysLeft: daysToFYEnd,
          fiscalYear: yr,
          overdue: daysToFYEnd < 0
        });
      }
    }
  });

  var totalOutstanding = outstanding.reduce(function(a,p){
    return a + Math.max(0, projBill(p.id) - (Number(p.fundsReceived)||0));
  }, 0);

  var h = '<div class="card">';
  h += '<div class="section-hdr" style="margin-bottom:1.25rem">';
  h += '<span class="card-title" style="margin:0">Fund manager queue</span>';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  if (totalOutstanding > 0) h += '<span style="font-size:12px;font-weight:700;color:#A32D2D;background:#FCEBEB;padding:4px 12px;border-radius:20px">'+fmtMoney(totalOutstanding)+' outstanding</span>';
  h += '<span style="font-size:12px;color:#888">'+allActive.length+' pending &middot; '+processed.length+' processed</span>';
  h += '</div></div>';

  // ── Renewal alerts ──────────────────────────────────────────────────────
  if (renewalAlerts.length) {
    h += '<div style="margin-bottom:1.5rem">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
    h += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#854F0B" stroke-width="2"/><path d="M12 7v5l3 3" stroke="#854F0B" stroke-width="2" stroke-linecap="round"/></svg>';
    h += '<span style="font-size:12px;font-weight:700;color:#854F0B;text-transform:uppercase;letter-spacing:.06em">Renewal due soon ('+renewalAlerts.length+')</span></div>';
    renewalAlerts.forEach(function(alert){
      var p = alert.project;
      var daysLabel = alert.overdue ? 
        '<span style="font-size:12px;font-weight:700;color:#A32D2D;background:#FCEBEB;padding:3px 10px;border-radius:20px">OVERDUE</span>' :
        '<span style="font-size:12px;font-weight:700;color:#854F0B;background:#FAEEDA;padding:3px 10px;border-radius:20px">'+alert.daysLeft+' days to FY end</span>';
      h += '<div style="border:1.5px solid '+(alert.overdue?'#E24B4A':'#EF9F27')+';border-radius:10px;padding:12px 16px;margin-bottom:8px;background:'+(alert.overdue?'#FFF5F5':'#FFFDF7')+';display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
      h += '<div>';
      h += '<div style="font-weight:700;font-size:13px;color:#1a1a1a">'+p.project+'</div>';
      h += '<div style="font-size:12px;color:#888;margin-top:3px">';
      h += 'PI: '+p.pi+' &middot; ';
      h += 'FY ends: '+fmtDate(alert.fyEnd)+' &middot; ';
      h += 'New FY starts: '+fmtDate(alert.nextFYStart)+' &middot; ';
      h += 'Project ends: '+fmtDate(p.end);
      h += '</div>';
      h += '<div style="font-size:11px;color:#854F0B;margin-top:3px">Annual recharge renewal required for FY '+(alert.fiscalYear+1)+'</div>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      h += daysLabel;
      h += '<button class="btn btn-sm" style="font-size:11px;border-color:#EF9F27;color:#854F0B" data-renew="'+p.id+'" data-fy="'+alert.fiscalYear+'">Process FY'+(alert.fiscalYear+1)+' renewal</button>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // ── Outstanding Recharges ───────────────────────────────────────────────
  if (outstanding.length) {
    h += '<div style="margin-bottom:1.5rem">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
    h += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="3" stroke="#A32D2D" stroke-width="2"/><path d="M2 10h20" stroke="#A32D2D" stroke-width="2"/><rect x="6" y="14" width="4" height="2" rx="1" fill="#A32D2D"/></svg>';
    h += '<span style="font-size:12px;font-weight:700;color:#A32D2D;text-transform:uppercase;letter-spacing:.06em">Outstanding recharges ('+outstanding.length+')</span>';
    h += '<span style="font-size:12px;font-weight:700;color:#A32D2D;margin-left:4px">&mdash; '+fmtMoney(totalOutstanding)+' total</span>';
    h += '</div>';
    h += buildFundPIGroup(outstanding);
    h += '</div>';
  }

  // ── Not yet billed ──────────────────────────────────────────────────────
  if (notBilled.length) {
    h += '<div style="margin-bottom:1.5rem">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
    h += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#888" stroke-width="2"/><path d="M12 8v4M12 16h.01" stroke="#888" stroke-width="2" stroke-linecap="round"/></svg>';
    h += '<span style="font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.06em">No hours logged yet ('+notBilled.length+')</span></div>';
    h += buildFundPIGroup(notBilled);
    h += '</div>';
  }

  if (!allActive.length) h += '<div class="empty" style="padding:2rem">Queue is clear — all projects processed.</div>';

  // ── Recently processed ──────────────────────────────────────────────────
  if (processed.length) {
    h += '<div style="border-top:1px solid #f0f0f0;padding-top:1.25rem;margin-top:.5rem">';
    h += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Recently processed ('+processed.length+')</div>';
    h += '<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>PI</th><th>Type</th><th>Billed</th><th>Status</th></tr></thead><tbody>';
    processed.slice(-10).reverse().forEach(function(p){
      h += '<tr><td style="font-size:12px;font-weight:600">'+p.project+'</td>';
      h += '<td style="font-size:12px;color:#666">'+p.pi+'</td>';
      h += '<td><span class="'+typeBadge(p.type)+'">'+typeLabel(p.type)+'</span></td>';
      h += '<td style="font-size:12px;color:#3B6D11;font-weight:500">'+fmtMoney(projBill(p.id))+'</td>';
      h += '<td><span class="badge badge-processed">Processed</span></td></tr>';
    });
    h += '</tbody></table></div></div>';
  }
  h += '</div>';
  sh('pageContainer', h);

  // Handlers
  document.querySelectorAll('[data-invoice-pi]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var parts = decodeURIComponent(this.getAttribute('data-invoice-pi')).split('|');
      sendInvoiceForPI(parts[0], parts[1]||'');
    });
  });
  document.querySelectorAll('[data-set-inv]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var pid = this.getAttribute('data-set-inv'), newStatus = this.getAttribute('data-status');
      var p = projects.filter(function(x){return x.id===pid;})[0];
      if (!p) return;
      p.invoiceStatus = newStatus;
      if (newStatus === 'processed') { p.fundManagerStatus = 'processed'; p.fundsReceived = projBill(p.id); }
      saveRecord('update', projectToRow(p), 'Sheet1');
      buildFund();
    });
  });
  document.querySelectorAll('[data-renew]').forEach(function(btn){
    btn.addEventListener('click', function(){ openRenewalModal(this.getAttribute('data-renew'), this.getAttribute('data-fy')||''); });
  });
}

function buildFundPIGroup(list) {
  var byPI = {}, piOrder = [];
  list.forEach(function(p){
    if (!byPI[p.pi]) { byPI[p.pi] = []; piOrder.push(p.pi); }
    byPI[p.pi].push(p);
  });
  piOrder.sort();
  var h = '';
  piOrder.forEach(function(pi){
    var piProjs = byPI[pi];
    var piTotal = piProjs.reduce(function(a,p){return a+projBill(p.id);},0);
    var piOut = piProjs.reduce(function(a,p){return a+Math.max(0,projBill(p.id)-(Number(p.fundsReceived)||0));},0);
    var piEmail = piProjs[0].piEmail||'';

    h += '<div style="margin-bottom:1rem">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0a1628;border-radius:10px 10px 0 0;flex-wrap:wrap;gap:8px">';
    h += '<div style="display:flex;align-items:center;gap:10px">';
    h += '<div style="width:32px;height:32px;border-radius:50%;background:#1a6fcf;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">'+initials(pi)+'</div>';
    h += '<div><div style="font-weight:700;font-size:13px;color:#fff">'+pi+'</div>';
    h += '<div style="font-size:11px;color:rgba(255,255,255,.5)">'+piProjs.length+' project'+(piProjs.length!==1?'s':'')+' &middot; '+fmtMoney(piTotal)+' billed';
    if (piOut > 0) h += ' &middot; <span style="color:#FFD100;font-weight:700">'+fmtMoney(piOut)+' outstanding</span>';
    if (piEmail) h += ' &middot; '+piEmail;
    h += '</div></div></div>';
    h += '<button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2);font-size:11px" data-invoice-pi="'+encodeURIComponent(pi)+'|'+piEmail+'">Send invoice</button>';
    h += '</div>';

    piProjs.forEach(function(p, idx){
      var isLast = idx === piProjs.length-1;
      var billed = projBill(p.id);
      var received = Number(p.fundsReceived)||0;
      var outstanding = Math.max(0, billed - received);
      var invStatus = p.invoiceStatus||'pending';
      var invColors = {pending:'#888',sent:'#854F0B',paid:'#3B6D11',processed:'#3B6D11'};
      var invBgs = {pending:'#f5f5f5',sent:'#FAEEDA',paid:'#EAF3DE',processed:'#EAF3DE'};
      var invLabels = {pending:'Not invoiced',sent:'Invoice sent',paid:'Paid',processed:'Processed'};

      h += '<div style="border:1px solid #e5e5e5;border-top:none;'+(isLast?'border-radius:0 0 10px 10px;':'')+'background:#fff;padding:12px 16px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px">';
      h += '<div>';
      h += '<div style="font-weight:600;font-size:13px;margin-bottom:4px">'+p.project+'</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:5px">';
      h += '<span class="'+typeBadge(p.type)+'">'+typeLabel(p.type)+'</span>';
      h += durationTagHtml(p);
      h += '<span class="'+projStatusBadge(p.projectStatus)+'">'+p.projectStatus+'</span>';
      if (p.grant) h += '<span style="font-size:11px;color:#666;background:#f5f5f5;padding:2px 8px;border-radius:20px">Grant: '+p.grant+'</span>';
      if (p.fau) h += '<span style="font-size:11px;color:#666;background:#f5f5f5;padding:2px 8px;border-radius:20px">FAU: '+p.fau+'</span>';
      if (p.end) h += '<span style="font-size:11px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:20px">Ends: '+fmtDate(p.end)+'</span>';
      h += '</div></div>';
      h += '<div style="text-align:right;flex-shrink:0">';
      h += '<div style="font-weight:700;color:#3B6D11;font-size:14px">'+fmtMoney(billed)+' billed</div>';
      if (outstanding > 0) h += '<div style="font-size:12px;font-weight:700;color:#A32D2D">'+fmtMoney(outstanding)+' outstanding</div>';
      else if (received > 0) h += '<div style="font-size:12px;color:#3B6D11">\u2713 Paid: '+fmtMoney(received)+'</div>';
      h += '</div></div>';
      h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      h += '<span style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em">Invoice:</span>';
      h += '<span style="font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;background:'+invBgs[invStatus]+';color:'+invColors[invStatus]+'">'+invLabels[invStatus]+'</span>';
      if (invStatus !== 'processed') {
        h += '<div style="display:flex;gap:5px">';
        if (invStatus==='pending') h += '<button class="btn btn-sm" style="font-size:11px" data-set-inv="'+p.id+'" data-status="sent">Mark sent</button>';
        if (invStatus==='sent') h += '<button class="btn btn-sm btn-approve" style="font-size:11px" data-set-inv="'+p.id+'" data-status="paid">Mark paid</button>';
        if (invStatus==='paid') h += '<button class="btn btn-sm btn-success" style="font-size:11px" data-set-inv="'+p.id+'" data-status="processed">\u2713 Processed</button>';
        h += '</div>';
      }
      h += '</div></div>';
    });
    h += '</div>';
  });
  return h;
}

function openRenewalModal(pid, fy) {
  var p = projects.filter(function(x){return x.id===pid;})[0];
  if (!p) return;
  var endDate = new Date(p.end);
  var newEnd = new Date(endDate);
  newEnd.setFullYear(newEnd.getFullYear()+1);
  var newEndStr = newEnd.toISOString().split('T')[0];
  var billed = projBill(p.id);

  var h = '<div class="modal-title">Renew project &mdash; '+p.project+'</div>';
  h += '<div style="background:#FAEEDA;border-radius:8px;padding:12px 14px;margin-bottom:1rem;font-size:13px;color:#854F0B">';
  h += '<strong>This project expires on '+fmtDate(p.end)+'.</strong> Confirm renewal to extend the period of performance and flag for re-invoicing.</div>';
  h += '<div class="form-grid" style="margin-bottom:1rem">';
  h += '<div class="form-group"><label>Current end date</label><input type="date" id="ren_oldEnd" value="'+p.end+'" disabled style="background:#f5f5f5;color:#888"></div>';
  h += '<div class="form-group"><label>New end date *</label><input type="date" id="ren_newEnd" value="'+newEndStr+'"></div>';
  h += '<div class="form-group"><label>New total value ($)</label><input type="number" id="ren_value" placeholder="e.g. 50000" value="'+(p.totalValue||'')+'"></div>';
  h += '<div class="form-group"><label>New FAU (if changed)</label><input type="text" id="ren_fau" value="'+(p.fau||'')+'"></div>';
  h += '<div class="form-group full"><label>Renewal notes</label><textarea id="ren_notes" placeholder="Any notes about the renewal terms..."></textarea></div>';
  h += '</div>';
  h += '<div style="background:#EAF3DE;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#3B6D11">A new invoice will be created for this renewal period. Current billed amount: <strong>'+fmtMoney(billed)+'</strong></div>';
  h += '<div class="actions">';
  h += '<button class="btn" id="renCancelBtn">Cancel</button>';
  h += '<button class="btn btn-primary" id="renConfirmBtn" data-fy="'+(fy||'')+'" data-pid="'+pid+'">Confirm FY'+(fy?parseInt(fy)+1:'')+' renewal</button>';
  h += '</div>';
  openModal(h);
  el('renCancelBtn').addEventListener('click', closeModal);
  el('renConfirmBtn').addEventListener('click', function(){
    var fy = this.getAttribute('data-fy') || '';
    var newEnd = gv('ren_newEnd');
    if (!newEnd) { alert('Please enter a new end date.'); return; }
    p.end = newEnd;
    p.fau = gv('ren_fau') || p.fau;
    var newVal = parseFloat(gv('ren_value'));
    if (newVal) p.totalValue = newVal;
    p.invoiceStatus = 'pending';
    p.fundManagerStatus = 'pending';
    p.projectStatus = 'Active Project';
    var fyYr = this.getAttribute('data-fy') || '';
    var renewNote = 'FY'+(fyYr?parseInt(fyYr)+1:'')+' RENEWED on '+new Date().toISOString().split('T')[0]+'. New end: '+newEnd+(gv('ren_notes')?'\nNotes: '+gv('ren_notes'):'');
    p.notes = p.notes ? p.notes+'\n\n'+renewNote : renewNote;
    saveRecord('update', projectToRow(p), 'Sheet1');
    closeModal();
    buildFund();
  });
}

// ── UPDATED INVOICE: include staff breakdown ──────────────────────────────
function sendInvoiceForPI(piName, piEmail) {
  var piProjects = projects.filter(function(p){ return p.pi === piName; });
  var fmName = '', fmEmail = '';
  piProjects.forEach(function(p){
    if (!fmName && p.fmName) fmName = p.fmName;
    if (!fmEmail && p.fmEmail) fmEmail = p.fmEmail;
    if (!piEmail && p.piEmail) piEmail = p.piEmail;
  });

  var today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var grandHrs = 0, grandBill = 0;
  var sections = [];

  piProjects.forEach(function(p){
    var ph = hoursData.filter(function(h){return h.projectId===p.id;});
    if (!ph.length) return;
    var tH = ph.reduce(function(a,h){return a+h.hours;},0);
    var tB = ph.reduce(function(a,h){return a+h.billingAmount;},0);
    grandHrs += tH; grandBill += tB;

    // Group by staff member
    var byStaff = {};
    ph.forEach(function(h){
      if (!byStaff[h.staffName]) byStaff[h.staffName] = {hrs:0, bill:0, rate:RATES[h.staffName]||66.08, bySvc:{}};
      byStaff[h.staffName].hrs += h.hours;
      byStaff[h.staffName].bill += h.billingAmount;
      if (!byStaff[h.staffName].bySvc[h.serviceType]) byStaff[h.staffName].bySvc[h.serviceType] = 0;
      byStaff[h.staffName].bySvc[h.serviceType] += h.hours;
    });

    // By quarter
    var byQ = {};
    ph.forEach(function(h){
      var k=h.quarter+' '+h.year;
      if(!byQ[k])byQ[k]={hrs:0,bill:0};
      byQ[k].hrs+=h.hours; byQ[k].bill+=h.billingAmount;
    });

    var sep = '-'.repeat(55);
    var sec = '\nPROJECT: '+p.project+'\n';
    if (p.grant) sec += 'Grant #: '+p.grant+'\n';
    if (p.fau) sec += 'FAU: '+p.fau+'\n';
    sec += 'Period: '+fmtDate(p.start)+' to '+fmtDate(p.end)+'\n';
    sec += sep+'\n';
    sec += 'CHARGES BY STAFF MEMBER\n';
    sec += sep+'\n';
    Object.keys(byStaff).sort().forEach(function(name){
      var sd = byStaff[name];
      sec += '\n  '+name+' (Rate: $'+sd.rate.toFixed(2)+'/hr)\n';
      Object.keys(sd.bySvc).forEach(function(svc){
        var sHrs = sd.bySvc[svc];
        sec += '    '+padRight(svc,26)+' '+padLeft(sHrs.toFixed(1)+' hrs',10)+'   $'+(sHrs*sd.rate).toFixed(2)+'\n';
      });
      sec += '    '+padRight('Staff subtotal',26)+' '+padLeft(sd.hrs.toFixed(1)+' hrs',10)+'   $'+sd.bill.toFixed(2)+'\n';
    });
    sec += sep+'\n';
    sec += padRight('PROJECT TOTAL',36)+' '+padLeft(tH.toFixed(1)+' hrs',8)+'   $'+tB.toFixed(2)+'\n';
    if (p.budgetTarget) {
      sec += padRight('Budget target',36)+' '+'         '+'   $'+p.budgetTarget.toFixed(2)+'\n';
      sec += padRight('Remaining',36)+' '+'         '+'   $'+(p.budgetTarget-projBill(p.id)).toFixed(2)+'\n';
    }

    // By quarter summary
    sec += '\nCharges by period:\n';
    Object.keys(byQ).forEach(function(q){
      sec += '  '+padRight(q,28)+' '+padLeft(byQ[q].hrs.toFixed(1)+' hrs',10)+'   $'+byQ[q].bill.toFixed(2)+'\n';
    });
    sections.push(sec);
  });

  if (!sections.length) { alert('No hours logged for '+piName+' yet.'); return; }

  var body = 'UCLA DEPARTMENT OF MEDICINE STATISTICS\n';
  body += 'DOMStat Statistical Consulting Services\n';
  body += 'Invoice Date: '+today+'\n';
  body += '='.repeat(55)+'\n\n';
  body += 'BILL TO\n';
  body += 'Principal Investigator: '+piName+'\n';
  body += 'Projects invoiced: '+sections.length+'\n\n';
  body += '='.repeat(55)+'\n';
  body += 'ITEMIZED CHARGES\n';
  body += '='.repeat(55)+'\n';
  body += sections.join('\n'+'='.repeat(55)+'\n');
  body += '\n'+'='.repeat(55)+'\n';
  body += 'INVOICE TOTAL\n';
  body += '-'.repeat(55)+'\n';
  body += padRight('Total hours',36)+' '+padLeft(grandHrs.toFixed(1)+' hrs',8)+'\n';
  body += padRight('TOTAL AMOUNT DUE',36)+' '+'         '+'   $'+grandBill.toFixed(2)+'\n';
  body += '='.repeat(55)+'\n\n';
  body += 'PAYMENT INSTRUCTIONS\n';
  body += 'Please remit payment to UCLA Department of Medicine Statistics.\n';
  if (fmName) body += 'Contact: '+fmName+(fmEmail?' | '+fmEmail:'')+'\n';
  body += '\nhttps://alaventure.github.io/domstat-tracker\n';

  window.location.href = 'mailto:'+(piEmail||'')+'?subject='+encodeURIComponent('DOMStat Invoice \u2014 '+piName+' \u2014 '+today)+'&body='+encodeURIComponent(body);
}

function sendInvoice(pid) {
  var p = projects.filter(function(x){return x.id===pid;})[0];
  if (p) sendInvoiceForPI(p.pi, p.piEmail||'');
}

function padRight(s, n) { s=String(s); while(s.length<n)s+=' '; return s; }
function padLeft(s, n) { s=String(s); while(s.length<n)s=' '+s; return s; }

function buildApprovals() {
  var pending=approvals.filter(function(a){return a.status==='pending';});
  var recent=approvals.filter(function(a){return a.status!=='pending';}).slice(-10).reverse();
  var h='<div class="card"><div class="card-title">Pending approvals ('+pending.length+')</div>';
  if(!pending.length)h+='<div class="empty">No pending approvals &mdash; all caught up</div>';
  else pending.forEach(function(a){
    h+='<div style="border:1px solid #e5e5e5;border-left:4px solid #EF9F27;border-radius:8px;padding:12px;margin-bottom:8px;background:#fff">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">';
    h+='<div><span style="font-weight:600">'+a.projectName+'</span><span class="badge badge-appr-pending" style="margin-left:8px">'+a.requestType.replace(/_/g,' ')+'</span></div>';
    h+='<div style="display:flex;gap:6px"><button class="btn btn-sm btn-approve" data-approve="'+a.id+'">&check; Approve</button><button class="btn btn-sm btn-reject" data-reject="'+a.id+'">&times; Reject</button></div></div>';
    h+='<div style="font-size:12px;color:#666;margin-top:6px"><strong>By:</strong> '+a.requestedBy+' on '+fmtDate(a.requestedDate)+'<br><strong>Field:</strong> '+a.fieldChanged;
    if(a.newValue)h+='<br><strong>Proposed:</strong> '+String(a.newValue).substring(0,120);
    h+='</div></div>';
  });
  h+='</div>';
  if(recent.length){
    h+='<div class="card"><div class="card-title">Recent decisions</div>';
    h+='<div style="overflow-x:auto"><table><thead><tr><th>Project</th><th>Request</th><th>Requested by</th><th>Decision</th><th>Reviewed by</th><th>Date</th></tr></thead><tbody>';
    recent.forEach(function(a){
      h+='<tr><td style="font-size:12px;font-weight:600">'+a.projectName+'</td><td style="font-size:12px">'+a.requestType.replace(/_/g,' ')+'</td><td style="font-size:12px">'+a.requestedBy+'</td>';
      h+='<td><span class="badge '+(a.status==='approved'?'badge-approved':'badge-rejected')+'">'+a.status+'</span></td>';
      h+='<td style="font-size:12px">'+a.reviewedBy+'</td><td style="font-size:12px">'+fmtDate(a.reviewedDate)+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  }
  sh('pageContainer',h);
  document.querySelectorAll('[data-approve]').forEach(function(btn){btn.addEventListener('click',function(){reviewApproval(this.getAttribute('data-approve'),'approved');});});
  document.querySelectorAll('[data-reject]').forEach(function(btn){btn.addEventListener('click',function(){reviewApproval(this.getAttribute('data-reject'),'rejected');});});
}
function reviewApproval(id,decision){
  var a=approvals.filter(function(x){return x.id===id;})[0]; if(!a)return;
  a.status=decision; a.reviewedBy=session.name; a.reviewedDate=new Date().toISOString().split('T')[0];
  if(decision==='approved'&&a.requestType==='join_project'){

function buildBudgets(){

  projects.forEach(function(p){

    h+='<td style="font-size:12px;color:'+(rem!==null&&rem<0?'#A32D2D':'#3B6D11')+'">'+( rem!==null?fmtMoney(rem):'&mdash;')+'</td>';
    h+='<td>'+(p.budgetTarget?'<div class="budget-bar" style="width:100px"><div class="budget-fill" style="width:'+pct+'%;background:'+col+'"></div></div><div style="font-size:10px;color:#888;margin-top:2px">'+pct+'%</div>':'&mdash;')+'</td>';
    h+='<td><button class="btn btn-sm" data-savebudget="'+p.id+'">Save</button></td></tr>';

  sh('pageContainer',h);

function attachFRHoursHandlers() {
  document.querySelectorAll('.frHrsInput').forEach(function(inp) {
    inp.addEventListener('input', function() {
      var prefix = this.id.replace(/\d+$/, '').replace(/_[^_]+$/, '_');

      var totalId = this.id.replace(/\d+$/, 'total');
      // Recalc
      var t = 0;
      FAC_SVCS.forEach(function(_, i) {
        var inp2 = el(this.id.replace(/\d+$/, String(i)));
        if (inp2) t += parseFloat(inp2.value)||0;

  document.querySelectorAll('[data-edit-frgrant]').forEach(function(btn) {

  });
}

function submitFRGrantNew() {
  var inv=gv('fg_new_inv').trim(), dept=gv('fg_new_dept'), gtype=gv('fg_new_gtype'), status=gv('fg_new_status');
  if (!inv||!dept||!gtype||!status) { alert('Investigator, department, grant type and status required.'); return; }
  var rec = {id:String(nextIds.fg++), facultyName:session.name, investigator:inv, department:dept,
    grantTitle:gv('fg_new_title'), grantType:gtype, status:status, newUpdated:gv('fg_new_nu'),
    period:gv('fg_new_q')+' '+gv('fg_new_yr'), quarter:gv('fg_new_q'), year:parseInt(gv('fg_new_yr')),
    ctsi:gv('fg_new_ctsi'), fundingSource:gv('fg_new_fsrc'),
    perfStart:gv('fg_new_pstart'), perfEnd:gv('fg_new_pend'),
    notes:gv('fg_new_notes'), submittedDate:new Date().toISOString().split('T')[0]};
  facultyGrants.push(rec);

function openFRGrantEdit(id) {
  var rec = facultyGrants.filter(function(r) { return r.id === id; })[0];
  if (!rec) return;
  openModal('<div class="modal-title">Edit grant &mdash; ' + (rec.investigator||'') + ' (' + (rec.grantType||'') + ')</div>' +
    buildFRGrantsForm(rec) +
    '<div class="actions"><button class="btn" id="frGrantEditCancel">Cancel</button>' +
    '<button class="btn btn-primary" id="frGrantEditSave">Save changes</button></div>');
  el('frGrantEditCancel').addEventListener('click', closeModal);
  el('frGrantEditSave').addEventListener('click', function() { saveFRGrantEdit(id); });
}

function saveFRGrantEdit(id) {
  var rec = facultyGrants.filter(function(r) { return r.id === id; })[0];
  if (!rec) return;
  rec.investigator = gv('efg_inv').trim() || rec.investigator;
  rec.department = gv('efg_dept') || rec.department;
  rec.grantTitle = gv('efg_title');
  rec.grantType = gv('efg_gtype') || rec.grantType;
  rec.status = gv('efg_status') || rec.status;
  rec.newUpdated = gv('efg_nu');
  rec.quarter = gv('efg_q'); rec.year = parseInt(gv('efg_yr'));
  rec.period = rec.quarter + ' ' + rec.year;
  rec.ctsi = gv('efg_ctsi'); rec.fundingSource = gv('efg_fsrc');
  rec.perfStart = gv('efg_pstart'); rec.perfEnd = gv('efg_pend');
  rec.notes = gv('efg_notes');
  saveRecord('update', rec, 'facultyGrants');
  closeModal();
  buildFRGrants();
}

// ── Scope section for project detail modal ────────────────────────────────
function buildScopeSection(p) {
  var canEdit = ['admin','director','assocdir','staffmgr','staff'].indexOf(session.role) > -1;

  var col = stageColors[stage]||'#185FA5', bg = stageBgs[stage]||'#E6F1FB';

  var h = '<div style="border-top:2px solid #f0f0f0;margin-top:1.25rem;padding-top:1.25rem">';

  h += '<div id="scopeToggle" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;margin-bottom:0">';
  h += '<div style="display:flex;align-items:center;gap:10px">';
  h += '<span style="font-size:13px;font-weight:700;color:#333">DOMStat Project Scope</span>';
  h += '<span style="font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:'+bg+';color:'+col+'">'+stage+'</span>';
  if (p.scopeUpdatedBy) h += '<span style="font-size:11px;color:#aaa">Updated by '+p.scopeUpdatedBy+(p.scopeUpdatedDate?' on '+fmtDate(p.scopeUpdatedDate):'')+' </span>';
  h += '</div>';
  h += '<span id="scopeChevron" style="font-size:16px;color:#888;transition:transform .2s">&#9660;</span>';
  h += '</div>';

  h += '<div id="scopeBody" style="display:none;margin-top:1rem">';

  var availableToBill = Math.max(0, fundsRec - totalBilled);

  h += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Budget & billing</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">';

  var budgetItems = [
    {label:'Total billed', value:fmtMoney(totalBilled), color:'#185FA5'},

    {label:'Available to bill', value:fundsRec?fmtMoney(availableToBill):'—', color:availableToBill<=0&&fundsRec?'#A32D2D':'#3B6D11'},
    {label:'Budget target', value:budgetTgt?fmtMoney(budgetTgt):'Not set', color:'#3C3489'},
    {label:'Remaining budget', value:remainingBudget!==null?fmtMoney(remainingBudget):'—', color:remainingBudget!==null&&remainingBudget<0?'#A32D2D':'#3B6D11'},
  ];

    h += '<div style="background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e5e5e5">';

      if (p.scopeOther) h += '<span style="font-size:12px;background:#EAF3DE;color:#3B6D11;padding:4px 12px;border-radius:20px;font-weight:500">'+p.scopeOther+'</span>';

    h += '</div>';

  h += '</div>';

  // Stage
  if (canEdit) {
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem">';
    h += '<div><div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Project stage</div>';
    h += '<select id="scopeStageSelect" style="width:100%;font-size:13px;padding:7px 10px;border:1px solid #ccc;border-radius:8px">';
    stages.forEach(function(st) { h += '<option'+(st===stage?' selected':'')+'>'+st+'</option>'; });

    h += '<div><div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Estimated hours</div>';

    h += '</div>';
  } else {
    h += '<div style="display:flex;gap:20px;margin-bottom:1rem;flex-wrap:wrap">';

  // Scope summary (PI-visible)
  h += '<div style="margin-bottom:1rem">';
  h += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Scope summary <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#aaa">(visible to PI &amp; team)</span></div>';
  if (canEdit) {
    h += '<textarea id="scopeSummaryTA" style="width:100%;font-size:13px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;min-height:72px;resize:vertical" placeholder="Describe what DOMStat will be doing on this project...">'+(p.scopeSummary||'')+'</textarea>';
  } else {
    h += p.scopeSummary ? '<div style="font-size:13px;color:#444;line-height:1.6;background:#f9f9f9;padding:10px 12px;border-radius:8px">'+p.scopeSummary+'</div>' : '<div style="font-size:13px;color:#aaa">Not yet provided</div>';
  }
  h += '</div>';

  // Next steps (PI-visible)
  h += '<div style="margin-bottom:1rem">';
  h += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Next steps <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#aaa">(visible to PI &amp; team)</span></div>';
  if (canEdit) {
    h += '<textarea id="scopeNextTA" style="width:100%;font-size:13px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;min-height:55px;resize:vertical" placeholder="What happens next on this project...">'+(p.nextSteps||'')+'</textarea>';
  } else {
    h += p.nextSteps ? '<div style="font-size:13px;color:#444;line-height:1.6;background:#f9f9f9;padding:10px 12px;border-radius:8px">'+p.nextSteps+'</div>' : '<div style="font-size:13px;color:#aaa">Not yet provided</div>';
  }
  h += '</div>';

  // Internal notes (staff/admin only — NOT shown to PI/public)
  if (canEdit || ['fund'].indexOf(session.role) > -1) {
    h += '<div style="margin-bottom:1rem;padding:10px 12px;background:#FAEEDA;border-radius:8px;border-left:3px solid #EF9F27">';
    h += '<div style="font-size:11px;font-weight:700;color:#854F0B;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">&#128274; Internal notes <span style="font-weight:400;text-transform:none;letter-spacing:0">— not visible to PI</span></div>';

  if (canEdit) {

    h += '<button class="btn btn-primary btn-sm" id="saveScopeBtn">Save scope</button>';

  h += '</div></div>'; // end scopeBody + wrapper

}

function attachScopeHandlers(projId) {
  // Toggle collapse
  var toggle = document.getElementById('scopeToggle');
  var body = document.getElementById('scopeBody');
  var chevron = document.getElementById('scopeChevron');
  if (toggle) toggle.addEventListener('click', function() {
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    chevron.style.transform = open ? '' : 'rotate(180deg)';
  });

  // Save scope
  var saveBtn = document.getElementById('saveScopeBtn');
  if (saveBtn) saveBtn.addEventListener('click', function() { saveScopeFields(projId); });

  // Service checkboxes — update border/bg on toggle
  document.querySelectorAll('.scope-svc-cb').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var label = this.parentElement;
      label.style.borderColor = this.checked ? '#3B6D11' : '#e5e5e5';
      label.style.background = this.checked ? '#EAF3DE' : '#fafafa';
    });
  });
}

function saveScopeFields(projId) {
  var p = projects.filter(function(x) { return x.id === projId; })[0];
  if (!p) return;
  var svcs = [];
  document.querySelectorAll('.scope-svc-cb:checked').forEach(function(cb) { svcs.push(cb.value); });
  p.confirmedServices = svcs;
  p.scopeOther = document.getElementById('scopeOtherInput') ? document.getElementById('scopeOtherInput').value.trim() : (p.scopeOther||'');
  p.projectStage = document.getElementById('scopeStageSelect') ? document.getElementById('scopeStageSelect').value : p.projectStage;
  p.estimatedHours = document.getElementById('scopeEstHrs') ? (parseFloat(document.getElementById('scopeEstHrs').value)||null) : p.estimatedHours;
  p.scopeSummary = document.getElementById('scopeSummaryTA') ? document.getElementById('scopeSummaryTA').value.trim() : p.scopeSummary;
  p.nextSteps = document.getElementById('scopeNextTA') ? document.getElementById('scopeNextTA').value.trim() : p.nextSteps;
  p.internalNotes = document.getElementById('scopeInternalTA') ? document.getElementById('scopeInternalTA').value.trim() : (p.internalNotes||'');
  p.scopeUpdatedBy = session.name || 'Staff';
  p.scopeUpdatedDate = new Date().toISOString().split('T')[0];
  saveRecord('update', projectToRow(p), 'Sheet1');
  // Show confirmation
  var btn = document.getElementById('saveScopeBtn');
  if (btn) { btn.textContent = '✓ Saved'; btn.style.background = '#3B6D11'; setTimeout(function() { if(document.getElementById('saveScopeBtn')) { document.getElementById('saveScopeBtn').textContent = 'Save scope'; document.getElementById('saveScopeBtn').style.background = ''; } }, 2000); }
}

// ── STAFF AVAILABILITY DASHBOARD ──────────────────────────────────────────
function buildAvailability() {
  var q = curQ(), yr = curYr();
  var FTE_HRS = 520; // hours per quarter at 100% FTE

  // Build per-staff summary
  var staffData = STAFF.map(function(name) {
    // Assigned % effort from active pct projects
    var pctProjects = projects.filter(function(p) {
      return p.type === 'pct' &&
        ['active','upcoming'].indexOf(p.status) > -1 &&
        (p.team||[]).some(function(m) { return m.name === name; });
    });
    var assignedPct = pctProjects.reduce(function(a, p) {
      var m = (p.team||[]).filter(function(m) { return m.name === name; })[0];
      return a + (m && m.pct ? Number(m.pct) : 0);
    }, 0);

    // Active projects of all types
    var allActive = projects.filter(function(p) {
      return ['active','upcoming'].indexOf(p.status) > -1 &&
        (p.team||[]).some(function(m) { return m.name === name; });
    });

    // Logged hours this quarter (all types)
    var qHrs = hoursData.filter(function(h) {
      return h.staffName === name && h.quarter === q && h.year === yr;
    }).reduce(function(a, h) { return a + h.hours; }, 0);

    var loggedPct = Math.round(qHrs / FTE_HRS * 100);

    // Hours by project this quarter
    var byProject = {};
    hoursData.filter(function(h) {
      return h.staffName === name && h.quarter === q && h.year === yr;
    }).forEach(function(h) {
      if (!byProject[h.projectId]) byProject[h.projectId] = 0;
      byProject[h.projectId] += h.hours;
    });

    return {
      name: name,
      assignedPct: assignedPct,
      loggedPct: loggedPct,
      loggedHrs: qHrs,
      activeProjects: allActive.length,
      pctProjects: pctProjects.length,
      byProject: byProject
    };
  });

  var h = '<div class="card">';
  h += '<div class="section-hdr" style="margin-bottom:1rem">';
  h += '<span class="card-title" style="margin:0">Staff availability &mdash; ' + q + ' ' + yr + '</span>';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  h += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12px">';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#639922;display:inline-block"></span>90-100%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#EF9F27;display:inline-block"></span>70-89%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#E87722;display:inline-block"></span>50-69%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#E24B4A;display:inline-block"></span>&lt;50%</span>';
  h += '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#3C3489;display:inline-block"></span>&gt;100%</span>';
  h += '</div>';
  h += '<select id="availFilter" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="all">All staff</option><option value="under50">Needs work (&lt;50%)</option><option value="bandwidth">Has bandwidth (&lt;90%)</option><option value="over">Oversubscribed (&gt;100%)</option></select>';
  h += '</div></div>';

  // Summary metrics
  var over = staffData.filter(function(d) { return d.loggedPct > 100; }).length;
  var green = staffData.filter(function(d) { return d.loggedPct >= 90 && d.loggedPct <= 100; }).length;
  var yellow = staffData.filter(function(d) { return d.loggedPct >= 70 && d.loggedPct < 90; }).length;
  var orange = staffData.filter(function(d) { return d.loggedPct >= 50 && d.loggedPct < 70; }).length;
  var red = staffData.filter(function(d) { return d.loggedPct < 50; }).length;

  h += '<div class="metrics" style="margin-bottom:1.5rem">';
  h += '<div class="metric"><div class="metric-label">Full utilization</div><div class="metric-value" style="color:#639922">' + green + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Has bandwidth</div><div class="metric-value" style="color:#EF9F27">' + (yellow+orange) + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Needs work</div><div class="metric-value mv-red">' + red + '</div></div>';
  h += '<div class="metric"><div class="metric-label">Oversubscribed</div><div class="metric-value mv-purple">' + over + '</div></div>';
  h += '</div>';

  h += '<div id="availGrid">' + buildAvailGrid(staffData, 'all') + '</div></div>';
  sh('pageContainer', h);

  var filt = el('availFilter');
  if (filt) filt.addEventListener('change', function() {
    sh('availGrid', buildAvailGrid(staffData, this.value));
    attachAvailHandlers(staffData);
  });
  attachAvailHandlers(staffData);
}

function getAvailColor(pct) {
  if (pct > 100) return '#3C3489';
  if (pct >= 90) return '#639922';
  if (pct >= 70) return '#EF9F27';
  if (pct >= 50) return '#E87722';
  return '#E24B4A';
}

function getAvailBg(pct) {
  if (pct > 100) return '#EEEDFE';
  if (pct >= 90) return '#EAF3DE';
  if (pct >= 70) return '#FAEEDA';
  if (pct >= 50) return '#FFF0E6';
  return '#FCEBEB';
}

function getAvailLabel(pct) {
  if (pct > 100) return 'Oversubscribed';
  if (pct >= 90) return 'Full utilization';
  if (pct >= 70) return 'Has bandwidth';
  if (pct >= 50) return 'Significant bandwidth';
  return 'Needs work';
}

function buildAvailGrid(staffData, filter) {
  var filtered = staffData.filter(function(d) {
    if (filter === 'under50') return d.loggedPct < 50;
    if (filter === 'bandwidth') return d.loggedPct < 90;
    if (filter === 'over') return d.loggedPct > 100;
    return true;
  });

  if (!filtered.length) return '<div class="empty">No staff match this filter.</div>';

  // Sort: oversubscribed first, then by loggedPct descending
  filtered.sort(function(a, b) {
    if (a.loggedPct > 100 && b.loggedPct <= 100) return -1;
    if (b.loggedPct > 100 && a.loggedPct <= 100) return 1;
    return b.loggedPct - a.loggedPct;
  });

  var h = '<div style="overflow-x:auto"><table><thead><tr>';
  h += '<th>Staff member</th>';
  h += '<th>Logged ' + curQ() + ' hrs</th>';
  h += '<th>Actual FTE %</th>';
  h += '<th>Assigned % effort</th>';
  h += '<th>Active projects</th>';
  h += '<th>Status</th>';
  h += '<th>Utilization</th>';
  h += '<th></th>';
  h += '</tr></thead><tbody>';

  filtered.forEach(function(d) {
    var col = getAvailColor(d.loggedPct);
    var bg = getAvailBg(d.loggedPct);
    var lbl = getAvailLabel(d.loggedPct);
    var barW = Math.min(100, d.loggedPct);
    var assignedBarW = Math.min(100, d.assignedPct);

    h += '<tr>';
    h += '<td style="font-weight:600;font-size:13px">';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#185FA5,#0C447C);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">' + initials(d.name) + '</div>';
    h += d.name + ' ' + userBadge(d.name);
    h += '</div></td>';

    h += '<td style="font-weight:600">' + fmtHrs(d.loggedHrs) + ' hrs</td>';

    h += '<td>';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<div style="width:80px;height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden;flex-shrink:0">';
    h += '<div style="width:' + barW + '%;height:100%;background:' + col + ';border-radius:4px"></div></div>';
    h += '<span style="font-weight:700;color:' + col + '">' + d.loggedPct + '%</span>';
    h += '</div></td>';

    h += '<td>';
    if (d.assignedPct > 0) {
      h += '<div style="display:flex;align-items:center;gap:8px">';
      h += '<div style="width:80px;height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden;flex-shrink:0">';
      h += '<div style="width:' + assignedBarW + '%;height:100%;background:#185FA5;border-radius:4px"></div></div>';
      h += '<span style="font-weight:600;color:#185FA5">' + d.assignedPct + '%</span>';
      h += '</div>';
    } else {
      h += '<span style="font-size:12px;color:#aaa">No % effort projects</span>';
    }
    h += '</td>';

    h += '<td style="font-size:13px">' + d.activeProjects + ' active</td>';

    h += '<td><span style="font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:' + bg + ';color:' + col + '">' + lbl + '</span></td>';

    // Mini utilization bar showing logged vs assigned
    h += '<td>';
    h += '<div style="font-size:10px;color:#aaa;margin-bottom:3px">Logged vs assigned</div>';
    h += '<div style="position:relative;width:100px;height:14px;background:#f0f0f0;border-radius:7px;overflow:hidden">';
    h += '<div style="position:absolute;left:0;top:0;width:' + barW + '%;height:100%;background:' + col + ';border-radius:7px;opacity:.9"></div>';
    if (d.assignedPct > 0) {
      h += '<div style="position:absolute;left:0;top:0;width:' + assignedBarW + '%;height:100%;border:2px solid #185FA5;border-radius:7px;box-sizing:border-box"></div>';
    }
    h += '</div></td>';

    h += '<td><button class="btn btn-sm" data-avail-detail="' + d.name + '">Details</button></td>';
    h += '</tr>';
  });

  h += '</tbody></table></div>';
  return h;
}

function attachAvailHandlers(staffData) {
  document.querySelectorAll('[data-avail-detail]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openAvailDetail(this.getAttribute('data-avail-detail'), staffData);
    });
  });
}

function openAvailDetail(name, staffData) {
  var d = staffData.filter(function(x) { return x.name === name; })[0];
  if (!d) return;
  var q = curQ(), yr = curYr();
  var FTE_HRS = 520;
  var col = getAvailColor(d.loggedPct);
  var lbl = getAvailLabel(d.loggedPct);

  // Hours by project this quarter
  var projBreakdown = [];
  Object.keys(d.byProject).forEach(function(pid) {
    var p = projects.filter(function(x) { return x.id === pid; })[0];
    var hrs = d.byProject[pid];
    projBreakdown.push({
      project: p ? p.project : pid,
      pi: p ? p.pi : '',
      type: p ? p.type : '',
      hrs: hrs,
      pct: Math.round(hrs / FTE_HRS * 100)
    });
  });
  projBreakdown.sort(function(a,b) { return b.hrs - a.hrs; });

  // Hours by service type this quarter
  var bySvc = {};
  hoursData.filter(function(h) {
    return h.staffName === name && h.quarter === q && h.year === yr;
  }).forEach(function(h) {
    if (!bySvc[h.serviceType]) bySvc[h.serviceType] = 0;
    bySvc[h.serviceType] += h.hours;
  });

  // Prior quarters for trend
  var trend = [];
  ['Q1','Q2','Q3','Q4'].forEach(function(tq) {
    var tHrs = hoursData.filter(function(h) {
      return h.staffName === name && h.quarter === tq && h.year === yr;
    }).reduce(function(a,h) { return a+h.hours; }, 0);
    trend.push({q:tq, hrs:tHrs, pct:Math.round(tHrs/FTE_HRS*100)});
  });

  var h = '<div class="modal-title">' + name + ' &mdash; ' + q + ' ' + yr + ' availability</div>';
  h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap">';
  h += '<div style="text-align:center;padding:1rem 1.5rem;background:' + getAvailBg(d.loggedPct) + ';border-radius:10px;flex-shrink:0">';
  h += '<div style="font-size:32px;font-weight:700;color:' + col + '">' + d.loggedPct + '%</div>';
  h += '<div style="font-size:12px;color:' + col + ';font-weight:600">' + lbl + '</div>';
  h += '<div style="font-size:11px;color:#888;margin-top:2px">' + fmtHrs(d.loggedHrs) + ' / 520 hrs</div></div>';
  if (d.assignedPct > 0) {
    h += '<div style="text-align:center;padding:1rem 1.5rem;background:#E6F1FB;border-radius:10px;flex-shrink:0">';
    h += '<div style="font-size:32px;font-weight:700;color:#185FA5">' + d.assignedPct + '%</div>';
    h += '<div style="font-size:12px;color:#185FA5;font-weight:600">Assigned effort</div>';
    h += '<div style="font-size:11px;color:#888;margin-top:2px">from % effort projects</div></div>';
  }
  h += '<div style="flex:1;min-width:180px">';
  h += '<div style="font-size:12px;color:#888;margin-bottom:6px">Quarterly trend (' + yr + ')</div>';
  trend.forEach(function(t) {
    var tc = getAvailColor(t.pct);
    h += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
    h += '<span style="font-size:11px;color:#888;width:20px">' + t.q + '</span>';
    h += '<div style="flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden">';
    h += '<div style="width:' + Math.min(100,t.pct) + '%;height:100%;background:' + tc + ';border-radius:4px"></div></div>';
    h += '<span style="font-size:11px;font-weight:600;color:' + tc + ';width:35px;text-align:right">' + t.pct + '%</span>';
    h += '</div>';
  });
  h += '</div></div>';

  if (projBreakdown.length) {
    h += '<div style="font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Hours by project &mdash; ' + q + ' ' + yr + '</div>';
    h += '<div style="overflow-x:auto;margin-bottom:1.5rem"><table><thead><tr><th>Project</th><th>PI</th><th>Type</th><th>Hours</th><th>% FTE</th><th>Share</th></tr></thead><tbody>';
    projBreakdown.forEach(function(p) {
      var shareW = d.loggedHrs > 0 ? Math.round(p.hrs / d.loggedHrs * 100) : 0;
      h += '<tr><td style="font-weight:600;font-size:12px">' + p.project + '</td>';
      h += '<td style="font-size:12px;color:#666">' + p.pi + '</td>';
      h += '<td><span class="' + typeBadge(p.type) + '">' + typeLabel(p.type) + '</span></td>';
      h += '<td style="font-weight:600">' + fmtHrs(p.hrs) + '</td>';
      h += '<td style="font-weight:600;color:' + getAvailColor(p.pct) + '">' + p.pct + '%</td>';
      h += '<td><div style="display:flex;align-items:center;gap:6px"><div style="width:60px;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="width:' + shareW + '%;height:100%;background:#185FA5;border-radius:3px"></div></div><span style="font-size:11px;color:#888">' + shareW + '%</span></div></td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  } else {
    h += '<div style="background:#FAEEDA;border-radius:8px;padding:12px 14px;font-size:13px;color:#854F0B;margin-bottom:1.5rem">&#9888; No hours logged for ' + q + ' ' + yr + '. This staff member has not submitted any hours this quarter.</div>';
  }

  if (Object.keys(bySvc).length) {
    h += '<div style="font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Hours by service type</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem">';
    Object.keys(bySvc).sort(function(a,b){return bySvc[b]-bySvc[a];}).forEach(function(svc) {
      var pct = d.loggedHrs > 0 ? Math.round(bySvc[svc]/d.loggedHrs*100) : 0;
      h += '<div style="background:#f5f5f5;border-radius:8px;padding:8px 12px;text-align:center;min-width:100px">';
      h += '<div style="font-size:14px;font-weight:700;color:#185FA5">' + fmtHrs(bySvc[svc]) + '</div>';
      h += '<div style="font-size:11px;color:#888;margin-top:2px">' + svc + '</div>';
      h += '<div style="font-size:11px;color:#aaa">' + pct + '% of total</div></div>';
    });
    h += '</div>';
  }

  h += '<div class="actions"><button class="btn btn-primary" id="availCloseBtn">Close</button></div>';
  openModal(h);
  el('availCloseBtn').addEventListener('click', closeModal);
}


// ── FACULTY DATABASE (admin view) ─────────────────────────────────────────
function buildFacultyDB(activeTab) {
  activeTab = activeTab || 'hours';
  var allFac = ["David Elashoff"].concat(FACULTY);
  var h = '<div class="card">';
  h += '<div class="section-hdr" style="margin-bottom:1rem"><span class="card-title" style="margin:0">Faculty reporting database</span>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h += '<select id="fdbFac" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="">All faculty</option>';
  allFac.forEach(function(f){h+='<option>'+f+'</option>';});
  h += '</select>';
  h += '<select id="fdbQ" style="font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px"><option value="">All quarters</option>';
  ['Q1','Q2','Q3','Q4'].forEach(function(q){h+='<option>'+q+'</option>';});
  h += '</select>';
  h += '<input id="fdbYr" type="number" placeholder="Year" style="width:75px;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:6px">';
  h += '</div></div>';
  h += '<div class="tab-group" style="margin-bottom:1.5rem">';
  h += '<button class="tab-btn'+(activeTab==='hours'?' active':'')+'" data-fdbtab="hours">Hours ('+facultyHours.length+')</button>';
  h += '<button class="tab-btn'+(activeTab==='pubs'?' active':'')+'" data-fdbtab="pubs">Publications ('+facultyPubs.length+')</button>';
  h += '<button class="tab-btn'+(activeTab==='grants'?' active':'')+'" data-fdbtab="grants">Grants ('+facultyGrants.length+')</button>';
  h += '</div><div id="fdbContent"></div></div>';
  sh('pageContainer', h);
  document.querySelectorAll('[data-fdbtab]').forEach(function(btn){
    btn.addEventListener('click',function(){buildFacultyDB(this.getAttribute('data-fdbtab'));});
  });
  ['fdbFac','fdbQ','fdbYr'].forEach(function(id){
    var e=el(id);if(e)e.addEventListener('change',function(){renderFDBContent(activeTab);});
    if(e)e.addEventListener('input',function(){renderFDBContent(activeTab);});
  });
  renderFDBContent(activeTab);
}
function getFDBFiltered(dataset){
  var fac=gv('fdbFac'),q=gv('fdbQ'),yr=parseInt(gv('fdbYr'))||0;
  return dataset.filter(function(r){
    if(fac&&r.facultyName!==fac)return false;
    if(q&&r.quarter!==q)return false;
    if(yr&&r.year!==yr)return false;
    return true;
  });
}
function renderFDBContent(tab){
  if(tab==='hours')renderFDBHours();
  else if(tab==='pubs')renderFDBPubs();
  else renderFDBGrants();
}
function renderFDBHours(){
  var data=getFDBFiltered(facultyHours);
  if(!data.length){sh('fdbContent','<div class="empty">No hours entries match the current filters.</div>');return;}
  var totalHrs=data.reduce(function(a,r){return a+(r.totalHours||0);},0);
  var ctsiCount=data.filter(function(r){return r.ctsi==='yes';}).length;
  var h='<div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1rem">';
  h+='<div class="metric"><div class="metric-label">Total entries</div><div class="metric-value mv-blue">'+data.length+'</div></div>';
  h+='<div class="metric"><div class="metric-label">Total hours</div><div class="metric-value mv-purple">'+fmtHrs(totalHrs)+'</div></div>';
  h+='<div class="metric"><div class="metric-label">CTSI entries</div><div class="metric-value mv-amber">'+ctsiCount+'</div></div></div>';
  h+='<div style="overflow-x:auto"><table><thead><tr><th>Faculty</th><th>Investigator</th><th>Dept</th><th>Period</th><th>DA</th><th>GA</th><th>Admin</th><th>SD</th><th>DM</th><th>Total</th><th>CTSI</th><th>Funding</th><th>Submitted</th></tr></thead><tbody>';
  data.forEach(function(r){
    h+='<tr><td style="font-weight:600;font-size:12px">'+(r.facultyName||'')+'</td><td style="font-size:12px">'+(r.investigator||'')+'</td>';
    h+='<td style="font-size:12px;color:#666">'+(r.department||'')+'</td><td style="font-size:12px">'+(r.quarter||'')+' '+(r.year||'')+'</td>';
    h+='<td style="text-align:center">'+(r.dataAnalysis||0)+'</td><td style="text-align:center">'+(r.grantApplication||0)+'</td>';
    h+='<td style="text-align:center">'+(r.administration||0)+'</td><td style="text-align:center">'+(r.studyDesign||0)+'</td>';
    h+='<td style="text-align:center">'+(r.dataManagement||0)+'</td><td style="font-weight:600;text-align:center">'+fmtHrs(r.totalHours)+'</td>';
    h+='<td style="text-align:center">'+(r.ctsi==='yes'?'<span class="badge badge-ctsi">CTSI</span>':'&mdash;')+'</td>';
    h+='<td style="font-size:12px;color:#666">'+(r.fundingSource||'&mdash;')+'</td>';
    h+='<td style="font-size:12px">'+fmtDate(r.submittedDate)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  sh('fdbContent',h);
}
function renderFDBPubs(){
  var data=getFDBFiltered(facultyPubs);
  if(!data.length){sh('fdbContent','<div class="empty">No publication entries match the current filters.</div>');return;}
  var h='<div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1rem">';

    h+='<td><span class="badge badge-pending">'+(r.status||'')+'</span></td>';

  });
  h+='</tbody></table></div>';
  sh('fdbContent',h);
}
function renderFDBGrants(){
  var data=getFDBFiltered(facultyGrants);
  if(!data.length){sh('fdbContent','<div class="empty">No grant entries match the current filters.</div>');return;}
  var funded=data.filter(function(r){return r.status==='Funded';}).length;
  var h='<div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1rem">';
  h+='<div class="metric"><div class="metric-label">Total entries</div><div class="metric-value mv-blue">'+data.length+'</div></div>';
  h+='<div class="metric"><div class="metric-label">Funded</div><div class="metric-value mv-green">'+funded+'</div></div>';
  h+='<div class="metric"><div class="metric-label">CTSI entries</div><div class="metric-value mv-amber">'+data.filter(function(r){return r.ctsi==='yes';}).length+'</div></div>';
  h+='<div class="metric"><div class="metric-label">Submitted</div><div class="metric-value mv-purple">'+data.filter(function(r){return r.status==='Submitted';}).length+'</div></div></div>';
  h+='<div style="overflow-x:auto"><table><thead><tr><th>Faculty</th><th>Investigator</th><th>Dept</th><th>Period</th><th>Title</th><th>Type</th><th>Status</th><th>CTSI</th></tr></thead><tbody>';
  data.forEach(function(r){
    h+='<tr><td style="font-weight:600;font-size:12px">'+(r.facultyName||'')+'</td><td style="font-size:12px">'+(r.investigator||'')+'</td>';
    h+='<td style="font-size:12px;color:#666">'+(r.department||'')+'</td><td style="font-size:12px">'+(r.quarter||'')+' '+(r.year||'')+'</td>';
    h+='<td style="font-size:12px;max-width:160px">'+(r.grantTitle||'&mdash;').substring(0,50)+'</td>';
    h+='<td style="font-size:12px">'+(r.grantType||'')+'</td>';
    h+='<td><span class="badge '+(r.status==='Funded'?'badge-approved':'badge-pending')+'">'+(r.status||'')+'</span></td>';
    h+='<td style="text-align:center">'+(r.ctsi==='yes'?'<span class="badge badge-ctsi">CTSI</span>':'&mdash;')+'</td></tr>';
  });
  h+='</tbody></table></div>';
  sh('fdbContent',h);
}
// ── MY PROFILE ─────────────────────────────────────────────────────────────
function buildMyProfile(){
  var name=session.name;
  var profile=getProfile(name);
  var tax=getAllSkills();
  var skillMap={};(profile.skills||[]).forEach(function(s){skillMap[s.name]={level:s.level,category:s.category};});
  var pendingMine=skillRequests.filter(function(r){return r.requestedBy===name&&r.status==='pending';});
  var h='<div class="card">';
  h+='<div style="display:flex;align-items:center;gap:14px;margin-bottom:1.5rem;flex-wrap:wrap">';
  h+='<div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#185FA5,#0C447C);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0">'+initials(name)+'</div>';
  h+='<div><div style="font-size:17px;font-weight:600">'+name+'</div><div style="margin-top:4px">'+roleBadgeHtml()+'</div></div></div>';
  if(pendingMine.length)h+='<div class="alert alert-info" style="margin-bottom:1rem">You have <strong>'+pendingMine.length+'</strong> pending skill request'+(pendingMine.length>1?'s':'')+': '+pendingMine.map(function(r){return'<em>'+r.skillName+'</em>';}).join(', ')+' &mdash; awaiting admin approval</div>';
  h+='<div style="font-size:13px;font-weight:600;margin-bottom:10px">Current skills</div>';
  h+='<div id="profileSkillsPreview" style="margin-bottom:1.5rem;min-height:32px">'+(profileSkillsHtml(name)||'<span style="font-size:13px;color:#bbb">No skills added yet</span>')+'</div>';
  h+='<div style="border-top:1px solid #f0f0f0;padding-top:1rem;font-size:13px;font-weight:600;margin-bottom:1rem">Edit skills &amp; competencies</div>';
  Object.keys(tax).forEach(function(cat){
    h+='<div style="margin-bottom:1.25rem"><div style="font-size:11px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+cat+'</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:5px">';
    tax[cat].forEach(function(skill){
      var cur=skillMap[skill];
      var idSafe='sk_'+cat.replace(/\W/g,'_')+'_'+skill.replace(/\W/g,'_');
      h+='<div style="display:inline-flex;align-items:center;border:1px solid '+(cur?'#185FA5':'#e5e5e5')+';border-radius:8px;overflow:hidden;background:'+(cur?'#E6F1FB':'#fafafa')+'">';
      h+='<label style="display:flex;align-items:center;gap:5px;padding:5px 9px;cursor:pointer;font-size:12px;font-weight:'+(cur?'600':'400')+';color:'+(cur?'#185FA5':'#666')+'">';
      h+='<input type="checkbox" data-skill-cat="'+cat+'" data-skill-name="'+skill+'" id="'+idSafe+'" '+(cur?'checked':'')+' style="accent-color:#185FA5;width:13px;height:13px">';
      h+=(skill==='WOC (VA Authorization)'?'&#127973; ':'')+skill+'</label>';
      if(cur){
        h+='<select data-skill-level-cat="'+cat+'" data-skill-level-name="'+skill+'" style="font-size:11px;border:none;border-left:1px solid #b5d4f4;background:#E6F1FB;color:#185FA5;padding:5px 6px;cursor:pointer;font-weight:500">';
        PROF_LEVELS.forEach(function(l){h+='<option'+(( cur.level||'Proficient')===l?' selected':'')+'>'+l+'</option>';});
        h+='</select>';
      }
      h+='</div>';
    });
    h+='<button class="btn btn-sm" style="font-size:11px;border-style:dashed;color:#999;padding:5px 10px" data-req-cat="'+cat+'">+ Other</button>';
    h+='</div></div>';
  });
  h+='<div class="actions"><button class="btn btn-primary" id="saveProfileBtn">Save profile</button></div>';
  if(profile.updatedDate)h+='<div style="font-size:11px;color:#ccc;margin-top:8px;text-align:right">Last updated '+fmtDate(profile.updatedDate)+'</div>';
  h+='</div>';
  sh('pageContainer',h);
  // Skill checkboxes
  document.querySelectorAll('[data-skill-cat]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var cat=this.getAttribute('data-skill-cat'), skill=this.getAttribute('data-skill-name');
      var p=profilesData[name]||{skills:[],updatedDate:''};
      if(!p.skills)p.skills=[];
      if(this.checked){if(!p.skills.some(function(s){return s.name===skill;}))p.skills.push({name:skill,category:cat,level:'Proficient'});}
      else{p.skills=p.skills.filter(function(s){return s.name!==skill;});}
      profilesData[name]=p;
      sh('profileSkillsPreview',profileSkillsHtml(name)||'<span style="font-size:13px;color:#bbb">No skills added yet</span>');
      buildMyProfile();
    });
  });
  // Level dropdowns
  document.querySelectorAll('[data-skill-level-cat]').forEach(function(sel){
    sel.addEventListener('change',function(){
      var cat=this.getAttribute('data-skill-level-cat'), skill=this.getAttribute('data-skill-level-name');
      var p=profilesData[name]||{skills:[]};
      var entry=p.skills.filter(function(s){return s.name===skill;})[0];
      if(entry)entry.level=this.value;
      profilesData[name]=p;
      sh('profileSkillsPreview',profileSkillsHtml(name)||'<span style="font-size:13px;color:#bbb">No skills added yet</span>');
    });
  });
  // Other (request new skill)
  document.querySelectorAll('[data-req-cat]').forEach(function(btn){
    btn.addEventListener('click',function(){requestNewSkill(this.getAttribute('data-req-cat'));});
  });
  el('saveProfileBtn').addEventListener('click',saveMyProfile);
}

function saveMyProfile(){
  var p=profilesData[session.name]||{skills:[]};
  p.updatedDate=new Date().toISOString().split('T')[0];
  profilesData[session.name]=p;
  var rec={staffName:session.name,skills:JSON.stringify(p.skills||[]),updatedDate:p.updatedDate};
  saveRecord('upsert',rec,'profiles').then(function(){
    openModal('<div class="modal-title">Profile saved</div><div class="alert alert-ok">Your skills profile has been updated.</div><div class="actions"><button class="btn btn-primary" id="profileOkBtn">OK</button></div>');
    el('profileOkBtn').addEventListener('click',closeModal);
  });
}

function requestNewSkill(category){
  openModal('<div class="modal-title">Request new skill &mdash; '+category+'</div>' +
    '<p style="font-size:13px;color:#666;margin-bottom:1rem">Suggest a skill to add to the <strong>'+category+'</strong> list. Admin will review before it appears for everyone.</p>' +
    '<div class="form-group" style="margin-bottom:1rem"><label>Skill name *</label><input id="newSkillName" placeholder="e.g. Network Meta-Analysis"></div>' +
    '<div class="actions"><button class="btn" id="reqCancelBtn">Cancel</button><button class="btn btn-primary" id="reqSubmitBtn">Submit for review</button></div>');
  el('reqCancelBtn').addEventListener('click',closeModal);
  el('reqSubmitBtn').addEventListener('click',function(){
    var skillName=gv('newSkillName').trim();
    if(!skillName){alert('Please enter a skill name.');return;}
    var tax=getAllSkills();
    if((tax[category]||[]).some(function(s){return s.toLowerCase()===skillName.toLowerCase();})){alert('This skill already exists.');return;}
    if(skillRequests.some(function(r){return r.skillName.toLowerCase()===skillName.toLowerCase()&&r.status==='pending';})){alert('A request for this skill is already pending.');closeModal();return;}
    var rec={id:String(nextIds.sr++),requestedBy:session.name,category:category,skillName:skillName,status:'pending',requestedDate:new Date().toISOString().split('T')[0],reviewedBy:'',reviewedDate:''};
    skillRequests.push(rec);
    saveRecord('add',rec,'skillRequests');
    closeModal();
    openModal('<div class="modal-title">Request submitted</div><div class="alert alert-ok">Your request to add <strong>'+skillName+'</strong> to the '+category+' list has been sent for review.</div><div class="actions"><button class="btn btn-primary" id="reqOkBtn">OK</button></div>');
    el('reqOkBtn').addEventListener('click',closeModal);
  });
}

// ── STAFF SKILLS DIRECTORY ─────────────────────────────────────────────────
function buildStaffSkills(){
  var allStaff=STAFF.concat(FACULTY).concat(['David Elashoff']);
  var tax=getAllSkills();
  var allSkillsList=Object.keys(tax).reduce(function(a,k){return a.concat(tax[k]);});
  var pendingReqs=skillRequests.filter(function(r){return r.status==='pending';});
  var h='<div class="card"><div class="section-hdr" style="margin-bottom:1rem">';
  h+='<span class="card-title" style="margin:0">Staff skills &amp; competencies</span>';
  if(canApprove()&&pendingReqs.length)h+='<span class="badge badge-appr-pending">'+pendingReqs.length+' skill request'+(pendingReqs.length>1?'s':'')+' pending</span>';
  h+='</div>';
  h+='<div class="filter-row"><input id="ssName" type="text" placeholder="Search name..." style="width:150px"><select id="ssCat"><option value="">All categories</option>';
  Object.keys(tax).forEach(function(c){h+='<option>'+c+'</option>';});
  h+='</select><select id="ssSkill"><option value="">Filter by skill...</option>';
  allSkillsList.forEach(function(s){h+='<option>'+s+'</option>';});
  h+='</select><select id="ssLevel"><option value="">Any level</option>';
  PROF_LEVELS.forEach(function(l){h+='<option>'+l+'</option>';});
  h+='</select></div>';
  if(canApprove()&&pendingReqs.length){
    h+='<div style="border:1px solid #e5e5e5;border-left:4px solid #EF9F27;border-radius:8px;padding:14px;margin-bottom:1.5rem;background:#FFFDF7">';
    h+='<div style="font-size:13px;font-weight:600;margin-bottom:10px">Pending skill additions ('+pendingReqs.length+')</div>';
    pendingReqs.forEach(function(r){
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;flex-wrap:wrap;gap:6px">';
      h+='<div><strong style="font-size:13px">'+r.skillName+'</strong><span style="font-size:12px;color:#888;margin-left:6px">&mdash; '+r.category+'</span><span style="font-size:12px;color:#666;margin-left:6px">by '+r.requestedBy+'</span></div>';
      h+='<div style="display:flex;gap:6px"><button class="btn btn-sm btn-approve" data-approve-skill="'+r.id+'">&check; Approve</button><button class="btn btn-sm btn-reject" data-reject-skill="'+r.id+'">&times; Reject</button></div></div>';
    });
    h+='</div>';
  }
  h+='<div id="ssGrid">'+buildSkillGrid(allStaff)+'</div></div>';
  sh('pageContainer',h);
  ['ssName','ssCat','ssSkill','ssLevel'].forEach(function(id){
    var e=el(id); if(e)e.addEventListener('input',refreshSkillGrid); if(e)e.addEventListener('change',refreshSkillGrid);
  });
  document.querySelectorAll('[data-approve-skill]').forEach(function(btn){btn.addEventListener('click',function(){approveSkillRequest(this.getAttribute('data-approve-skill'));});});
  document.querySelectorAll('[data-reject-skill]').forEach(function(btn){btn.addEventListener('click',function(){rejectSkillRequest(this.getAttribute('data-reject-skill'));});});
}

function refreshSkillGrid(){
  var search=(gv('ssName')||'').toLowerCase();
  var allStaff=STAFF.concat(FACULTY).concat(['David Elashoff']).filter(function(n){return !search||n.toLowerCase().indexOf(search)>-1;});
  sh('ssGrid',buildSkillGrid(allStaff));
}

function buildSkillGrid(staffList){
  var skill=gv('ssSkill'),level=gv('ssLevel'),cat=gv('ssCat');
  var tax=getAllSkills(), cats=Object.keys(tax);
  var filtered=staffList.filter(function(name){
    var skills=getProfile(name).skills||[];
    if(skill&&!skills.some(function(s){return s.name===skill&&(!level||s.level===level);}))return false;
    if(level&&!skill&&!skills.some(function(s){return s.level===level;}))return false;
    if(cat&&!skills.some(function(s){return s.category===cat;}))return false;
    return true;
  });
  if(!filtered.length)return'<div class="empty">No staff match current filters.</div>';
  var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px">';
  filtered.forEach(function(name){
    var p=getProfile(name), skills=p.skills||[];
    var hasWOC=skills.some(function(s){return s.name==='WOC (VA Authorization)';});
    h+='<div style="border:1px solid #e5e5e5;border-radius:10px;padding:14px;background:#fff;'+(hasWOC?'border-top:3px solid #EF9F27':'')+'">';
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
    h+='<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#185FA5,#0C447C);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">'+initials(name)+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name+'</div><div style="margin-top:2px">'+userBadge(name)+'</div></div>';
    if(hasWOC)h+='<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:#FAEEDA;color:#854F0B;font-weight:600;flex-shrink:0">&#127973; WOC</span>';
    h+='</div>';
    if(skills.length){cats.forEach(function(c){var cs=skills.filter(function(s){return s.category===c;});if(!cs.length)return;h+='<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">'+c+'</div><div>';cs.forEach(function(s){h+=skillBadge(s);});h+='</div></div>';});}
    else h+='<div style="font-size:12px;color:#ccc;font-style:italic">No skills listed</div>';
    if(p.updatedDate)h+='<div style="font-size:10px;color:#ddd;margin-top:6px">Updated '+fmtDate(p.updatedDate)+'</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function approveSkillRequest(id){
  var req=skillRequests.filter(function(r){return r.id===id;})[0]; if(!req)return;
  req.status='approved'; req.reviewedBy=session.name; req.reviewedDate=new Date().toISOString().split('T')[0];
  saveRecord('update',req,'skillRequests');
  buildStaffSkills();
}
function rejectSkillRequest(id){
  var req=skillRequests.filter(function(r){return r.id===id;})[0]; if(!req)return;
  req.status='rejected'; req.reviewedBy=session.name; req.reviewedDate=new Date().toISOString().split('T')[0];
  saveRecord('update',req,'skillRequests');
  buildStaffSkills();
}

// ── Start ──────────────────────────────────────────────────────────────────
showLogin();

showLogin();

</script>
